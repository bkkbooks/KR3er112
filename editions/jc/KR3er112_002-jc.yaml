body:
  text: 中風斠詮卷第一中風總論第一節論風之為病以外因內因為兩大綱風者大塊之噫氣也大之而云物晦明陰霾晴霽無一非此大氣之鼓盪小之而動息掌乳草木繁滋又皆恃此空氣為涵濡吾人生於氣交之中呼吸吐納更息息相依為命尤為須臾不可離者焉然在天之風其和煦也則為生長百物之母其肅殺也即為摧殘萬有之機而斯人之呼吸長空賴以生活者得其和氣則吐故吸新百骸滋長而感其戾氣即千變萬狀疾病叢生讀素問甲乙病源千金等書於風病言之綦詳敘述病變亦極繁頤大率自外感受者由淺入深自經絡而腑臟幻化百端不可思議古所謂善行而數變者其故可思也此外因之風邪為害固已甚厲凡古人祛風方藥恆主疏邪解表者誠以外感為病仍須治之於外泄而散之此外因證治之一大綱也批外因之風無不由漸而來非內風之猝然暴動一發即重者可此而人之生也常稟五行之氣化以迭為消長則臟腑中自有此涵煦不息之機以運用其津液氣血而充溢肢體敷布形骸古所謂風氣通於肝者則非天空中鼓盪之外風也其為病也五臟之性肝為暴肝木橫逆則風自生五志之極皆生火火焰升騰則風亦動推之而陰虛於下陽浮於上則風以虛而暗煽津傷液耗營血不充則風以燥而猖狂所以病至末傳時有風陽陡動而一蹶不可復振者是人有此生又恆與風相為終始大率自內而發者由靜生動則猝然而震撼波譎雲詭一往無前古所謂風為百病之長者殆即指此此內因之風火恣肆又最難馴凡古人熄風良法必以潛陽鎮定者誠以內因為病務必治之於內安而宅之此內因證治之又一大綱也斯二因者淵源既別見症亦自不同而治療斯各有主義批內風為病其源不一見症本各不同治法亦各有主義惟潛陽熄風之品必不可缺假使病是外因而不為疏泄則坐令深入譬猶開門揖盜寧不入室升堂傾筐倒筐病是內因而妄與發散則狂飈益肆譬猶洪爐鼓扇寧不摧枯拉朽棟折榱崩此則談醫者所必明辨於機先而不能混淆不清指鹿為馬者故古之中風皆是外因治必溫散解表者所以祛外來之邪風也今之中風多是內因治必潛降鎮攝者所以靖內動之風陽也誠能判別此外內二因之來源去委則於古今中風證治思過半矣第二節論中風之病漢唐治法皆是外因金元辨證乃識內因中風病名導源素問演於甲乙並見於難經及仲景之傷寒論金匱要略下逮隋唐則巢氏病源孫氏千金王氏外臺分析各證言之尤詳而治療方藥亦最明備此皆吾邦醫學百世不遷之大宗也似乎後之學者欲求中風證治之綱領必當守此數家之言奉為圭臬而可以探驪得珠生死肉骨矣抑知言非一端義各有當古人立論各道其道有不可不分而觀之者乎夫難經所謂傷寒有五之一曰中風及仲景傷寒論所謂太陽中風之桂枝湯證固明明外感初步之風寒也其病在經未嘗深入則與猝然昏僕之中風迥不相侔是必異病同名不可相提並論此其義固人人能知之而能言之不意千金外臺之治猝中風欲死身體緩急口目不正舌強不能語奄奄忽忽神情悶亂者首推小續命湯一方仍是仲景之麻桂二方加味則可知彼時之所謂中風雖其證與仲景之太陽中風不同而制方之意固以為即是太陽病之外感風寒所以用藥同此一轍是蓋古人所見身體緩急口目不正舌強不語之猝然中風必有太陽外寒見症則仍與仲景之所謂太陽中風無甚差池所以金元以來每謂中風中經絡者外有六經形症通以小續命湯加減主治張潔古氏且有桂枝續命麻黃續命等六經加減號為定法豈非以風從表受病在經絡立論是又與傷寒論六經皆有中風之意同一理論更證以外臺秘要中風方首列深師之桂枝湯麻黃湯所治之證所用之藥皆與傷寒論之太陽中風吻合益可知六朝隋唐之所謂中風未嘗不與難經傷寒論之所謂中風同一畦町然必非近今所見眩暈暴僕痰涎上湧神志昏迷之中風可斷言也批謂續命諸方為附會傷寒論太陽中風而作語雖新奇卻有至理再申之以方中所用諸藥何以能治身體緩急口目不正舌強不語諸病則雖有儀秦之辯亦必不能為切當之解說可見古人制方之時本在五里霧中今既大放光明則似此雜亂無章之古方必不可復存以淆惑學者視聽作者能推測古人制方之意宛如身歷其境真是傳神之筆壽頤按千金外臺小續命湯所謂治猝中風欲死身體緩急口目不正舌強不能語奄奄忽忽神情悶亂等症其實已無一非內風暴動氣血上菀激動腦神經失其功用之病何嘗有外來之風邪且何嘗有太陽經見症而制此方者乃比附於傷寒論之太陽中風合用麻桂二方加味本不可解蓋制方者知身體緩急口目不正舌強不語等症之名為中風而又見傷寒論有太陽中風之明文遂誤認此之中風即彼之中風因而依門傍壁竟用太陽經例製成此怪不可識之方試問身體緩急口目不正諸症何者有合於麻黃桂枝之功用而小續命湯諸味又何者是身體緩急口目不正舌強不語等對症之藥此皆百思而不得其解者乃方下主治且謂諸風服之皆驗而後人皆稱小續命湯為中風之第一要方終是莫名其妙茲以其既用太陽之藥姑以為必有太陽證耳究之身體緩急口目不正舌強不語之中風必非仲景之所謂太陽中風也若素問甲乙之所謂中風亦皆外感之風邪大率由淺入深由漸馴劇未嘗有昏僕傾跌痰塞神迷之症蓋外風襲入肢體為患雖各不同而皆自表及里循次傳變亦與忽然暴僕昏憒無知之中風見症絕異此惟景岳張氏曾言內經諸風皆指外邪立論與神魂昏憒猝僕痰塞之中風不同而其他名賢之論中風者無不以古證今混而一之矣壽頤按景岳創非風之論立名未免不正然能分別外風內風見症不同復申言古人之治中風皆主外風其論最為清澈能使後學從此辨證論治與他書之不分內外二因者大有上下床之別惜其生平慣於溫補亦復以膩補溫腎之法主治內風則亦無效若今之金匱既名要略中風一篇寥寥數節文義不甚貫串則是斷簡殘編未能明瞭壽頤按金匱要略之中風竟以內風暴動之不遂不仁昏憒吐涎等症指為風邪之在經在絡入腑入臟而後之千金外臺乃無不以祛風散寒之藥治昏憒猝僕之內風矣是外因內因之混合不清即由金匱開其端最是疑竇後有專論詳辨之至巢氏病源則分析各證言之甚詳而千金外臺中風之方竟成巨帙然統觀此三書之論證用藥幾無一不從外風立法凡是喎僻不遂痿躄不仁癱瘓不用等症皆以為邪風之外襲即至神情瞀亂昏不識人痰壅涎流舌強不語之候近人所知為內動之風者在古人亦必以為外風之入腑入臟則用藥惟有散風泄表之一途麻桂羌防幾於千方一律且皆為寒風設法則解表之劑必主辛溫薑桂椒辛天雄烏附俯拾即是雖其間亦時有芩連石膏寒涼之品而恆與溫中解表並轡以馳是皆古人主治中風之定法固無不以為外因之寒風也壽頤按千金外臺中風之方亦間有涼潤清熱之劑而如徐嗣伯許仁則之方論且發明內熱生風之旨實為河間丹溪之先導似不可謂古人皆主溫中解表一法但古方中涼潤清熱之法終是無多茲以其大概言之固辛溫者十之八九也其徐嗣伯許仁則之方論見第三卷古方平議篇批徐許二家之論中風獨能知是內熱生風乃唐以前之絕無僅有者然即此已可見古人之病亦猶是今人之病也逮乎金元以降始有悟於昏憒猝僕之中風病形脈症確於外感風邪不類乃漸變其論調而注重於內因河間主火東垣主氣丹溪主痰持論雖各不同而同以為病由內發則與唐以前之皆指為外風者所見大異而古人通行之大小續命湯等泄散風邪之法必與內因之證枘鑿不入勢必不可復用然河間之論中風既知為將息失宜心火暴盛固謂內動之風火也而其論治則又曰中風既為熱盛治之者或用烏附等類之熱藥欲令藥氣開通經絡使氣血宣行而無壅滯則又未脫古人專治寒風之窠臼矣批河間既知內熱生風而反故意為古人熱藥斡旋大不可訓東垣之論中風既知非外來之風邪而為本氣之自病固為內因之虛風也乃治法又用潔古老人保命集舊說謂中血脈者外有六經形症則以小續命湯加減治之中腑者內有便溺阻隔則以三化湯等通利之外無六經形症內無便溺阻隔宜大秦艽湯羌活愈風湯主之則又用外感寒風之套藥矣批保命集分此三綱雖曰為外來之風病設法然其時所謂中風之病已無一非內動之風則三綱之分全是夢中說夢以續命愈風等方皆是有害無利不意東垣已說明內動之風而仍教人用此祛風溫燥之藥更是可怪坊刻保命集多作劉河間著且列於河間六書中以劉名完素張名元素而誤也四庫提要已改正之今稱潔古昭其實也是以此數家之說雖恆為近世醫書援引而宗其法者治亦無效明之薛立齋亦以內因立論則倡為真水竭真火虛之說遂開趙養葵專用六味八味之陋景岳張氏又約之以內傷頹敗四字持論既籠統不切而用藥又偏於膩補則皆蠻鈍不靈終無效果惟皆從內風自煽著想一洗古人辛散疏泄之習或為彼善於此然當風火披猖挾痰上湧之時而遽欲顧其根本之虛滋補濁膩適以助痰為虐奚能有濟獨有繆氏仲淳謂真陰虧而內熱生風猝然僵仆初宜清熱順氣開痰繼則培本分作兩層治法乃有次序可言則視薛趙景岳輩獨能言明且清批古人之論內風治法必以仲淳此說為第一明白今更加以潛鎮二字則完壁矣近來西國醫家謂此猝然昏僕之病乃血沖腦經失其功用在彼以剖驗得之據死於此病者腦中必有死血或積水則血衝入腦固無疑義惟血在絡中何故而直上衝腦則亦未聞有精確之發明因而亦無捷效之治驗光緒中葉蓬萊張伯龍著有雪雅堂醫案其論內風昏僕謂是陰虛陽擾水不涵肝木旺生風而氣升火升痰升沖激腦經所致是以頃刻瞀亂神志迷濛或失知覺或失運動皆腦神經為之震動而失其功用之病西醫謂之血沖腦者正與素問調經論所謂血之與氣並走於上則為大厥之旨吻合批此是二千年來破天荒之第一名論頤謂亦即生氣通天論所謂血菀於上使人薄厥之意菀讀為郁詩彼都人士我心菀結箋猶結也積也薄讀為迫左傳薄諸河楚師薄於險皆逼迫之意小爾雅廣言薄迫也其治法則惟以潛陽攝納為主鎮定其上升之勢使血與氣不走於上則厥可定而腦神經之功用可復無論昏憒暴僕痰壅氣促喎斜不遂癱瘓不仁舌強不語痿躄掣痛等症猝然而起者皆可猝然而安此則闡發內風暴動證治實能勘透淵源精當確切如撥雲霧而見青天竟是素問以後無人知此病情至今而是病始有療治正法開後學覺悟之門至理名言有如皎日壽頤屢宗此旨以治痰壅傾僕神志迷亂者而效以治肢體刺痛手足不遂者而又效乃知伯龍此論最是實地經驗迥非前人之空言塗附者所能同日而語得此而從古百家方論皆可廢雖謂伯龍為內風暴僕之開山祖師可也批能以實在治驗為證方與空言之理想家顯分畛域抑頤因之而重有感焉素問之言中風非不明析然皆外因之病景岳所謂風邪中人本皆表證內經諸風皆指外邪故無神魂昏憒痰壅僵仆癱瘓抽搐等症已是讀書得間信而有徵若內因之昏憒猝僕者素問自有大厥薄厥等條而並不謂之中風在古人各明一義辨別如分水之犀本不慮後人之誤認不謂甲乙經以擊僕偏枯猝然暴死指為偏中邪風而金匱之中風篇又以喎僻不遂身重不仁昏不識人舌強吐涎指為賊邪之在經在絡入腑入臟於是內風暴動之病皆以為外感之邪風亂素問之例而內因外因之風乃渾熔於一爐之中糾纏不清莫衷一是不得不謂甲乙金匱之誤批此是內風之病誤認外風之始作俑者讀者必須認清方不為古人所愚而巢氏病源亦以內因諸症作外因說解千金外臺諸方亦惟以解表祛風之法通治內風諸症相沿成習鐵鑄六州之錯者將二千年至景岳而始毅然決然亟為辨別真知灼見已是不可幾及而其非風一篇亦知是素問之厥即此昏憒猝僕之病又隱隱悟到大厥薄厥之旨蓋景岳有類經之作其於內經用力最深故能有此神悟獨惜其誤以非風立名反覺言之不順然獨能識得今之中風可擬素問之厥所見固是有真而不聞更有人能助之闡發一言者此則古書之真不易讀而亦可見潛心體會善讀古書者之難其選也若西人血沖腦之說在彼以實驗而有此發明初不與吾國古書互為印證不意素問有大厥薄厥兩節久已明言於漢魏之前即此可徵吾邦舊學自有精鑿不刊之至理且可知醫為實用之科學自必有徵實之證據雖中西兩家學術淵源絕不相同而果有實在之發明終必同歸一致批得此兩節可證吾因醫學在上古之世最是戛戛獨造惜乎周秦以降久已失傳而漢魏六朝諸書都不免空言塗附此惟素問一編秦火以前舊說猶有存者誠非漢唐名賢所可幾及者矣蓋疾病本是實事陸九芝所謂一個病止有一條理斷不容各道其道彼此歧異更不能空談理想幻說欺人世固有消吾國醫學之徒以理論見長而無當於事實者試令尋繹此大厥薄厥之旨當可恍然於理論果為事實之母矣惜乎晚近學者目光不遠不能早悟及此致令內風暴動之病久稱難治而今而後凡有氣升痰升昏眩猝僕之症不獨漢唐家法溫燥升散之助桀為虐者必不可誤讀古書反以僨事即河間東垣丹溪立齋景岳諸大家雖各明一義不無可取然皆瞠乎後矣第三節論昏瞀猝僕之中風無一非內因之風昏瞀猝僕痰壅涎流而語言謇澀癱瘓不仁此舉世所共知為中風之病也惟考之素問則凡此諸症皆未嘗謂之中風蓋素問之所謂中風者只是風邪襲表病在肌腠經絡本無俄頃之間即已矇蔽性靈汩沒神志而遽致傾跌僵仆不動不言之理批素問之所謂中風本無昏瞀猝僕之症讀者首宜注意壽頤按素問之明言中風者本不多見惟脈要精微論曰中惡風者陽氣受也則明言其人陽氣不充而始受病可知其所謂惡風者必為肅殺之寒風此古人治中風所以必用麻桂羌防姜辛烏附大小續命湯等溫經散寒之劑也又通評虛實論曰不從內外中風之病故瘦留著也則謂風邪留著經絡肌肉為病故其人消瘦則風痹之證亦外風也又風論有飲酒中風入房汗出中風新沐中風數條無一非外感之風皆可斷言而未嘗有一條內動之風陽名之為中風者批素問本不以內風為中風則今之所謂中風必不能援引素問之中風為據所以甲乙經巢氏病源千金外臺諸書所論中風皆是外感之風而肝陽自動之內風絕不雜廁其間固皆本之於素問者也若素問所論內風自動眩暈昏僕之病則通評虛實論所謂僕擊偏枯肥貴人則高梁之疾也壽頤按高梁讀為膏粱以富貴家肥甘太過釀痰蘊濕積熱生風致為暴僕偏枯猝然而變如有所擊者然則聲色酒醴斷喪真元皆在其中病由內因最為明顯此素問所言昏僕偏枯之正義也何以金匱竟以喎僻不遂不仁難言不識人等謂之賊邪而甲乙經亦有偏中邪風擊僕偏枯二句明明與素問背道而馳是不可不據素問以正金匱甲乙之誤批素問此條最宜認定然後方知後世各家竟是無一不誤五臟生成篇所謂徇蒙招尤目冥耳聾過在足少陽厥陰甚則入肝也壽頤按徇蒙招尤一句甚是費解注家多拘泥本字如塗塗附皆不可通要知古字最多假借漢人讀經有改讀之例重字音不重字形凡音近音轉之字多可借讀素問尚是周秦遺書假借字及古字古義不少讀者不可不知此例此節謂徇蒙招尤目冥耳聾病在足少陽厥陰二經明是肝膽火升內風煽動眩暈昏瞀之候則徇字當讀為眴實即借為眩字蒙字本有冒義古多通用惟眩冒之冒本是矇昧不明之義已借冒為蒙則徇蒙可讀為眩冒亦可讀為眩蒙招尤則讀為招搖實即掉搖招之為掉尤之為搖皆一聲之轉且本是形容之辭但當通之以意而不能墨守本字正義者凡古書中之形容字多無一定字形是其例也質而言之即五常政大論之所謂掉眩巔疾耳俞蔭甫余錄亦謂此節之徇蒙當讀為眩矇可證經生家亦有先我而言之者矣批六書假借經學家小學家所謂專門學也不謂醫雖小道而亦非具此學識不能讀古人之書信乎學醫之非易事也此節引證素問內風各條而一一說明其病狀殊覺古人之為素問作注者皆未必有此明白然一經表出又覺淺顯易知絕無穿鑿附會之弊所謂至理自在人間會心人固不必求之深遠也玉機真臟論所謂春脈如弦其氣來實而強此為太過則令人善忘忽忽眩冒而巔疾也壽頤按善忘當依宋校正改作善怒此傳寫之誤巔疾今本甲乙經脈經作癲同字脈要精微論厥成為巔疾王啟玄注厥謂氣逆也氣逆上而不已則變為上巔之疾是此病在腦在巔頂已極明顯古人已不啻明言之批頂巔之病豈非即是腦病古人久已言之何等明白曉暢正不待西學東漸而始昭著但未揭出腦之一字耳巔字古止作顛加廣則作瘨說文瘨病也則許叔重猶未明言何者之病至廣雅釋詁則曰瘨狂也玉篇瘨都賢切狂也又癇小兒瘨病廣韻始有癲字為瘨字之重文注曰上同是顛癇顛狂諸病古人造字本取頂顛之義吾國古學又無不知是腦受其病矣脈弦實強則肝氣橫逆莫制故為善怒為眩暈為昏冒陽氣上浮直達顛頂謂非腦神經之病而何生氣通天論所謂陽氣者煩勞則張精絕闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汩汩乎不可止也壽頤按煎厥二字不甚可解然謂人之陽氣以煩勞而其勢愈張明是肝膽陽升之病更遇夏令陽盛之時則陽氣闢積發而為厥蓋與調經論之大厥相近闢積者復疊重累之義其字亦作襞如今女子之裙褶襉者是論語鄉黨帷裳朱注謂腰有闢積而旁無殺縫是也目盲不可視耳閉不可聽則即五臟生成篇之所謂徇蒙招尤目冥耳聾已是天旋地旋日月無光之候更申之以憒憒乎汩汩乎二句無非形容其昏然無識莫名所苦之狀謂非肝陽暴動眩暈昏昧猝厥猝僕之病而何批描摹病態是繪影繪聲筆法讀此猶不能明白瞭解者天下必無是人獨惜古今注家未悟此意說得迷離倘恍反以疑誤後人而素問之正義遂不可曉脈解篇又有善怒者名曰煎厥一條蓋怒則氣火俱升因而暴厥其病狀亦猶是也又謂陽氣者大怒則形氣絕而血菀於上使人薄厥也調經論所謂血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死也壽頤按內風陡動之病習醫者能知為肝陽上擾已是高明之家終不能知是氣火俱浮迫血上湧直傷腦經之病乍聞西醫血沖腦經四字方且搖首咋舌群相駭怪更莫測其病理之何似抑知素問有薄厥大厥二條固已明言其血菀於上氣血並走於上蓋亦與新學家之所謂血沖腦經同一明白而讀者皆不覺悟則為注家說得模糊引入魔道遂令古人精義幾於泯沒不傳可為嘆息然今既證明此薄厥大厥即是內風昏瞀之病更可知上古醫理至精至確洵是超凡入聖之學真非漢唐以降所能望見項背者矣脈要精微論所謂厥成為巔疾也又謂浮而散者為眴僕也壽頤按厥為巔頂之疾一句道破直與西學血沖腦經同符合撰惟其氣火大浮有升無降故脈浮且散當為眩暈昏僕之病至真要大論所謂諸風掉眩皆屬於肝諸暴強直皆屬於風諸熱瞀瘛皆屬於火也壽頤按此素問明言眩暈強直昏瞀瘛瘲諸病之屬於肝火肝風者陰陽應象大論所謂在天為風在地為木在臟為肝也又謂風氣通於肝也壽頤按此節諸風雖似言外因之風然在天為風而人之肝臟應之則可知肝之自能生風非專指外來之風矣五常政大論所謂發生之紀其動掉眩巔疾也批古有巔疾之名可知掉眩目冥等病古人亦未嘗不知其病在於腦則西人血沖腦經之說雖是新發明亦何必非吾邦舊學又謂厥陰司天風氣下臨目轉耳鳴也六元正紀大論所謂太陽之政壬辰壬戌其病掉眩目冥也少陽之政壬寅壬申其病掉眩也壽頤按發生之紀乃木運之太過厥陰司天則風木之旺時壬年即木運太過所以有掉眩巔疾目轉耳鳴等病此皆臟氣之應乎天氣而內風自動者也又謂厥陰司天三之氣民病耳鳴掉眩也木鬱之發耳鳴眩轉目不識人善暴僵仆也火鬱之發瞀悶懊憹善暴死也少陽司天三之氣病昏憒也少陽所至為瞀昧暴病為瞤瘛暴死也壽頤按瞀昧瞀悶皆昏憒迷亂神識不清之貌瞤謂口眼之瞤動瘛謂肢體之瘛瘲此皆厥陰風木及君相二火之氣用事而謂掉眩僵仆昏瞀懊憹瞤瘛暴死等病是亦臟氣之應乎天氣而為風病火病者也脈解篇謂太陽所謂甚則狂巔疾者陽盡在上而陰氣從下下虛上實故巔疾也壽頤按此節之所謂太陽言其陽氣極盛升浮於上故曰陽盡在上正是氣升火升迫血沖腦之候下虛上實四字何等明白與十二經絡之太陽經無涉然啟玄作注竟以脈上額交巔妄為附會遂令後之學者不知古人真旨可為嘆息惟經文陰氣從下一句殊不可解必有訛誤厥論所謂巨陽之厥發為眴僕陽明之厥則巔疾欲走呼也壽頤按此巨陽陽明亦當以陽氣大盛言之惟其陽盛於上巔頂受病故或為狂悖而走呼或為昏憒而眩僕皆即氣血沖腦之病必非太陽之經陽明之經亦猶平人氣象論之太陽脈至陽明脈至至真要大論之太陽之至陽明之至皆以時令陰陽言之本與太陽陽明經絡毫不相涉難經七難冬至之後得甲子少陽王復得甲子陽明王復得甲子太陽王言陽氣之旺尤其明證此何可以經絡之太少陰陽妄為比附雖厥論此節下文又有以經取之一句頗似主經絡而言必無疑義要之與眩僕昏狂之旨不能符合恐是淺人有所竄入若王氏之注專以經脈作解則啟玄固慣於望文生義者全書中謬戾甚多不足徵也宣明五氣篇所謂搏陽則為巔疾也壽頤按搏陽亦陽盛之意方盛衰論所謂有餘者厥一上不下也又謂氣上不下頭痛巔疾也壽頤按氣盛於上上實下虛故曰有餘一上不下氣上不下言之尤顯著至教論所謂太陽者至陽也病起疾風至如礔礪九竅皆塞陽氣滂溢干嗌喉塞也壽頤按礔礪今作霹靂此節文義不甚條達其大旨則謂太陽是陽氣之至盛所以病發猝暴迅如霹靂以致九竅皆塞嗌乾喉塞蓋與煎厥薄厥大厥等病情大致相似則亦猝然昏瞀之中風也凡此諸條皆是肝膽火升浮陽陡動擾亂神志或為暴僕或為偏枯或為眩暈昏厥或為目冥耳聾或更瞤動瘛瘲強直暴死諸般病狀俱已歷歷如繪此皆近世之所謂中風病也然在素問何嘗名以中風可見素問之所謂中風者皆是外風其症固不若是惟古人文字簡潔於此諸條未嘗明示以此即內風陡動之病而甲乙經遂有偏中邪風擊僕偏枯之語乃以內風之病誤認外風壽頤按此條見甲乙經六卷八正八虛八風大論篇全篇文義甚是龐雜本不可信辨見後文第五節惟甲乙經此文亦見靈樞九宮八風篇近世醫家每謂靈樞素問即漢書藝文志之黃帝內經十八篇其實素問之書最古張仲景傷寒論序引及之可信為漢世所傳之舊若以靈樞為黃帝內經則其說創於唐之王冰而以前未見有靈樞之名宋晁公武讀書志已謂好事者於皇甫謐所集內經倉公論中抄出之名為古書批靈樞是唐人偽書四庫提要考證甚詳而俗人竟謂是軒岐真本抑何可笑乃爾頤按王冰之素問注中始引靈樞是靈樞之書傳於王氏無疑蓋傳書之人即偽撰之人古之偽書大部如是所以杭世駿道古堂集靈樞經跋語直謂其文義淺短為王冰偽託可知云云頤謂靈樞一書固成之於王氏之手然詳校之無一條非甲乙經之舊但變易其篇名改竄其字句顛倒其先後則已抄胥伎倆尤其鄙陋後之誤以為古書者皆未考之甲乙經耳是以頤於此編引甲乙而不引靈樞誠以晉人之書因遠在唐人偽本之先耳而自漢迄唐皆從外風主治訛以傳訛竟如鐵案而牢不可破幸有河間東垣丹溪諸家之論而後為火為氣為痰病屬內因又復漸漸發明藉以提撕後學惟是火之升氣之逆痰之壅皆其肝風煽動有以載之上浮是肝風為病之本而火也氣也痰也皆其標乃讀諸家之論但知於火氣痰三字竭力闡明而反將主動之肝風略而不問則欲為清火而火必不退欲為順氣而氣仍不納欲為化痰而痰亦不減卒之皆無捷速之效此則金元以來雖有類中風之名稱可以區別於漢唐專用溫散之真中風而所謂痰中氣中諸病固以盡人能知然治療仍鮮實效者則專治其火氣痰而不能注重於平肝熄風之過也批金元以來類中病情論者已詳惟尚少平肝熄風之法所以少效一朝說破誰不恍然大悟要之即以素問而論內風為病固已數見不鮮惟散在各篇之中忽略讀過每不知其即是肝風內動之證且又各明一義並不明言其為內動之風而後人之讀古書者惟知於中風之字面上以求古人之所謂中風而更不能尋繹於不言之表遂使古人精義之流露於字裡行間者皆不得領悟其旨趣於是漢唐之世墨守此中風二字競用風藥表藥以治內風辛散溫升更以鼓激其奮迅之勢是洪爐烈焰本已飛揚不使潛息於一室之中而反門戶大開助之煽動豈不速其燎原頃刻灰燼此則素問未嘗揭明內風為病有以釀成浩劫當亦古人之所不及料吾知自漢迄唐內風病之誤於續命諸方者必非少數今者伯龍氏尋繹素問大厥之旨而內風暗恣擾亂神經以致昏瞀僵仆之真實原委亦既灼然無疑則古人專用溫散辛燥之法其謬亦堪共信而所謂潛陽鎮攝之功用仍是見證治證一定不易之理本非別開生面眩異矜奇是必以內風二字鄭重讀之而後此病之真情實理庶幾大白於天下後世也批潛陽鎮攝之法本是作者發明之真義乃不矜創穫而視作尋常理法是誘掖後進與人為善之微意也真儒至性菩薩心腸具此救苦救難之熱忱不可不授學子以易學易行之捷訣第四節論醫學家類中之病名不如徑作內風之明顯金元以前無所謂真中類中也蓋古人之所謂中風者皆外風耳寒風耳既以為真是外來之寒風所中則治療之法惟有辛溫表散以祛其風勝其寒對病發藥直捷爽快此古人不知有內動之肝風不知有肝陽之風火固不必為古人曲諱者也自河間東垣丹溪諸家之論出而始知舉世之所共指為中風者本未嘗感受外來之邪風然又心疑於古人之恆以風藥表藥治中風者意謂古時必有邪風中人之病於是以古書之中風謂之真中而即以其發明之痰中氣中等證謂之類中以視古人之不問內因外因而惟從事於麻桂羌防姜辛烏附者其議論固已大有區別而治法亦切近一步矣然既有類中之名藉以立異於古人之所謂真中則必以感受外風者為真中而以未感外風者為類中所以河間之論類中謂為心火之暴盛而並謂非肝木之風東垣之論類中謂為本氣之自病而亦謂非外來之風邪丹溪之論類中謂為濕痰生熱痰熱生風而亦不以為肝動之風究之五臟之性惟肝為暴合德於木動則生風且其氣左升剛果用事苟不順其條達之性則橫逆恣肆一發難收其為病也氣火升浮痰涎上壅皆其有形之見症然必以無形之風陽為之先導而後火也氣也痰也得憑藉之力而其勢愈猖此內風為患暴戾恣睢斷非外風之襲人肌表者可以同日而語乃論者惟知有痰中氣中諸候專治其有形之火與痰而不治其主動之肝陽宜其無應手之捷效此無他知其為類中而以為既名為類即所以別於真中之風邪而遂謂類中之與風無涉於是柔肝熄風一層最為是病之緊要關鍵而略過不談則凡是類中皆不可治抑知氣中痰中諸候無不猝然眩暈而漸至昏憒神迷涎流傾僕是皆肝陽陡動為虐亦即氣血沖腦之變苟非亟投鎮攝以靖內風則當狂飈鼓舞天旋地轉之交日月無光耳目矇蔽將何以澄清宇宙掃蕩群霾壽頤以為與其仍類中之名泛而不切不能得其要領毋寧以內風二字揭諸天下而顧名思義易得旨歸是以輯錄此編即以內風挈其綱領庶幾名正言順以見潛陽熄風一法本是治內風者應有之要義而後之學者乃不復以新奇為疑則病得有正當之治療而壽頤探討古今所費日力為不虛是亦私衷之所竊慰者矣批既定其病名曰內風而後潛陽攝納之治法自然名正言順第五節論甲乙經之中風本是外因而始有以內風之病認作外風之誤吾國醫書自素問而外當以甲乙為最古乃皇甫士安採集古書而成之其藍本當猶在仲景之前此嗜古之士所當抱殘守缺動懷古之遐思者也乃近世醫家恆奉靈樞為經反置甲乙而不道數典忘祖其蔽深矣惟以中風言之則甲乙經中風二字亦不多見惟病形脈診篇有身之中於風也及五臟之中風二句靈樞邪氣臟腑病形篇本此又頻言邪之中人虛邪中人如經絡受病篇靈樞百病始生篇本此陰受病發痹篇靈樞刺節真邪篇本此皆言病之次第傳變無不以風從外感立論與素問之所謂中風最為吻合絕非後世昏僕之中風可以比擬又十二經脈絡支別篇謂肺手太陰之脈氣盛有餘則肩背痛風寒汗出中風靈樞經脈篇本此則亦外感之中風肺主皮毛故外感之邪從皮毛而入即為肺手太陰脈之病所謂氣盛有餘者是外感邪氣之盛凡風寒感冒畏風惡寒皆是此即世俗之所謂傷風而甲乙經亦謂之中風可見與仲景之太陽中風雖一屬足之太陽一屬手之太陰經絡不同而同是在表之風寒則同謂之中風仍與素問之所謂中風無異其非痰壅昏僕之中風固彰明較著者也批此皆外風確鑿可信頤按甲乙此節風寒二字當作惡風寒蓋傳寫者脫一惡字與傷寒論太陽篇之惡風惡寒同義若無惡字即不可解今本脈經及千金方引此節皆作肩背痛風則又缺一寒字更不可從乃其八正八虛八風大論一篇則獨創異說大是駭人其文曰風從其沖後來者名曰虛風賊傷人者也主殺害必謹候虛風而謹避之避邪之道如避矢石然後邪弗能害也又曰風從南方來名曰大弱風風從西南方來名曰謀風風從西方來名曰剛風風從西北方來名曰折風風從北方來名曰大剛風風從東北方來名曰凶風風從東方來名曰嬰兒風風從東南方來名曰弱風又曰凡此八風者皆從其虛之鄉來乃能病人三虛相薄則為暴病猝死又曰聖人避邪如避矢石其三虛而偏中於邪風則為擊僕偏枯矣又曰賊風邪氣之中人也不得以時然必因其開也其入深其內亟也疾其病人猝暴又曰人有猝然暴死者何邪使然曰得三虛者其死疾得三實者邪不能傷也乘車之虛逢月之空失時之和人氣之少今靈樞無此四字因為賊風邪氣所傷是謂三虛故論不知三虛是為粗工若逢年之盛遇月之滿得時之和雖有賊風邪氣不能傷也靈樞九宮八風篇及歲露論本此遂以擊僕偏枯猝然暴死認作偏中邪風乃與素問中風之旨大異批此誤認內風為外風之作俑又是鑿鑿可據繹其辭旨蓋本於素問八正神明論而演成之壽頤謂八正神明篇之所謂八風虛邪八正虛邪等說已覺文義晦澀不可索解且亦無可證實而甲乙此篇竟因八正八虛二語演成此怪誕不經之說欲以警世駭俗是為文字之妖觀其以八方之風各立名目離奇怪僻擬不於倫全無義理可求是何異於讖緯書中五帝號之靈威仰赤熛怒含樞紐白招拒葉光紀之名稱海市蜃樓本無實在而其書確出於秦漢人之手可見古人自有此一派邪僻之學而甲乙此篇文義多不聯屬辭旨多不條達尤為譾陋其所謂風從沖後來者名曰虛風賊傷人者必謹候虛風而謹避之試問何者謂之沖後將何以謹候之而謹避之又謂八風者皆從其虛之鄉來乃能病人則又何者為虛之鄉豈非惝恍迷離莫可究詰夫以人體及病情而言虛實可說也乃天空之風而亦有虛實寧非大怪且更有所謂虛之鄉者則真是捕風捉影之談何所取證批辨得何等透徹可知甲乙此條全是架空必不可信縱是古人自有此一種學說亦是占角望氣左道惑眾之流於醫理病理有何關係雖似此杳冥恍惚之言在素問亦所不免而甲乙經為尤多本可不錄惟此條所謂三虛而偏中邪風則為擊僕偏枯又謂賊風邪氣中人病人猝暴則竟似猝暴中風昏僕偏枯之病皆即感受此外來之賊風所致是以內風陡動誤認外風既昧於此病之實在證情而徒以空言強為附會顯與素問之所謂中風及僕擊偏枯二者大相刺謬且因此一條而遂開後人專以散風泄表之藥通治內風暴動之病謬戾最甚貽害最深不可不辨蓋其所謂擊僕偏枯者即忽然昏僕如有所擊而肢體偏廢癱瘓不遂也是即內風肆虐火升痰升氣血上壅激亂腦經之候在今日固已證明本與外感之風渺不相涉且在素問亦未嘗謂之中風通評虛實論所謂僕擊偏枯肥貴人則高梁之疾已明言富厚之家肥甘太過濁膩壅塞聲色貨利戕賊真元馴致陰虛火動痰熱生風之病未始不與大厥薄厥數條隱隱符合且與今之西學家所謂血沖腦經之情狀息息相通而素問之所謂中風則止以風邪外感言之亦未嘗雜以暴僕偏枯諸症批引證鑿鑿言明且清試遍讀素問全部雖外風內風尚未分析明言然兩者之各明一義絕不相混則顯而可指信而有徵初不料甲乙是篇竟創此模糊疑似之說乃始以內風之病比附於外風之因豈非未悟素問之旨而以臆說欺人此則以經證之而甲乙此條已可不攻自破惟以甲乙之書終是中古相傳之舊世之談醫者多宗之而唐人偽撰靈樞又全錄甲乙之文舉世方共尊之為上古醫經又誰敢輕加評議宜乎外風內風永永混淆莫能是正遂令漢魏隋唐之言中風者無不以昏僕不遂等症一概作為外風所以千金外臺中風方論各成巨帙論症則昏迷欲死皆是邪風論治則麻桂羌防千方一律乃令內風猝動之病情治法幾不可得之於漢魏六朝隋唐諸名醫之言論而猝暴昏僕之中風勢必百無一治追源禍首當以甲乙此條為始作之湧為害之烈誠不下於洪水猛獸此記所謂言偽而辯以疑眾之可殺者也批老吏斷獄無枉無縱若篇中文字忽謂賊風忽謂虛風忽謂三虛相搏則為暴病猝死忽謂三虛而偏中邪風則為擊僕偏枯疑是疑非忽彼忽此尤令人頭腦冬烘無從捉摸正以其議論之皆是鑿空所以竟無一定主義更不足辨矣或謂暴風中人頃刻僵絕如明人玉機微義所述甘州大風之事固亦有之玉機微義此條詳見後文真中風病必不多有條中則甲乙經此節正可引作真中風之確證又安見昏憒暴僕者之皆是內因且古人中風之方必以散風溫中補虛三者並進本為虛而受邪設法似甲乙此說未可厚非頤謂玉機微義之事是偶然之異氣不可以論民病之常且亦非素問所謂中風之本旨蓋昏憒暴僕之病素問固皆在內風之例而人之病此者多未嘗猝遇暴風之變也若夫自漢迄唐中風各方皆主溫中泄表補虛者又因甲乙經三虛而偏中邪風一句如法炮製不問病情之是否合用此又一犬吠影百犬吠聲之惡習正是甲乙此條之應聲蟲醫道至此可謂迷惘已極而病家何辜慘罹浩劫亦大可憐矣第六節論仲景傷寒六經皆有中風本言外感之風而後人誤以內動之風附會六經遂有中風中經絡一說傷寒論太陽病發熱汗出惡風脈緩者名為中風本是外感風寒之病與今之所謂傷風無分軒輊故主治之桂枝湯溫經散寒和調營衛而已乃作注者且謂仲景不曰傷風而曰中風恐與鼻塞聲重之傷風相混云云則過於重讀傷寒論而疑仲景所言必非輕淺之病遂不問其證情之若何用藥之若何幾以傷寒論為不易讀而傷寒方亦不易用本淺近也而反以為艱深此仲景書之所以束諸高閣而醫道之所以一落千丈也批世之讀傷寒論者隱隱然自有此心理然皆其學識之未到耳果有真知灼見則仲師成法無不切中病情安見古人之方必不可用之於今日要非有實在經驗者因亦未易言此也其亦知太陽病為表病之第一步桂枝湯治中風證止是溫經解表極輕極淺之功用乎觀仲景以中風為外感風寒之病蓋當時尚無傷風之名稱絕非中與傷之字義果有輕重於其間王秉衡重慶堂隨筆亦言傷寒論之中風即後世之傷風傷與中字義無殊又可見其所謂中風者其症為發熱汗出惡風則當時之對於昏憒暴僕者必不謂之中風仲師之旨固與素問若合符節惟傷寒論之中風不僅太陽一經陽明有中風少陽有中風而三陰經亦各有中風之條然其病皆在經絡本未嘗深入腑臟蓋以風邪中人侵入肌腠經絡本不擇定一經太陽屬表陽明少陽其經亦皆屬表即曰三陰屬裡然三陰之經亦無不在表也仲景六經皆有中風正與甲乙經病形脈診篇所謂或中於陰或中於陽上下左右無有恆常之說同一理論壽頤按萬病皆以六經論治蓋經絡者如臟腑之枝葉臟腑者如經絡之本根病之輕者多屬經絡重則漸及腑臟固不僅外感之病必先見經病也而外感六淫之病又無一不先從經絡感受但不能拘執一經以為受病之始如寒邪多先見太陽證溫邪即多先見陽明證及少陽證仲景傷寒論次序以太陽病始者正以風寒之邪必多先入太陽經亦以太陽循行部位自頭至足所過之地位最多外感初步必多太陽見症故耳非謂傷寒之病必先太陽次陽明次少陽如行路者必按部就班循次進步也自諸家之注傷寒論者多謂太陽為六經之第一層故表病必先太陽已未免強分層次執一難通又有謂六經傳變之次第必先太陽而後遞及陽明少陽以入三陰者則又誤以仲景傷寒論之次序認作病情傳變一定之次序抑知病狀萬端活潑潑地豈有依樣葫蘆逐步進退之理素問熱病論一日太陽受之二日陽明受之云云雖曰言其步驟之板法以立之標準固無不可頤終嫌其說得太呆恐非醫理之上乘而為傷寒論作注者又有拘執一日二日三日等字面教人必以日數推算而辨其病在某經者抑何呆笨乃爾批陳修園傷寒論淺注此病最深又有知一日二日之必不可以分別六經傳變者則又造為氣傳而非病傳一說尤其向壁虛構畫蛇添足更非通人之論試觀仲景六經皆有中風之明文甲乙經或中於陰或中於陽之說可見六經無一不可為受病發端之始又何得曰一日必在太陽二日必在陽明三日必在少陽乎近賢論傷寒溫熱病之傳經已知病之輕而緩者多日尚在一經不必傳變病之重而急者一日遞傳數經難以逆料最是閱歷有得之言學者必須識此庶不為古人所愚要之手足十二經本無一經不能發病而其傳變也亦惟病是視必不能謂某經之病必傳某經然後可以見證論證見病治病心靈手敏應變無方豈不直捷而傷寒傳足不傳手溫熱傳手不傳足之說皆是誓言胥當一掃而空不使束縛學子之性靈方是斬絕葛藤之大徹大悟批傳經之理惟此數語足以盡之須知十二經病必無一定傳變則傳足傳手聚訟紛紜者豈非多事此與昏憒猝僕之中風病由內因者源流各別必不能混為一家凡在醫家固無不知傷寒論之中風與雜病之中風顯分畛域然而宋金以後每謂昏僕之中風有中經絡之一候且申言之曰中經絡者必外有六經形症通以小續命湯加減主治則即從傷寒論之六經中風附會而來其意蓋謂昏僕之中風即是外感之風則風從表受自然先及經絡見仲景之傷寒論既有六經中風明文而千金外臺專治猝中風欲死之小續命湯又有桂枝麻黃合於仲景太陽證治因謂此方可治在經之中風豈知制此續命之人固已誤認昏僕之中風同於傷寒論之太陽中風乃竊取仲師聖法合用麻桂二方加味不知方中既用麻黃防風發汗而合用芍藥斂陰已失仲景桂麻二方分證論治之正旨桂枝湯治太陽有汗故以桂枝和營衛即以芍藥斂陰液麻黃湯治太陽無汗故雖合用桂枝之和營衛而必去芍藥桂枝麻黃二方之分治其主義即在麻黃芍藥一發一收而更合以附子之溫黃芩之清人參之補龐雜已極全非仲師家法乃後人見其麻黃與桂枝並列謬謂此即仲景太陽經成例又見其方中並有陽經之黃芩陰經之附子遂謂可以通治六經實屬顢頇已極批申言小續命湯等方不合仲聖六經條理則似此諸方之良窳可知觀其層層辯駁始知宋金以來竟無一人不在夢中說夢真是奇事至易老而定為六經加減之法蓋亦心知是方之必不可以通治六經因而為之更定其君臣增損其藥品以求有合於仲師六經條理究之亦表亦裡亦溫亦清叢雜繁蕪仍無法度可言又安能用之而有效力批易老六經加減古人方以為銖兩悉稱豈知經此一番議論而潔古老人苦心孤詣竟為蛇足所以有前賢畏後生之說也景岳之論續命湯已謂水火冰炭道本不同縱有神功終不心服真是見到之語頤則謂小續命湯之治猝中風欲死本是附會傷寒論之太陽中風而制此鴻檬未判之奇方乃後人之論中風有中經絡之一證又附會小續命之可治太陽經而造此不可思議之病證要知昏瞀卒僕之中風既非在表之風邪必非小續命湯之龐雜所能僥倖圖功且猝中風欲死之證本不在傷寒論六經中風例中又何嘗有一是六經之形症然則凡百醫書對此昏瞀卒僕之中風恆嘐嘐然教人辨別六經而仿用潔古老人之加減續命法者最是此病之魔障批說明內風昏僕本不在六經條理之中則金元以來凡百醫書教人辨認六經而用藥者豈非笑話不能解脫此層束縛必不可語以氣血上菀之原理而是病終不可治學者果欲求切實有效之治驗則古今各家書中似此陳陳相因之庸腐議論不可不湔除淨盡者也壽頤按凡百病證輕者皆在經絡重者則入腑臟所以論病必當認定經絡腑臟分證論治固不獨傷寒溫熱不能不守仲聖六經之範圍也葉氏之論溫熱既誤信傳手不傳足之說杜撰首先犯肺逆傳心包兩層竟將陽明一經最多最要之病置之不問已聚六州之鐵鑄成大錯然此老亦明知溫病熱病必多陽明經腑之症第苦於一口咬定手經在先則胃是足經無以自圓其說乃更倚老賣老信口雌黃捏造河間溫熱先究三焦二語隱隱然以自己所說之肺病心病歸之上焦即以世間恆有之陽明熱病歸之中焦純是掩耳盜鈴手段其計不可謂不狡然自欺欺人終不能使天下後世不一讀河間之書試問溫熱三焦之語果出何處則臆說立見其窮可嘆鞠通不學竟以讕言作為鴻秘所撰條辨即以三焦分篇而耳食之徒又能信此兩家寶為兔園冊子所謂葉派者遍於國中於是治溫熱者絕不聞分經辨證之論豈不可駭獨此昏瞀猝僕之中風則是氣血上衝之腦神經病不在十二經絡例中而論者反欲拘執六經強為比附一則有經可據而無端破壞之一則無經可尋而反以附會之皆是邪說淫辭不可不正然以中風附會六經者則古時腦經之理尚未發明僅憑思想而有此誤會亦當為古人曲諒以視葉氏之妄作聰明破壞仲師條理者其罪猶當未減第七節論金匱之中風本言外因而所敘各證皆是內因之誤金匱要略中風篇其開宗明義第一句曰風之為病固言外感之風也其次節則曰脈浮而緊寒虛相搏又明言外感之寒風然其所述病狀則喎僻不遂昏不識人身重不勝舌強難言皆內風陡動氣血沖腦之病而金匱又明明謂之賊邪在經在絡入腑入臟絕非素問中風之真旨此蓋甲乙經偏中邪風擊僕偏枯及賊風邪氣傷人病人猝暴之說導其先路也惟以金匱之書出於仲景之手則不無大可疑者今試錄其全文而明辨之如下壽頤按金匱玉函為仲師舊本亦經晉人王叔和編次似不可謂仲景承甲乙之誤然據皇甫氏甲乙經自序其所採集之書皆仲景以前之古本則仲師之時雖尚無甲乙之經而其中舊說固皆仲師之所已見者也惟今之金匱要略則出於宋世考陳振孫書錄解題曰此書乃王洙於館閣蠹簡中得之曰金匱玉函要略上卷論傷寒中論雜病下載其方云云則既名要略必非仲師之舊且亦非叔和編次之本批此今本金匱之所自出無怪其詰屈謷牙至不可讀讀者當注意於此弗謂仲師聖人不容加以評議也其第一節曰夫風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然則所謂中風者以風邪之在經隧者言之故以半身不遂及但臂不遂之痹皆謂之中風使然雖與傷寒論之太陽中風發熱惡寒者不同而同為外風之襲入經絡尚非昏瞀暴僕之中風謂之外風所中亦無不可要之不遂之病其因有二有氣血不充而為風寒濕邪三氣所襲者其病以漸即此條所謂風之為病半身不遂或但臂不遂之為痹者是也治宜養血通絡視其風寒濕三氣之偏勝者而徐圖之古來宣痹通絡諸方皆為此證而設是亦外因也其氣火上升內風暴動激亂神經者則其病以暴所以猝中風者忽然肢節痿廢掣痛不仁是也治宜潛陽鎮逆定其上湧之勢使腦不受激神經不亂而癱瘓痿廢不遂不仁皆可立愈是內因也二者之不遂固同而淵源大異批於不遂痛痹之中分出二種病因明白曉暢直是從古不傳之秘鑰益人智慧不淺且病發之初一緩一急其形態亦自有可辨而治法則大相懸殊然古今醫籍尚未有洞徹此情為之分別論治者則以腦神經之說古所未知而內因外因無不混合為一皆作外風治療所以古來之治此不遂者方藥雖多恆不一效金匱此條之所謂痹未必果皆外感之風邪而竟無內風沖激腦經之病乃止曰風之為病曰中風使然亦僅以外因之風立論而不及內動之風所以千金外臺治此不遂之方無非祛風溫經一派此即甲乙經所謂偏中邪風擊僕偏枯一語有以誤之矣其第二節曰頭痛脈滑者中風風脈虛弱也則仍是傷寒論之中風頭痛者即太陽外風之頭痛也脈滑者風為陽邪故脈滑利脈虛弱者感邪輕淺故脈不堅實亦與太陽病之陽浮陰弱同義考證此節十二字今本金匱要略無之考脈經八卷中風歷節脈症篇章節字句皆與今本金匱要略大同頗似王叔和所見之金匱即同今本惟其第一節之後多此一節詳其文義與仲景傷寒論之太陽中風最為符合可見金匱之中風亦主外因是皆古人所謂中風之本旨也茲據脈經補此一條正以證明古之中風固無有雜以內因之肝風者耳批佐證確當言明且清其第三節曰寸口脈浮而緊緊則為寒浮則為虛寒虛相搏邪在皮膚浮者血虛絡脈空虛賊邪不寫寫今本作瀉古今字或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎脈經作口吐淤涎則詳述中風各症凡喎僻不遂身重不仁神昏舌強等皆素問中風條中所未及是與素問之所謂中風絕異批素問之所謂中風無此諸症讀者必須注意然後方知金匱此節皆是內因而金匱此篇固明明以中風標題則顯然非素問中風之正旨其以在經在絡入腑入臟四者分別條例又即後人於中風一門分為中經絡中腑中臟之鼻祖亦與素問所言中風傳變之狀態各自不同蓋至是而中風之病名乃專屬於喎僻不遂昏憒暴僕之症遂與素問傷寒論之中風病在經絡以次遞傳由淺而深者顯然大別而即以金匱此節為其承接轉戾之機軸以皮膚經絡腑臟數層分別病態其意蓋謂同是外風之所中而受病之處各有淺深之不同非自表及里以次遞傳者可比批古人之意無不如是而從此鑄成大錯矣而必以寸口脈浮而緊緊則為寒浮則為虛寒虛相搏邪在皮膚五句挈其綱領則又明指正氣虛餒而寒風外乘遂為暴中此則古人之治中風所以必用麻桂羌防解其表姜辛烏附溫其中參耆朮草補其虛數者皆備並進兼營是為一脈真傳淵源有自金匱本條初無方藥近人之作注者每謂此條之下次以侯氏黑散即為此證之主方然黑散一方亦是後人附入必非作者本意蓋本條敘症甚多乃是條舉而並列之辭非謂凡是中風者必一時而畢具此種種見症本無專用一方可以統治經絡腑臟之理則金匱之不出方者自有深意而注家乃欲以一方通治之最堪噴飯批黑散一方豈獨不可以治內風亦必不可以治外風解見第三卷古方平議惟既以寒虛相搏邪在皮膚兩句定為此病之樞紐則當用之藥亦必解表溫中補虛三者咸備而後可為對病千金外臺多數續命湯散不啻為寒虛相搏邪在皮膚者出其正治之法此又古人於昏僕猝倒之中風無不認為寒風外受之恆例者也然以近今所見之昏瞀猝僕諸症言之無一非肝陽暴動氣升火升熱痰上湧氣粗息高正與古人之認作寒虛者絕端反對是古為外風今為內風古之外風為肅殺之寒風今之內風為蘊隆之風火一寒一熱內因外因似此冰炭殊途枘鑿不合則千金外臺主治寒風之千百方藥必無一方可治風火自動之病而金匱所謂寒虛相搏之中風又必非風火自擾之中風皆當以病情決之而萬無兩可者是豈古今之病果有不同耶批說得淋漓盡致惟其氣盛故言之長短皆宜要之昏瞀猝僕之實在病因素問薄厥大厥二條固已明言其血菀於上氣血並走於上今之西國醫家定名為血沖腦經之病又以實驗得之確是氣火升騰迫血上湧沖激入腦因而神經瞀亂知覺運動頓失常度擾亂及於何部之神經即某一部肢體為之不用如猝暴昏僕口眼喎斜舌強不語頰車不開癱瘓不遂痰湧涎流或為目閉口開撒手遺尿諸候無一非氣血沖腦激亂神經所致是以猝然而來即病者亦不自知其所以然非如外感之邪雖亦可以深入而必受之以漸次第增劇金匱此條敘述喎僻不遂等種種見症固皆神經之變而乃指為在經在絡入腑入臟本是理想之辭則以古時腦神經之說尚未發明無所謂知覺運動皆主於腦之理則見此猝然昏僕之病四體百骸見症各異而不能推測其所以然之故因思善行數變惟風為速無以名此則姑以中風名之又不解其或病肢體或病口目或更不言不識千態萬狀莫可端倪則意想所能及者無非經絡腑臟受病之部位有淺深斯發現之病形有輕重因而倡為在經在絡入腑入臟之等級亦可謂智慮聰明心思周密批推測古人分別中經絡中腑中臟三綱本於理想洵是確論殊不知此身主宰無不稟命於腦大而肢體之運動知覺之感觸小而喉舌之言語耳目之見聞皆此腦之神經為其運用神經一亂頃刻失常肢體百骸倏忽變態而又以腦之神經布於全體偶然激亂未必全體神經盡為震動於是或為手足不遂或為癱瘓不仁或為口眼喎斜喉舌牽強或則知覺已失而運動自如或則運動不遂而知覺未泯各呈奇態種種不同而皆其一部神經之亂有以致之此則實情實理必不能更易一辭者可以證明古人中經絡中腑中臟三綱本是空談毫無實據在古人未知腦神經之作用而懸擬此等條目不可謂非理想中之能事批此是實在病情然古人未知腦有神經之作用亦無怪不識此病之真情然在今日既確有發明則大輅椎輪已為無用正不必以金匱言之而更為之曲曲塗附者也惟以金匱此條原是仲師手筆則不無大可疑者批奇峰陡起將軍下筆開生面是他人之所必不敢言而亦必不能言者考仲師傷寒論自序謂撰用素問九卷八十一難陰陽大論等庶可以見病知源是仲景著書本於素問而素問之所謂中風止言在經在表之風邪並未涉及昏瞀不遂等症所以傷寒論之中風亦止是一在經之病與素問無所歧異何以金匱亦出仲師一手而競以中風之名稱移屬於喎僻不遂昏不識人舌強難言諸症此則遍讀素問而皆不謂之中風者至金匱而始列為中風之條例大非素問本旨批確是實在證據此其可疑者一或謂六元正紀大論木鬱之發耳鳴眩轉目不識人善暴僵仆豈非木動生風猝暴昏僕之明證則是中風僵仆昏不識人亦是素問所固有批此一難亦不可少然天元紀等七篇本非素問之舊乃唐時素問已有缺快而王啟玄作注別採古醫書以補其缺者宋林億等校語謂此七篇當是古之陰陽大論是全元起注本素問之所無者則仲景所見漢時素問必不能有此即曰此專論五運六氣之七篇果如林億之說確是古之陰陽大論即仲景傷寒論序中所據之本則木盛而生火生風風為內風且是風火而金匱此條反以為寒虛相搏之賊邪是既誤內風為外邪又誤風火為寒虛更與六元正紀篇顯然矛盾仲景必不若是之武斷批辨得清澈此其可疑者二即以本條證情言之惟內熱生風肝陽陡動迫其氣血上衝入腦者乃有此猝然喎僻體重不仁昏不識人舌強難言口吐涎沫諸候其外形必有肝陽之見症可徵如面赤唇紅氣粗息高等皆是且其脈必多浮大渾濁數促之象必不獨見浮緊批此病脈症無不如是雖間亦有真陽式微虛風一煽而即見脫證者面青肢冷冷汗自流乃與金匱所言之寒虛相搏近似然此證已不多有即曰仲景當時或竟多此脫證要知脫證之寒亦非在表之寒於脈當遲細沉伏必無浮緊之理況乎當日之喎僻不遂昏不識人者豈其無一肝陽上擾之證而乃直以脈浮而緊寒虛相搏定為大綱止知有表證之寒邪而不知有內蘊之風火明是粗知醫說者附會傷寒在表之脈象模仿仲師句法造此臆說誤盡蒼生而謂仲景能為此病情脈象枘鑿不合之無稽之言其何可信批抽繭剝蕉層層都到然後知金匱此節竟不可解疑到後人模仿為之亦是可信似此咄咄逼人有情有理非有真識力真見解者安能道其隻字頤愚以為今本金匱之中風歷節病一篇文義龐雜幾於全不可解其論中風又止此三節皆不倫不類必不足以發明此中精義當是殘缺之餘掇拾為之訛誤脫俠皆所不免若就今本言之實屬無可索解醫宗金鑑於此兩節曾有訂正則亦明知脈浮而緊寒虛相傅之說與喎僻不遂之中風不能符合乃欲以下節之脈遲而緩六句與此節首六句互易無如於義仍有難通則又改竄幾字以強求其可解縱使所改者果有至理亦是自我作古終不免續鳧斷鶴之嫌況乎所改亦未必精當耶原夫古今賢哲於金匱一書不敢輕加評騭者本是尊重仲師之意誠以吾邦醫學發源最早而中古舊籍久已無傳惟仲景之書論證列方頗多可信已是醫界中最古之本自當為之推闡發明以揚國粹萬不容輕肆駁斥致啟後學荒經蔑古之心而頤則謂今之金匱要略已是宋人手錄之本去仲景之世甚遠輾轉流傳蓋亦久失廬山真面陳氏書錄解題明謂其得於蠹簡之中則斷爛不完已可想見所以是書之不可解者最多必非如傷寒論之為王叔和重編者所可一例而論批此層亦是實情既出於蠹簡之中又安能必其無淺人點竄之弊果能灼知其可疑而別有確切之發明正不妨佐證病情說明原委以求其實在之效用亦非妄肆空談輕詆先哲且此節分在經在絡入腑入臟數條即以寒風外搏言之亦不應重門洞開俄頃之間即能深入臟腑以意測之亦頗不近於理況乎於古無徵於今不信似此憑空虛構之言恐非仲景真本所固有即曰果是仲師手筆則當時本不知腦神經之作用僅憑理想而生誤會亦是情理之常今既確有所知亟為更正庸何傷於仲師日月之明批開誠布公教人尊重仲師須從實在治驗上注意不當徒慕虛名隨聲附合方於學問痛機胥有實用是真能讀仲師書而真能尊敬仲師者如必以仲師之故而姑為之曲曲附會勉強敷衍不顧情理之難安則適之厚誣古人重欺來哲吾知真能尊崇仲聖者不當如此敢冒天下之大不匙直抒己見就正高賢破除泥古之嫌冀為斯道一新其耳目凡以實事求是庶幾治療之得效耳固非師心自用妄論前人短長也若曰蔑古則頤豈敢其第四節曰寸口脈遲而緩遲則為寒緩則為虛榮緩則為亡血衛緩則為中風邪氣中經則身癢而癮疹心氣不足邪氣入中則胸滿而短氣頤按金匱此節之所謂中風更不可通身癢癮疹之症乃風熱在表或其人本有蘊熱則微風束之肌膚之熱不得外泄於是起塊發瘰癢搔遍體今三吳之俗謂之風疹塊是肌膀間極淺極輕之病雖亦可謂之風邪而何得與上節喎僻不遂不仁不識之中風連類而書相提並論乃觀本節全文則曰脈遲而緩遲則為寒緩者為虛已與風熱之癮疹顯然矛盾且更鄭重其辭曰榮緩亡血衛緩中風不倫不類文義亦不相貫串且以身癢癮疹皮毛之病而謂之邪氣中經據病理而言確是風熱侵襲肌腠其說似無不可然上節則曰邪在於經即重不勝語氣又復不符豈有同在一篇之中而忽彼忽此自盾自矛竟無一定宗旨之理而謂仲師手筆有如是之模糊隱約疑是疑非者乎要之今本金匱要略似此不可索解者最多皆當存而不論既不能強為疏通削足適履亦不當隨文敷衍虛與委蛇其心氣不足邪氣入中胸滿短氣三句亦是不相聯屬之文而注者曲為說解仍不可通亦何苦耶頤按巢氏病源候論謂人皮膚虛力風邪所折則起隱軫又謂邪氣客於皮膚復逢風寒相折則起風瘙隱軫千金方謂風邪客於肌膚虛癢成風胗瘙瘡癮之與隱疹之與軫胗皆古今字可見身癢癮疹止是微風鬱於肌膚之病金匱此條不為病源千金所採則巢元方孫思邈等亦不以金匱此說為然惟金匱既以癮疹列於中風篇益可見其所謂中風之病皆是外風此固唐以前之通例也第八節論續命諸方古人本以專治外因之寒風而已並用寒涼可見古時亦是肝火內燔之證千金方外臺秘要兩書中風之方最多約舉其例皆續命湯桂麻姜附之類也而所治之症則昏憒暴僕痰壅涎流痙厥瘛瘲喎僻不遂皆在其中忖度其意蓋謂此等見症無一非凜烈之寒風直犯經絡腑臟之病故用藥必辛散解表燥熱溫中雙管齊下此固自漢迄唐治療中風之恆例也讀甲乙經所謂偏中邪風擊僕偏枯及金匱脈浮而緊寒虛相搏兩條未嘗不脈症病情若合符節然試以所見之昏眩猝僕者言之則無非肝火內擾木鬱生風氣火上升痰涎逆湧豈不與古人之概投溫散者大相背謬豈古人之暴僕者皆屬虛寒果運會推移不可一例論耶迨以千金外臺諸方下所載病證細讀之則頭眩面赤恍惚驚悸諸候咸在其列豈非內熱生風浮陽上擾之明證而確然可據之寒風見症反不多有乃方中仍是溫辛升散之品居其多數則古人直以肝陽上僭內熱火升者一律作寒邪主治得毋可駭乃人以續命諸方所用藥物熟思之則既用附桂之溫而即兼芩芍之清已覺自盾自矛不可索解而續命散八風散等方則又桂附姜辛膏苓大黃一爐同冶更莫測其主義之何在景岳所謂水火冰炭誠非虛語要之其所治之病必有內熱可徵而後需此寒涼之藥於此可見古之所謂中風雖曰當時或多寒證而亦必有菀熱昭著肝火內燔者批於古人溫燥方中尋出寒涼之藥以證古時之病亦是內熱生風最是真據而說者輒曰古是外風今是內風得毋仍在夢中說夢然諸方之中猶必以桂附麻辛雜然並列而不問其性情之不合臭味之不投則亦習俗相沿視為成例而不自覺悟耳然則古書諸方即使古人用之亦必不能確合病情發生效力而以反觀鄉曲俗醫猶有依傍古方以治火升痰升之昏僕者舌裂唇焦如遭炮烙哀號呼謈慘不可言此雖學之不明徒讀父書適以憤事而古人之千方一律當亦不能不任其咎者矣第九節論古書所謂真中風之病必不多有漢唐之世皆以喎僻不遂昏僕不仁痰涎壅塞等症謂之中風固無不以為真是外來之賊風中人也直至金元以降類中之說日漸昌明而後知猝然暴僕昏瞀痰迷之中風固多不出戶庭未嘗蒙犯邪風者此晚近醫家所謂真中類中之界限亦即外風內風之畛域也然自真小類中顯然分別之後則類中之病所在多有而所謂真中風者不可復覯丹溪有言西北地高風寒燥烈故有真為風邪所中者此亦懸擬之辭可見真中之病在丹溪亦未必一見且可知中土平原之地東南燠烋之鄉固多內動風陽氣升火升之病而果為寒風外襲可用古人發表溫中之劑者蓋已几几乎為理之所必無者矣又證之以玉機微義明徐用誠撰劉純續增曰余居涼州其地高阜四時多風少雨天氣常寒每見中風或暴死者有之時洪武乙亥秋八月大風起自西北時甘州城外路死者數人余亦始悟經謂西北之折風傷人至病暴死之旨丹溪之言有所本也云云壽頤所見古書惟此節可為寒風中人暴病猝死之確證始能吻合真中風之名義批必如是而始可謂之真中風則可知此證必不多有而於千金外臺之中風各方皆以溫中散表為主者可為對證之藥然惟西北絕塞乃有此偶然之戾氣若在中原人煙稠密之區何致多此非常之奇變而古人藥劑竟復疊重累立數十百方而未已者初不解漢魏六朝隋唐之世何以得此許多對藥之病意者古時兩域初通發現此種奇病因而交相研究製成此大同小異之湯散抑且古人最重師承一人唱之於前自必有數十百人和之於後積之既久而中風之病既共知為一大證斯中風之方遂成此一大部況乎漢唐畿輔皆在關中本是西北剛燥之地不啻與甘涼為鄰有此寒風亦固其所批推想古人所以多此一派方藥之故確是古人必有此種心理今者地日闢而生齒日繁甘新伊涼亦已人跡富庶氣候日即於溫和已與內地不甚歧異而玉機微義所記本是偶然又何可據以為病理之常況在荊豫徐揚之域天氣和煦地脈溫柔本少嚴肅風景更安能徒讀古書妄用燥烈辛溫以鑠真陰而耗人元氣批又是真情實理蓋所謂真中風者既必以外有感觸寒風為準則凡猝眩昏僕之未遇暴風者自不得謬托於真中之名義即不能妄用古人之成方且果有如玉機微義之所云則其人必肢冷脈伏面白唇青與猝暴之中寒病相等古有參附湯三生飲諸法即為此證而設當其暴僕僵絕之時亦非續命諸方亦溫亦清者所能勝任而救急惟內風陡動之候間亦有真陽式微之脫證身寒脈伏或汗出如油冷汗如珠喘鼾欲絕皆須參附大劑急起直追庶可希冀什一此其證情治法頗與真中寒風者同一理例而實非外風外寒之病參附主治專在溫中亦非續命諸方之泛而不切者可以幸圖一效又有外觸暴風邪入經絡忽然口眼喎斜聲音謇澀而尚無神志昏昧語言迷惘諸症則果是外因風邪按之病情字義亦可謂之真中風但僅是經絡為病雖面目喎僻而舉止動作仍不改常止須通經宣絡兼以輕疏泄邪亦易得效尚無需於續命之桂附麻黃溫散太過亦有猝遇邪風口眼喎僻而兼舌謇言糊精神舉動頓失常度者則其因雖是邪風外襲而實則中無所主根本暗搖適以外風引動內風亦當從內風主治急急攝納潛鎮固其本根誤與疏風其蹶立至而續命等方辛散溫升均是大禁此又明明兼有外風而千金外臺之通治中風諸方亦復不能適用更可證真中風之果屬外因者實是不可多得而恰合續命諸方之病情者抑且必不一見批竟將古人真中風之病證方藥一概駁斥淨盡何其膽大乃爾然似此層層辨析而續命諸方竟無對藥之病則亦不得謂作者之妄作聰明蓋惟見得到乃說得出耳壽頤不敏敢謂小風一證自唐以前既一誤於止有外風而無內風金元以下又再誤於中經絡中腑中臟之三大綱究竟皆是鑿空百無一驗所以自古迄今凡百醫書無一不有中風之方論而亦無一不夢中說夢囈語喃喃此實吾國醫學中之絕大怪事世果有讀書明理潛心體驗之通人必不河漢乎斯言第十節論張伯龍之類中秘旨壽頤按張伯龍名士驤山東蓬萊人著雪雅堂醫案有類中秘旨一篇二千餘言援據西醫血沖腦經之說而暢言其原委最能發明此病之實在習醫者必讀此而始知前人所論似是而非皆不足據若西醫之說在彼以剖驗得之固有確實證據然習中學者不能推測其所以然之故則亦必不肯信非得伯龍氏據素問氣血並走於上則為大厥一條以互證之則是病之原理必不足以標示天下即西醫之說彼亦止能言其然而不能知其所以然斷不能語以素問大厥之旨伯龍獨能融會而貫通之始知中醫之說理真切絕非新學之研究形色者所可作一例觀也伯龍此論雖若為是病別開生面實則撥雲霧而見青天始為世界放一光明景象以此二千餘年迷離恍惚之中風一病乃有一定不移之切實治法豈獨談中醫者從古無此經驗即治新學者亦萬萬無此理論無此實效功德及人夫豈淺鮮自謂秘旨洵非虛語然頤讀之而更有說焉內動之風發源於氣火之上衝固是不易之定理惟自丹溪西北有真中風東南為濕熱痰之說印入人心學者鮮不謂氣火上升之證盛於東南而必不可概西北然自河間主火之說創之於先而是病始有門徑可尋今更得伯龍潛鎮之法繼之於後而是病竟有捷效可據河間北人伯龍亦北人也其亦可以悟徹此中真理而不必拘拘於其人其地乎伯龍於光緒中葉嘗來滬上其雪雅堂醫案即以甲辰年活字版排印小小兩冊頗不顯於世然似此精確不刊之名論決不與草木同腐壽頤以壬子之春得見於友人齋頭讀其論證處方理法切實而用藥亦朴茂沉著頗覺北方渾厚氣象隱隱然流露於字裡行間顯然與江浙之輕靈者迥然各異其旨趣而是論之屏絕浮言獨標真義尤為二千年來絕無僅有之作已將其醫案手錄一編留待問世壽頤擬輯古今醫案加以申義名之曰古今醫案平議已分類編纂粗具條理如傷寒溫熱雜病女幼外瘍諸科各為一編以免繁重今傷寒溫熱及內風腦神經病兩種已先脫稿其餘諸科尚未潤色完備伯龍之雪雅堂醫案則紹興醫藥學報社又重印行世而於類中秘旨一篇亦已參入拙見間為訂正以求至當茲輯是編即以舊稿稍稍整理備錄如下苟有同好之士不以頤言為謬而辱教之則豈獨鄙人之幸抑亦國學存亡繼絕之一大關鍵也企予望之張伯龍曰類中一病猝倒無知牙關緊閉危在頃刻或見痰或不見痰李東垣主氣虛而治法用和臟腑通經絡攻邪多於扶正屢試少驗壽頤按東垣之論類中謂陽之氣以天地之疾風名之此中風者非外來風邪乃本氣自病也凡人年逾四十氣衰之際或憂喜忿怒傷其氣者多有此疾壯盛之時無有也若肥盛者則間有之亦是形盛氣衰耳治法當和臟腑通經絡便是治氣云云雖能知其非是外風然主氣虛立論貌視之似亦探本窮源誰得以為不合於理實則最是浮泛之談邪之所湊其氣必虛無論何病無不可以氣虛二字籠統罩上冠冕堂皇自欺欺人最無意味且果是氣虛則治法自當以補氣為主東垣一生專以補中益氣四字為其全副精神然試問昏瞀猝倒之時氣升火升痰涎壅塞參耆升柴是否可投此在粗知藥理者皆能知其不可妄試批駁斥氣虛之說以為空話乍聞之未免可疑然似此反復說來又是確論東垣其何以自解則不宜於益氣之治者又烏得泛稱之為氣虛蓋此病之火氣痰泛溢上衝正素問所謂氣血並走於上之候血與氣並則為實焉經有明訓雖病本為虛而病標則實當此猝暴為變治標為急況乎標實本虛正是反對萬不能捨其現狀之壅塞於不問而遠顧其根本之虛則東垣所謂四十氣衰形盛氣衰二層縱能確合猝僕之本源言之成理而不能准此大旨以為治療是為玉卮無當不適於用不及河間主火丹溪主痰之切實批更說到病是氣實則東垣所謂虛者真是夢中說夢妄不可聽矣近有王清任之醫林改錯用黃耆四兩為劑加入通絡藥數味謂能治此病則即從東垣氣虛之說附會為之不知耆能助其氣火之升痰涎之壅抱薪救火非徒無益而又害之甚矣紙上談兵而全無真實體驗之為害厲也即東垣所謂治法當和臟腑通經絡之兩層又與氣虛之旨各不相謀且亦是泛辭急病緩投何能有濟而東垣又有中血脈者以小續命湯加減中腑者以三化湯通利等說更謂養血通氣主以大秦艽湯羌活愈風湯云云皆是胡言亂道信口雌黃亦且與氣虛二字毫不相應蓋既非外風何以用續命愈風之方既是氣虛何可又用三化湯之通利而大秦艽湯羌活愈風湯又何能養血通氣可見東垣於此竟無一線見解所以議論忽東忽西自矛自盾徒為浮泛不切之言拾他人唾餘以取盈其篇幅最為鄙陋批東垣此論本是勉強敷衍全無實用今得如此說明竟覺無一字不是荒謬讀古人書安得不自具隻眼惟俗學慕其金元大家之虛名談類中者恆節取其氣虛二字自謂能讀東垣之書姑申是議以告學者而陋者猶有套用補中益氣之成方以治肝陽上逆之病則木已搖而拔之適以速其蹶矣亦知脾胃之虛清陽下陷者宜於升而肝腎之虛浮陽上泛者必不可升耶頤每謂金元四家惟東垣之書文義最為不順即其醫理亦時有未盡清澈者式觀此節所引已可概見伯龍於此借作點綴而隨手撇開是也惟劉河間謂將息失宜心火暴盛腎水虛衰丹溪又贊之曰河間謂中風由將息失宜水不制火者極是余又參之厥逆一證素問調經論謂氣之所併為血虛血之所併為氣虛有者為實無者為虛今血與氣相失故為虛焉血與氣並則為實焉血氣並走於上則為大厥厥則暴死氣復返則生不返則死批伯龍之絕大發明全從素問此節悟入是讀書之得間處讀者不可忽也此即今之所謂猝倒暴僕之中風亦即痰火上壅之中風證是上實而上實由於下虛則其上雖實而亦為假實縱其甚者止宜少少清理不得恣意疏泄而其下之虛確是真虛苟無實證可據即當鎮攝培補頤按上實本於下虛蓋謂虛陽之上升即本於真陰之不足原其始而要其終謂之假實似無不可然當其氣火俱浮痰涎坌湧之時窒塞有餘必不可仍以為假蓋雖非外來之實邪而為氣為火為痰無一非實病之確據降氣清火開痰又無一非實病之治法乃伯龍氏竟謂上實亦為假實殊有語病且少少清理不得恣意疏泄兩句亦欠斟酌夫以氣火奔騰濁痰窒塞之時急急清理猶虞不及而顧可病重藥輕養癰貽害有是理乎且病非外邪識之既真又何致有恣意疏泄之誤伯龍此說蓋猶認其尚有外來之邪所謂清理疏泄四字仍主外感一面言之殊可不必至於鎮攝培補四字一氣呵成尤其不妥氣升火升鎮攝是也若曰培補則滋膩之藥豈濁痰壅塞之時所堪妄試此中分寸不可不知批伯龍此節自有語病假實真虛兩兩對照尤為不妥總之欲用滋膩而不悟其害得山雷逐層洗刷而病理之真情畢露則伯龍之誤亦堪共信是真能為伯龍補過者伯龍有知亦當佩此諍友今西國醫家以中風證為血沖腦氣筋之病謂人身知覺運動皆主於腦可以兔與鵲試之余嘗以兩兔用針錐傷其腦以試驗此說之是否可信一則傷其前腦而即已僵仆不動然自能飲食越十餘日不死一則傷其後腦而時時奔走遇物礙之則僕而不知飲食數日餓斃因此悟及素問血氣並走於上則為大厥厥則暴死之病即今所謂中風猝倒不知人事之病益信西醫血沖腦氣筋之論與素問暗合可以互相引證批此是實地試驗而知覺運動各有專主闡發病情猶在西人解剖之上蓋皆由木火內動肝風上揚以致血氣並走於上沖激前後腦氣筋而為昏不知人傾跌猝倒肢體不用諸症批此說最精真是二千年來從未發明之秘頤按據伯龍此說則前後二腦分司運動知覺前腦專主運動故受傷則不能運動而知覺未泯後腦專主知覺故受傷則知覺已失而運動自如考西人解剖之學腦部之分析界限頗細不獨分為二部然約舉之亦以大腦小腦分為兩種大腦即前腦小腦即後腦也神經之說治兩學者皆謂導源於腦及脊髓而分布於肢體百骸凡全體之運動知覺無一不繫屬於神經而統之於腦此其理之有可信者但知覺之與運動二者新學家亦皆渾融言之尚不能分別統系以何者專司知覺何者專司運動蓋解剖之能細細剖驗者無非據屍體剖割觀其支分派別而其人已死氣血俱停徒具血肉之形骸久失性靈之作用更安能辨別其有生時之動作行為若何支配此亦治解剖學者無可奈何之缺憾而亦萬萬無術以補救此缺憾者也批說到解剖之學必不能推測其生前之知覺運動治西學者又有何說今伯龍氏能知前腦主運動後腦主知覺既據實驗得之其說固自可信然則昏瞀暴僕之中風有或失知覺或失運動之異者即其氣火上升迫血入腦激亂腦神經之或在前或在後耳由是推之而是病之或為口眼喎斜或為語言謇澀或為半身不遂或為全體癱廢皆其神經之震動屬於何部則其部之不用隨之雖見症各有不同而皆屬於氣血沖腦神經為病有以致此所以病發暴戾頃刻而來無論何病皆無此迅疾則電學之作用雖路逾萬里間隔重洋無不一氣呵成此動彼應捷於影響此又證以科學原理而萬無可疑者也但木火上衝有虛有實其實者如小兒之急驚周身搐搦用清肝通大便藥一二劑即愈壽頤按小兒之急驚雖曰木火自盛有似實證要之幼稚之體陰血未充陽氣偏旺俗稱小兒為純陽者即以陰分不足而言故有肝火暴動激動熱痰上擾生風發為抽搐瘛瘲甚則痙厥俗名驚風皆是內風自動是以為病暴疾與大人之猝然昏僕者不異不得以大人之中風為虛病而小兒之驚風為實病也批小兒之急驚即是大人之內風猝動證情治法無不皆同然古今醫家尚無此直捷爽快語伯龍此說似尚未允惟小兒無情欲之病其陰虛也乃發育之未足非戕賊之損傷確與成人之陰虛者不同是以伯龍云然讀者不可以辭害意其虛者則真水不充不能涵木肝陽內動生風土揚激犯腦經因而口眼喎斜手足搐搦口不能言或為僵仆或為癱瘓余習醫十餘年於此證留心試驗實證甚少批實證甚少一句殊未妥恰觀注中為伯龍說明作意乃始恍然大悟間或有之亦止用清火藥數服可愈斷不可再用風藥再行升散愈散則風愈動因此而氣不復返以死者多矣壽頤按此所謂實乃指外感之實邪而言以其風自內動本無外感之邪故曰實證甚少然須知氣升火升挾痰上壅已無一而非實證即清肝火而降氣降痰又無一非實證之治法伯龍之意必以外感風邪謂之實證而氣升痰塞則不以為實故曰間或有之止用清火不可再用風藥升散其論實證自有語病且因此而遂以氣升痰塞之實證並認為腎水之虛乃有開手即用二地阿膠之誤讀者不可不察又按伯龍所謂清火藥者即是清肝之藥如羚羊角石決明真珠母玳瑁龍牡之類非僅三黃梔翹石膏等可知即上文所謂小兒急驚用清肝之意然亦必合之化痰潛降鎮墜攝納則氣火痰三者俱平血不上衝腦不受激始有捷效至於水虛而不能涵木肝風自動風乘火勢而益煽其狂飈火藉風威而愈張其烈焰一轉瞬間有如山鳴谷應走石飛沙以致氣血交併於上沖激腦氣筋者當用潛陽滋降鎮攝肝腎之法如龜板磁石甘菊阿膠黑豆衣女貞子生熟地蟬蛻為劑微見熱加石斛小便多加龍齒大便不通加麻仁服一二日後其風自息三日後再加歸身其應如神頤按伯龍分虛實兩層以肝火獨旺者為實以腎水不足者為虛雖有微別卻無大異蓋真陰若充肝陽亦必不動木之動無不本於水之虛但此病既發多挾痰濁上擾若顧其虛即宜滋補而滋膩之藥皆與痰壅不合伯龍既以虛實分條則對於虛者自不得不兼用阿膠二地等藥然試問痰涎上壅者於此膠地是否相宜頤恐一經說明即伯龍亦當覺悟惟風火相煽而並無痰塞者或可用之此乃至要之關鍵不可不分別清楚者也批伯龍治法尚是大醇小疵而所述各藥亦未盡精當蓋初有發明原是大輅椎輪粗具形式必賴有後起之人琢磨一番方能精切今得此編而細膩熨貼無微不至真是伯龍之莫大功臣此法用之於初起之日無論口眼歪斜昏迷不醒熱痰上壅手足不遂皆效若用小續命湯及四逆等法則水源立絕血之並於上者不能下降不可救藥若以東垣氣虛之說而用參耆術則氣壅血凝亦不能下降勢必遷延日久經絡窒塞而成癱瘓即再遇名賢復用潛鎮熄風之法亦不過苟延殘喘而偏枯廢疾終不可治矣批篤信好古者必須熟讀此條方不誤事壽頤按伯龍之論內風援引西醫血沖腦之實驗能推闡其所以沖腦之原委藉以證實素問血菀於上氣血並走於上之真旨不僅吾邦之讀素問者從無一人悟徹此理即談新學者亦萬不能勘得如此切實而治法以潛鎮攝納四字為主醍醐灌頂魂夢俱安最是探驪得珠擒賊擒王手段懸之國門而不能增損一字者也惟臨證之時但當守此大旨以為準則亦不必拘拘於此篇所述藥味愚謂潛陽鎮逆必以介類為第一主藥如真珠母紫貝齒玳瑁石決明牡蠣之類鹹寒沉降能定奔騰之氣火而氣味俱清不礙痰濁最為上乘金石藥中則龍骨龍齒磁石石英玄精石青鉛鐵落之屬皆有鎮墜收攝之功而平肝化痰具有通靈之性情者則羚羊角猴棗尤為神應若草木類之木瓜白芍楝實則力量較弱可以輔佐非專閫材也若龜板鱉甲亦是潛陽沉降之品但富有脂膏已趨重於毓陰一路必也水虧木旺而無痰涎之上壅者為宜有痰則己嫌滋膩尚須審慎若生地石斛玄參黑豆之屬皆清熱養陰之品亦惟津傷熱熾而無痰者均可採用苟有痰塞則甘寒黏膩適以助其壅滯其弊不小而人參阿膠雞子黃等尤為滋填厚味在真陰告匱龍雷猝乘已見目合口開撒手遺溺脫證之時非此戀陰益液和入大劑潛鎮隊中亦難留戀陰陽希冀什一批歷舉應用諸藥而一一說明其實在之效力始覺伯龍所述數味未盡穩愜此作者之金針度人也若其氣火升騰挾痰坌湧尚在本虛標實之際未至真元欲脫者猶恐滋膩助痰非可輕試或在潛降之後氣火漸平神志漸定痰塞已開胃氣來蘇之時用以固陰益液則即仲景復脈湯善後之法也誠以此等厚膩性質補陰有餘礙胃實甚且必暗助濁陰反增痰氣負隅之勢所以氣火方張痰壅涎流者萬萬不可妄試若夫甘菊蟬蛻則輕泄外風亦以疏達肝木與桑葉蒺藜天麻胡麻等相類對於此證止可為輔佐之品皆非主任要藥至於歸身一物世俗無不視為補陰補血上品其實脂液雖富而氣烈味辛走竄有餘滋填不足本是血中氣藥非純粹補血之物此病在浮陽上泛之時惟鎮定為急亦斷不能投此辛升溫散擾之使動豈不為火添油為虎傅翼批謂當歸是辛溫上升走而不守亦藥性之實在人所未必能知者也頤愚於此不敢強為贊同又此病之最著重處在濁痰壅塞一層蓋以陰虛於下陽浮於上必挾其胸中濁陰泛而上溢蔽塞性靈上蒙清竅以致目瞑耳聾舌謇語塞神昏志亂手足不遂若以中醫理想之詞姑備一說未始非濁痰窒塞經隧為病是以昏瞀之時痰塞涎流十恆八九愚謂潛降急矣而開痰亦不可緩則杏貝膽星菖蒲遠志竹黃竹瀝二陳之屬皆不可少近多以猴棗治熱痰甚有捷效批補出化痰一層最是此病要藥又有龍腦麝香芳烈走竄開泄無度耗散正氣消鑠真陰抑且香燥之性氣烈上升反以助桀為虐擾亂神志逼痰入絡釀成癲癇不可妄試而俗醫見其痰塞神迷謬謂痰熱蒙其心竅輒以局方蘇合香丸至寶丹牛黃清心丸之類大香大開反以助其氣火上激何異藉寇兵而齎盜糧必多一蹶不振是即素問所謂氣不返則死者固不獨氣虛欲脫之危候恐其耗氣而不可用也批說明香竄開竅之害為世俗開一覺悟法門亦此病之緊要關鍵頤按市肆中治小兒急驚風之通用丸散價值奇昂無非腦麝之香燥走竄開竅通絡為主其意謂是熱痰壅塞原屬閉證閉者開之芳香宣竅本是正治不知痰之塞由於氣之升而氣之升即是肝陽迫血上衝入腦為患與脫證之元氣不支者相去止此一間宜攝納而不宜開泄誤與芳香甚者即飛越散亡而不可救其輕者亦使痰涎竄入經絡抑且開門揖盜導之直入心包或為神呆肢廢痼疾不瘳或為癲癇纏綿不時頻發而昏瞀暴僕者俗人亦誤認為閉塞之病利於開竅則氣火愈浮腦經更亂立蹶者多即不然而神經之功用不復喎斜癱瘓神志昏迷俱不可治皆此腦麝之貴重藥有以致之而普天下之病家皆不知即醫者亦多未知此弊也大可慨已至若舌苔濁厚之實痰凝塞則雖稀涎散礞石滾痰丸控涎丹青州白丸子等之猛烈重藥亦所不避頤按此皆鎮墜下達之物以治氣升火升痰升正是對病要藥苟在體質壯盛者殊可無慮不比腦麝芳香助其上升耗散此藥理之有可憑而亦藥性之確可信者然俗醫皆不知寧用彼而不用此則以價貴之物殺人無怨而瞑眩之藥救人無功見識不真與時俯仰此醫道之所以闇昧而枉死之所以接踵也哀哉批慨乎言之切中世俗心理醫者能破除此等世情乃可以任託孤寄命之重然非識力到此地步亦未易言也而伯龍於此獨無治痰之法雖其意專為陰虛之人設法然陰虛於下亦多痰壅於上不備此法終是缺典且在既投潛降之後即大勢已平風波已定可以漸投養液安神之時亦必與順氣化痰之法相輔而行方不致中氣無權濁痰復聚否則氣機不利濁陰不開雖得暫慶安瀾亦必乘機竊發一波乍平一波又起此又治內風之一大關鍵也至謂誤用參耆術者必至氣壅血凝不能下降良由參術多脂耆復升舉濁膩之物厚重不靈則腦神經之功用不復經絡窒塞癱瘓不遂終為廢疾不可復愈亦是確論此頤所以謂東垣氣虛一說之全無真實體驗者也奈何伯龍於此反欲用生熟二地於病發之初則滋填黏膩必視參耆術為尤甚且陰柔之性更易助痰為害而伯龍竟不覺悟得毋明察秋毫而不能自見其睫此則壽頤所不敢隨聲附和而阿私所好者矣伯龍又曰西醫腦氣筋之說蓋即內經所謂經脈絡脈但西醫剖割驗病不知凡幾吾中土無此殘忍且彼有顯微之鏡窺見癥結故能分得清楚知經絡之俱從腦中而出蓋腦如樹根筋如枝葉根一動則枝葉未有不動者此則西醫之長吾中土之人所宜宗之者也壽頤按西學腦經之說其始譯西人之書者譯之為腦氣筋咸豐時江寧管氏譯英醫合信氏全體新論等書是東瀛人則譯之為神經今通稱之為腦經者以其發源於腦而分布於全體也頤謂筋是附骨之筋堅韌之質所以連屬骨節而利機關者今之譯西書者謂之韌帶乃一定之質而無運行之性批認得真實方能辨得清楚惟經字是經脈之經吾國醫學本以十二經絡及奇經八脈為全體氣血循行之道路則腦經司一身之知覺運動有運行傳遞之功用以訓詁之學言之當作腦經為長知舊譯之作腦氣筋者尚未盡穩愜所以近人譯書亦不復用若東人之譯為神經者則以其分布全體而為知覺運動之主宰有神妙不可思議之意其命名甚為允當但中醫十二經絡及奇經八脈之說本以血絡循環周流不息言之是全體之脈道以言西學則即譯書之所謂發血管回血管東瀛人譯為動脈靜脈乃發源於心房以周行於全體者而腦經則發源於腦及脊髓以分支於四體百骸考譯書謂腦之神經共有十二對脊髓神經共有三十二對皆是髓質而主一身之知覺運動此西學之所謂血管及腦經之大旨各是一類不可混淆伯龍此節乃謂西醫腦經之說即內經之所謂經絡脈絡又謂西人知經脈之俱從腦出則伯龍氏未嘗以西人學說詳考之而誤會者也伯龍又曰中風一證腎水虛而內風動者多若真為外來之風所中者則甚少此當分內風外風二證其外來之中風中字當讀去聲如矢石之中人然外邪傷人必由漸而入自淺及深雖有次第傳變必有惡風惡寒見症縱在極虛之體萬無毫不自覺而猝為邪風所侵即已深入五臟昏迷不醒之理當有凜寒身熱或手足麻木及疼痛等症其內動之中風則中字當讀平聲是為肝風自中而發由於水虧木動火熾風生而氣血上奔痰涎猝壅此即素問氣血並走於上之大厥亦即西醫所謂血沖腦經之證若激擾後腦則昏不知人激擾前腦則肢體不動激擾一邊則口眼喎斜或為半身不遂左右癱瘓等症是以猝然昏僕左右喎斜痰涎壅塞者皆無凜寒身熱外感見症即間有微見發熱者亦斷無畏風惡寒也此病而以古方中風之溫升燥烈疏散之藥治之未有不輕病致重重病致死者蓋腎水本虛根源已竭而下虛上實再以風藥燥藥煽狂飈之勢鑠垂絕之陰譬猶大木已搖而颶風連至安有不速其蹶者所以除鎮攝肝腎之外更無別法始知河間屬火之說最為允協但火亦有二有肝木自旺之火如小兒之急驚風是也有腎水不能制火之火則即此病之類中風是也批如此兩層分得不妥若東垣所云中血脈則口眼喎斜中腑則肢節廢中臟則命危之說皆是腎水不足內風煽動之證余統以鎮肝熄風養水之藥治之若未誤藥於前即如東垣所謂中血脈中腑中臟諸證皆可十愈七八且即已誤藥在先而後用此法亦可漸輕故猝然昏倒之後其輕者或即時而蘇或閱一二時而蘇此則正氣能勝素問之所謂氣返則生者即不用藥亦可頤按此其眩暈猝僕之最輕者然亦必陰虛陽冒乃有此病雖曰輕淺之證可以不治然竟不為調治則陰愈虛而陽愈冒勢必有漸發漸劇之慮其治法亦仍不外潛鎮攝納四字惟如此之證甚輕必無痰壅一候則伯龍所謂養水之法厚膩滋填乃可並用如其有痰則滋膩即不任受亦在禁例或有猝然暴脫一蹶不醒者則正氣已絕素問之所謂不返則死者亦不及治頤按真元虛竭龍雷猝乘一蹶不振固亦有之但平居無事而倉猝變生竟為虛脫亦不恆有苟其痙厥暴作而神志昏迷目合手撒蜷臥遺溲亦宜潛陽戀陰治如上法惟最忌芳香開竅泄散走竄如腦麝之屬其冷汗脈絕面白唇青者則四逆參附回陽之法亦時有效總之證情雖屬危殆苟有一線生機亦必當竭力圖維勉盡人力決不可望而卻步諉為不治也批藹然仁者之言所最宜審慎者昏僕之後有口眼歪斜手足不遂等症非用鎮肝養陰藥數十大劑更無別法此即劉河間所謂將息失宜水不制火及薛立齋趙養葵所謂真水枯竭者萬不能再用風藥助桀為虐以速其斃其寸關脈大而兩尺弱者即肝腎虛之明證亦不可誤聽東垣而用參耆術以增其壅塞也壽頤按內風上擾氣升痰升火升之候其脈皆寸關大而兩尺弱甚者且有上溢入魚而兩尺竟至不應者蓋人之氣血止有此數有餘於上即不足於下脈要精微論所謂來疾去徐上實下虛為厥巔疾者正為此病此脈描摹盡致批論脈精細可與第二卷第二節參觀要知脈實於上而其下乃虛上實是主下虛是賓治是證者必當先治其上之實但能鎮而攝之抑使下降則氣火安潛上盛之脈自能平靜而兩尺亦即有神不當以其寸大尺弱遽謂下虛而投滋膩伯龍能知參耆術之壅氣而不知滋水養陰之弊助痰增壅其害尤在參術之上即其誤認上實下虛雙管齊下不分緩急標本之過所以必將鎮肝養水四字聯為一氣終是理法未盡精密而此節所引薛趙諸家真水桔竭云云是其致誤之源蓋久讀立齋景岳之書而不自知其流弊耳壽頤按伯龍此節外風內風之辨最是清澈雖至愚之人讀之亦能洞見癥結觀於此而始知古今之論中風者無一人不在五里霧中其論中風之中字當分平去二音以辨內外虛實就字義而言洵是精切不磨確有至理且亦切合病情非穿鑿附會可比但古人所以立此中風之病名者本止以外感言之素問及傷寒論之中風是其明證本與內動之風無涉自漢唐之世見理不真遂令內外二因不能分析竟以內動之風亦假託此中風之名義不得不謂漢唐醫家不辨淄澠之過當亦上古之談中風者所不及料要知以內風而亦稱中風已非古人所謂中風之真義頤愚以為終當剔而出之別定其名曰內風然後名正言順顧名思義即可恍然於病情之自有本真若仍以中風為名則雖加以音注亦恐有混淆不清之慮此則景岳張氏創立非風名稱抹煞內動之風陽者誠有可議而伯龍氏欲讀中字為平聲者雖有至理然沿習已久必難通行況乎古今之用此中風二字者本在外來邪風一面著想以之移屬內風實是張冠李戴非其種者鋤而去之可耳更不必強與周旋別生枝節徒以淆惑後學視聽也若謂內風之動由於腎水虛肝木旺則至情至理聖人復起而不易吾言者惟壽頤則謂腎虛肝旺四字必須分作兩層設法然後病情之標本知有緩急可分而治法之先後乃有次序可定蓋腎水之虛耗於平時為是病之本肝木之旺肆於俄頃為是病之標急則治其標緩則培其本先聖儀型久有明訓批筆曲而達言明且清似此分別緩急次序而後病情治法瞭如指掌且治腎之虛須當滋養非厚膩不能填根本之真陰治肝之旺須當清理非潛鎮不能蕺龍雷之相火兩法相衡已難並行不悖況乎火升氣溢必挾其胸中固有之濁陰氾濫上冒所以此病之發未有不痰涎壅塞氣粗息高者即使外形或無痰塞而其實氣火俱浮中脘清陽之氣已為濁陰矇蔽斷不能投以陰柔黏膩助其窒滯所以治此證者皆當守定鎮肝熄風潛陽降逆一法而佐之以開泄痰濁方能切合病情以收捷效不獨中古之剛燥陽藥皆如鴆毒即立齋景岳諸家之滋補陰藥亦在禁例此固僅為肝旺之標病設法而於腎虛之本非惟不暇兼顧亦必不能兼顧者也必至氣逆已平肝火已蕺痰濁不升脈來和緩然後徐圖培本以為善後之計於是滋陰養液之法始可漸漸參用方能顧及病本之虛若果不分次序而於氣火升浮痰濁窒塞之初即用滋膩與潛陽並進且以緩攝納之力助濁陰之凝一則縛賁育而使臨大故一則藉寇兵而齎盜糧適以僨事而有餘罪且難辭功將安在批申明滋膩之誤說得婉婉動聽此則伯龍氏鎮肝熄風四字固頤之所低首下心服膺弗失者而獨於其養水二字不辨次序即用生熟二地於乍病之初者又頤之所最不愜意而期期以為不可者也惟間亦有真陰已竭龍相猝升霎時暴厥而竟有脈微欲絕目閉口開面青唇白痰聲曳鋸氣息微續之諸般脫象或且冷汗如油頭汗如珠而絕無肝陽見症則必於潛降隊中加入戀陰益液之藥如人參阿膠雞子黃等甚者且用參附此則為固陰回陽設法以其陰陽俱脫非此不可希冀於什一其證情與肝火上升者大是不侔然此是極少之數必不可執一以例普通之肝火然即於此當用陰藥並治之證而熟地亦尚不可同用嫌其濁膩太甚未免窒塞不靈乃伯龍氏反以之通用於肝火升騰者終不能不謂之千慮一失批此應用滋填以固其脫雖亦兼痰壅一證而與肝火之挾痰上湧者不同非臨證功深者亦必不敢遽投大補抑知虛脫在即非此不治而補藥膩藥反能減少其痰塞此則虛痰與實熱之痰不同非有閱歷經驗者不能道隻字也伯龍又謂肝木自旺之火為實火腎水不能制火之火為虛火而以小兒之急驚屬於實火一類大人之類中屬於虛火一類其意蓋謂小兒無情欲則無腎虛而大人類中一病則有如東垣所謂多在中年以後者故概謂之虛要知小兒生長未充即是真陰未足所以肝木易動多有熱痰風驚一病其肝風之內擾即為陰不涵陽之證即與大人之內風無異是不得分小兒大人為兩類也至若東垣之所謂中血脈中腑中臟三層即本於金匱在經在絡入腑入臟一節以病情之輕重而認為受病之淺深固是吾國醫學家理想之能事近今名醫無不宗之以為辨證立方之根據究竟似是實非所以成方均不甚妥帖且對證用藥亦必百無一效今則氣血並走於上之理既已證明則西醫血沖腦經之說更得確據而潛陽鎮逆之法又皆切中病情屢經實驗則中經中脈中腑中臟數條固已大輅椎輪不復適用當然退處於淘汰之列頤謂而今而後皆當以氣血上菀沖激腦經之說正其名稱而定其證治凡中絡中經中腑中臟之說不能並存亦且無庸更論矣批須將二千年舊習盪滌無餘真是醫學中革故鼎新一大作家伯龍又曰素問所論中風皆指外邪而言故漢唐風藥皆主散邪而其論病並無神魂昏憒直視僵仆口眼喎斜牙關緊閉語言謇澀失音煩亂搖頭垂涎痰壅曳鋸半身不遂癱瘓軟弱筋骨拘攣抽搐瘛瘲汗出遺溺等症可知此種見症皆非外來之風總由內傷氣血懼虛水衰火熾而發惟素問脈解篇謂內奪而厥則為暗俳此腎虛也少陰不至者厥也此則明謂其精氣之內奪喑即聲不能出言語謇澀也俳即肢體偏廢半身不遂也此河間地黃飲子及喻氏資壽解語湯二方之所由未也壽頤按奪字即今之脫字許叔重說文奪字說解曰手持佳失之是今所謂脫失之脫非強取之奪字惟說文奪失之本義今本諸書已極少見獨索問尚作此解乃古義古字之僅存者蓋六經古字盡為所人所改古形古義多已無存獨素問為技術之書談經學者從不顧問而此奪失之奪字猶存告朔之餼羊最可寶貴批又是小學之精警語頤謂素問中之古字頗多甚有六經及諸子百家所從未一見者如青如草茲之茲從二玄其義為黑腸闢之闢無水旁其義為積皆最古之正字正義而諸書中已不復見則皆為傳寫者改盡惟素問猶偶一見之而古今各家競無一人能知此義則小學固非唐以後人所盡通而談醫之人尤鮮通小學者矣說詳拙著讀素問隨筆若脈解篇之所謂內奪而厥則為喑俳少陰不至為厥是指腎氣式微不能上行以致失音痿廢之病即房勞過度百脈廢弛無氣以動喑不能聲乃腎氣下脫而素問亦名之為厥與大厥薄厥煎厥之陽盛於上者其病情大不相侔蓋厥之為義逆也不順也故寒亦謂之厥熱亦謂之厥在素問一書厥之為病其狀多端本非專為一種之病名萬不能以少陰不至之厥誤認與大厥薄厥之厥同為一類河間之地黃飲子是專為內奪而厥則為喑俳及少陰不至之厥立方故以桂附回陽萸戟溫養麥味斂陰其意極為周密菖蒲遠志則為濁陰上泛痰塞喘促者開泄之法果是腎臟陰陽俱脫於下其方自有神效徐洄溪醫案治沈又高續娶少艾忽患氣喘厥逆語澀神昏手足不舉授以是方而愈然洄溪且謂所見類中而宜於溫補者止此一人批說明少陰不至之厥與大厥薄厥之厥絕然不同則地黃飲子自不能誤治大厥之病然古今之讀素問者皆不能知二者之同名異病也似此心地分明都是從古未知之秘發明到此直是媧皇煉石補天手段可見病情之巧合於地黃飲子者極為難得而昏厥喑俳痰壅喘急之由於氣升火升者則其病最多誤用桂附地黃為害又當何若批王孟英案中有地黃飲子治驗可與洄溪老人後先媲美而葉氏指南中風門脫證門模仿地黃飲子諸條殊似未盡妥當而喻嘉言之資壽解語湯方則其意仍以為外風入臟所以羌活防風尚是古人專治外風套藥且桂附與羚角井列於意云何最不可解蓋亦模仿唐人諸續命湯而為之其實萬萬無此對藥之病方下以為中風脾緩舌強不語亦是向壁虛構自謂盡理想之能事而不知天下無此病情然似此海市蜃樓最易淆惑後學實是吾國醫學中之黑暗境界惟喻氏於此方之後謂腎虛舌不能言者以此方去羌防加熟地首烏杞子甘菊麻仁天冬治之獲效云云則即是腎氣下脫之證所以桂附熟地首烏杞子恰合分寸然豈不與原方之治風入脾臟云云大相刺謬須知嘉言定此加減之法亦是模仿河間地黃飲子之意然雜入羚角又與下脫之虛證不合且不用遠志菖蒲則濁痰上泛喘促者又將何以治之尚是模仿河間而失其神髓固不若地黃飲子之自有一種病情可以得效也蓋嘉言於此證之內因外因為虛為實全未了了不過以意逆之自以為是其實大是隔膜殊不適用批謂嘉言於中風一門竟未知其內因外因孰虛孰實是他人所不敢言而亦必不能言者然豈獨嘉言一人在暗中摸索耶壽頤嘗謂嘉言之書筆鋒銳利言之足以成理令人不能窺見其隱是其生平之所長可以先聲奪人實則多是理想殊少實驗蓋此公是前明遺老初非醫學專家鼎革之後遁跡於醫又遁跡於禪有托而逃品行甚高本不必以技術中之一席為重若就醫言醫頤終以為強詞奪理者太多必非此道中三折肱之真實學問嘉言論溫病附會經義泥煞少陰近賢陸九芝謂其有可殺可剮之罪誠非苛論然其醫門法律及寓意草亦可理想之辭未可盡信若素問所謂煎厥薄厥大厥之證則是氣血上菀肝陽甚熾勢焰方張其忽然舌謇言糊肢廢不用者正是氣火上升腦神經失其功用之候正與腎氣下脫之無氣以動喑不成聲者一實一虛極端相反而謂可用桂附萸戟等溫腎陽藥以助其氣火之升浮更可用冬地膩滯以增其痰涎之壅塞乎然古人不知有腦神經之作用恆有誤實為虛亂投附桂者其害人亦已不少而庸流無識一見音喑肢廢謬謂少陰不至輒欲以劉氏喻氏之成方倉猝誤投助其氣火痰濁一蹶不復猶謂吾能善讀素問善用古方而病終不治者則少陰不至內奪而厥本是極虛極壞之證所以桂附回陽尚是鞭長莫及雖日殺數人而終不自知其抱薪救火焦頭爛額之咎最是黑暗地獄較之漢唐之慣用續命湯者說理又精深一層豈知玄之又玄仍在五里霧中癡人說夢此地黃飲子資壽解語二方所以極少對藥之病而浪用之於昏瞀暴僕者未必皆效甚則非徒無益而又害之矣在他人不知有神經之病其誤猶有可諉而伯龍氏既發明之奈何猶有此模糊疑似之見存於胸臆則既誤少陰不至之厥與大厥薄厥之厥同為一類而復誤讀立齋景岳養葵之書欲以滋填補腎治此大厥薄厥之病乃遂誤認地黃飲子可治少陰不至之厥者亦可治此大厥薄厥之厥而竟不悟其一是腎陰下脫一是浮陽上冒病情既若天淵下脫者自宜溫補滋填上冒者惟有潛降鎮攝治法亦如霄壤則伯龍於此尚未分析清楚所以語氣含糊實是不可為訓須知血沖腦經之病不可誤用地黃飲子等方頤不敢不申一說以為後學正告且冀為伯龍補過者也批反復申明地黃飲子之不可誤治肝陽上逆之厥豈獨伯龍之功臣直是河間之益友而天下後世病家之隱受其惠者更不知凡幾也又讀調經論之氣血並走於上則為大厥一節然後知今之所謂中風即素問之所謂大厥景岳謂之非風蓋由閱歷而來可謂卓識其論甚詳大旨謂非風一證多見猝倒不省人事皆內傷積損頹敗而然原非外感所致古今相傳皆謂中風則誤甚云云余謂此說甚是惟所謂內傷頹敗未能指實余以閱歷驗之不外河間水不制火及立齋養葵真水枯竭之論故一概主以養水熄風鎮逆之法治效甚多壽頤按內風病之論及腎水不足真陰不能涵陽是探本窮源之義固不可謂其大誤然病發之時斷非補陰藥之可以療治河間謂水不制火心火暴盛明明注重於火之盛其治法與伯龍氏發明之清肝熄風同是一理然自薛立齋趙養葵輩借用劉河間水不制火四字之意一變而為真水枯竭乃注重於水之虛雖似同一論調實已大變其旨無非為六味地黃預為地步至景岳而又有真水竭真火衰及內傷頹敗之泛詞皆以腎虛作內風暴動之門面語一似欲治此病非大劑補腎不可者於是六味八味左歸右歸聽其隨筆亂寫無不如志既授庸醫以簡易之法門而於痰涎上壅之時直是落井下石手段滋補黏膩慘於鳩毒夫豈河間發明水不制火者所及料此則立齋景岳之庸養葵之陋最是國醫之魔障萬萬不可為治病之準繩不謂伯龍高明亦承其弊尚以養水二字與熄風鎮逆相提並論有生熟二地滋陰之謬見牢結胸中而不可解此實薛氏張氏有以誤之而趙養葵之禍水害人亦不淺也景岳又言凡非風證古人書中皆謂氣體虛弱營衛失調真氣耗散腠理空疏邪氣乘虛而入此言感邪之由然有邪無邪不可不辨有邪者即傷寒瘧痹之屬無邪者即正氣頹敗之屬有邪者或寒熱走注或腫痛偏枯無邪者本無痛苦寒熱而肢節忽廢精神言語倏忽變常有邪者病在於經即風寒濕三氣之外侵無邪者病發於臟所以眩暈猝倒昏憒無知有邪者邪乘虛入故宜於扶正之中佐以通經治邪之品無邪者救本不暇豈可再用疏散以耗正氣乎批此等議論最是膚庸一部景岳全書皆可作如是觀壽頤按伯龍此條本於景岳非風之篇所敘神魂昏憒直視僵仆口眼喎斜牙關緊閉等十三句五十二字在素問中風諸條確無此等見症是皆內動之風毫無疑義其實皆血沖腦經之病並非肝風內動所能致此但景岳謂漢唐方藥其論症中亦無此等則殊不盡然千金外臺所載中風門諸方其主治條下羼雜似此諸症甚多古籍俱存斑斑可考不能以一人之手掩蓋天下耳目使人不一翻閱古書也惟古人用藥則皆泄散外風以及溫升燥烈此漢唐之世本無內風外風之分所以後人眼目盡為之眩而中風一門方論雖多竟無潛鎮泄降一法專以安定內動之風陽者誠是古人之缺典至景岳而能知其非是外來之風開門見山一語破的固是鐵中錚錚庸中皎皎獨惜其所論非風之證治一篇止知表裡皆虛當以培補元氣為主無非為人參熟地開闢銷路昔人謂其庸醫之尤亦非苛論其亦知肝陽上僭濁痰沸騰黏膩陰柔諸物如油入面何能起病則其說雖是而其治實乖利未見而害必隨之亦與古方燥烈之殺人同歸不治批景岳此論終是瑕瑜互見今者伯龍氏既創此鎮肝潛陽一法破除二千年錮蔽舊習已為此道大放光明猶惜其開宗明義第一章即用生熟二地則於痰涎壅塞一層不無流弊此即為景岳全書所誤觀其此節以內傷頹敗真水枯竭等句鄭重言之所以養水二字遂列為人手第一要訣究之治肝之標培腎之本不當雙管齊下清濁不分不獨立齋景岳之膩補不能奉為開手之南針即河間之地黃飲子西昌之資壽解語亦必非通用之良法頤謂既能悟徹氣血並走於上之真旨則凡古人不切實用之成方皆當摒除淨絕一掃而空免得反以熒惑後人疑誤學者批不如此則不能斬除荊棘獨闢康莊蓋其所新發明者本是前無古人又何必依傍前賢寄人籬下援引他家之門楣以求增輝吾蓬蓽耶伯龍於此似尚有借重薛趙景岳之意殊可不必其末段引張氏有邪無邪之辨雖似清切有味然其意仍歸重於真氣頹敗救本不暇八字不脫溫補膩補之陋試問與血沖腦經之旨何涉頤謂可一言以蔽之曰外感之風其病以漸內動之風其病以暴固不必堆砌此浪費筆墨之浮辭徒惹人厭而伯龍氏必援引及之者則其胸中固猶有滋陰一說在也究竟肝陽上冒氣火升浮雖非外邪而來勢洶湧固急則治標之不暇又何可迂遠圖之詡詡然自以為是曰吾將以滋水養陰為培本之計竊恐黏膩填塞其氣之不返而死者必多矣伯龍又曰類中之證平居飲食言動如常忽然傾僕不省人事有逾時而即醒者有閱數時而漸省者有一蹶不復越二三日而絕者有不及一日半日而絕者如曰外來之風則必由輕而重何以一發即至昏僕如曰風邪暴烈猝然入臟則昏僕者必百無一生何以亦有能醒者則以其為內風自動之病也內風自動何以忽發忽愈則以其腎水不能養肝木動生風激痰上擾是以動而升則昏僕靜而降則清醒耳於素問所謂氣血並走於上之大厥於西醫所謂血沖腦氣筋信而有徵蓋肝風內動氣血上衝於腦擾其後腦則昏不知人擾其前腦在一邊則為半身不遂口眼喎斜在兩邊則為全身癱瘓此時惟有鎮攝其肝使不妄動則上升之血亦降並滋其腎則木得水涵可不再動壽頤按既宗素問氣血並走於上立說則西人血沖腦經之理固已明白曉暢其所以有能自愈自醒者即素問所謂氣返則生之說質而言之氣血上衝其氣火不能自降則大厥不復輕者乍升乍降則厥而能醒說到肝陽已是探源之論更不必再論到腎水不能涵肝一層反致愈推愈遠不能切合題面乃伯龍必以木旺水衰四字扭作一團糾結不解遂以鎮肝滋腎兩法併為一氣清濁不分終是賢者之過頤謂氣血並上之時鎮攝肝陽使不妄動則氣火俱潛而上升之血自降最是治此證者無等等咒然必須合之開泄滌痰乃為無投不利至於滋腎一法則為培本之計是善後之良圖使已降之氣火不再萌動理雖相因法不並用必須分作兩路層累而進庶無遺害若伯龍之雙管齊下流弊滋多學者不可不察即有口眼喎斜半身不遂等症亦可漸愈若誤治遷延則上升之血凝滯不降因而腦經窒塞即成偏枯癱瘓等症而其重者皆不可救矣故治此證而誤認外邪妄用風藥升散或誤信氣虛之說而妄用參耆朮桂批參術尚能增其壅塞則二地阿膠又當如何其上升之血無不窒滯不降且肝風得燥烈之品適以助其煽鑠氣火得補益之力反以增其壅塞壽頤按滋腎膩補何獨不然則輕證變重遷延成廢而重證遂速其斃甚可傷也壽頤按伯龍此節是承上文而申言之未嘗別有發明然其言亦多精當故並錄之以口眼喎斜半身不遂之症而用藥惟主鎮肝熄風若言中醫理法殊覺迂遠不切惟素問氣血並上之厥實與西人血沖腦之說互為發明則喎斜不遂無一非腦神經之病鎮潛肝火而收攝其上僭之勢使氣血不升則腦神經之功用自然立見恢復而宣絡行氣通經活血諸舊法皆屬皮相而不能切中肯綮所以古人成方分證淪治非不言之成理制之有法而引用古方竟無一效者其弊亦正在此今以鎮逆攝納為口眼肢節病之治法雖似距離太遠而神經得所覆杯成功此非神而明之別有會心者萬不能悟徹此中真理豈庸耳俗目拘牽舊說墨守古書之流所能夢見壽頤循此法守獲效已多然亦非病起之初開手合度者不可批至理明言皆從古未發明之精義讀者不可不熟玩而深思之伯龍謂誤治遷延上升之血滯凝不降腦經窒塞輕者即是偏枯癱廢不能復起而重者則氣血坌湧一厥不返尤為不磨之論此是治醫學者從古未能發明之奧義後有學者皆當虔爇心香敬祝南豐之一瓣者也伯龍又曰偏枯一症昔人謂右屬氣虛左屬血虛喻西昌則謂左右者陰陽之道路豈可偏執從陰引陽從陽引陰從左引右從右引左其理甚明可稱卓識批左氣右血本是浮詞然嘉言雖能闢之而引陰引陽仍是空話今能證之以腦神經之作用則凡古人理想之辭自當淘汰淨盡壽頤按昔人偏枯不遂在右屬氣在左屬血之說本是無聊之極思妄作聰明武斷鄉曲直是醫界中最卑劣最譾陋之思想初不值識者一笑而俗人以為此是金元大家所發明往往筆端援引自命宏通一盲群盲壽頤見之輒作三日惡嘉言以左右陰陽氣血貫注之理折之未嘗不名正言順此是喻氏之聰慧勝人處但所論治法仍是從陰引陽從陽引陰一片空話毫無實用今有腦神經之說從根本決斷則此種舊說亦不必談矣余按通評虛實論曰凡病消癉僕擊偏枯痿厥氣滿發逆肥貴人則膏粱之疾也此是明言肥甘為病包藏痰飲濕熱陰虛陽虛等候批既知包藏痰飲濕熱則自當兼用化痰清熱而膩滯之味胡可遽投並未嘗中於風邪蓋膏粱之變嗜欲之傷脾腎已虧肝木暗肆痰濕內蘊風從之生劉李丹溪及立齋養葵景岳諸家皆從此悟入所謂治病貴求其本而偏枯猝僕固皆以虛為本也壽頤按素問謂僕擊偏枯肥貴人為膏粱之疾則痰濕壅塞皆在不言之中固未嘗以為中風也然因濕痰而生內熱因熱而動內風痰也熱也皆是實證河間主火丹溪主痰皆從痰熱壅塞實證一邊著想均是切近病情而東垣乃以籠統泛浮之氣虛二字立說舍見症之痰熱壅塞於不問乃茫茫渺渺溯其無形之虛全是空話至薛趙景岳一流果然拿定虛字皆用滋補以治實痰實熱其謬何如批孰虛孰實分得如是清楚則河間丹溪與東垣薛趙景岳之優劣自明不意伯龍既知是病之血菀於上血氣並走於上而猶誤信薛趙景岳之謬最不可解繆仲淳亦宗陰虛內熱主治謂陰衰火熾煎熬津液成痰壅塞氣道不通熱極生風猝然僵仆即內虛暗風也治法初用清熱順氣開痰批清熱順氣開痰是古人治法之最精者次則培本或養陰或補陽以二地二冬菊花杞子胡麻桑葉首烏柏仁蒺藜花粉參耆歸芍鹿茸虎骨霞天膏竹瀝桑瀝人乳童便等出入互調自成機杼壽頤按仲淳以此類滋補藥味為第二步培本之法則必在既用清熱順氣開痰之後其熱已清其氣已順其痰已開神志清明血不上菀狂飈已息波瀾不興而後培植根基滋養陰液是為正法而無流弊然細繹所述諸味猶有竹瀝桑瀝童便等開痰泄降之藥則其時所治之證情猶可想見其痰熱未盡而其第一層清熱順氣開痰六字之中必不容有二冬二地等滋黏膩滯之質羼雜其間以緩其清泄開痰之力此仲淳之見自有分量賢於薛趙景岳遠矣而伯龍竟以二地阿膠作為入手要藥則中薛趙輩之毒也批據仲淳用竹瀝童便於第二步培本之時知此時尚須開痰泄降之藥則第一步清熱開痰順氣法中必不容入二冬二地等膩滯藥味已在不言之中讀古人書能於無字中尋得其意方有味外之味至葉氏指南中風一門大率宗此又名醫類案有虛風一門指南有肝風一門皆不外內虛暗風之旨也壽頤按此節以虛字為主乃推本窮源之論風陽內動由於陰虛木旺本無可疑但病本是虛而病標則實氣火皆浮血菀於上入手治法必不能兼顧其虛則斷不當兼滋其陰素問所謂肥貴人膏粱之疾固指富貴家聲色酒醴戕賊真元肥甘痰濁窒塞清竅頤謂陰虛之人脾運不健正多痰濕滿中雖非富貴而已無一非膏粱之疾則內風上煽之變正其濁痰逆湧之機縱明知其病本在虛而凡屬補虛之藥豈氣逆痰塞者所能任受伯龍乃用二地於猝僕之初豈非大誤此節偏戀戀於立齋養葵景岳諸家則其未達一間之原因其誤亦正在此嗟乎立齋喜用六味地黃自謂泛應輒當而養葵醫貫景岳全書導其流而揚其波幾如洪水之氾濫於醫界庸夫俗子無不喜其簡便易行且能迎合富貴家之嗜好而此道之黑暗遂致不可復問批以六味地黃為迎合富貴家嗜好雖語近於刻其實確有此理此洄溪老人所以謂立齋為庸醫之尤也而養葵之醫貫更不足道矣伯龍賢者尚復墮其術中而不悟則俗學誤人真是不淺其引繆氏以清熱順氣開痰與培本之法分作兩層則無此弊矣至葉氏治案之中風肝風二門多清熱開痰之正治且有時亦知潛陽之法固較薛趙景岳為優但不能無滋膩之弊又時時喜用河間之地黃飲子杜撰濁藥清投四字自謂不礙痰塞須知藥既濁矣何故而能清投邪說欺人最是魔道究竟河間是方非氣升痰壅者所可妄用洄溪案小沈又高一條頗堪細玩葉用是方仍是渾侖吞棗皆犯黏膩之禁惟徐洄溪批指南謂眩暈用清火養肝固為正治但陽氣上升至於身體不能自主此非浮火之比古人必用金石鎮墜之品批洄溪獨提金石鎮墜四字最是此證之無等等咒非熟於千金外臺者不能知此秘奧其說與血沖腦經宜用鎮攝者暗暗符合此洄溪之高人一等處也第十一節論張伯龍之所謂陽虛類中伯龍又曰北人類中多陽虛證南人類中多陰虛證陰虛之證治已詳言之而陽虛類中之治法宜遵東垣之補中益氣及六君等為主而順氣開痰佐之批順氣開痰四字是治氣火上升者必不可緩之要訣伯龍論中僅僅於此節一見終嫌漏略前人治法頗詳茲不復贅昌邑黃坤載主以水寒土濕木鬱生風左半偏枯者主桂枝烏苓湯右半偏枯者主黃耆姜苓湯余曾治北方數人初病即進此方嗣以補中益氣收功大忌風藥而參必用真人參方效高麗參黨參皆無濟壽頤按內風之動皆由於肝木之旺木火生風是其常態此固伯龍之所謂陰虛類中也若陽虛而亦為類中其道何由殊難索解蓋陽氣既虛是為虛寒之候既屬虛寒則內風又何自而生若曰真陽式微而猝為外來之寒風所乘則仍是漢唐之所謂中風古人散邪溫中之方甚多正為此證而設然在伯龍之意則固以彼為真中風也且謂陽虛類中之治法宜用補中益氣及六君為主以順氣開痰為佐則其證必非外來之風而猶是內動之風但風從內動固無一非氣血並走於上之證是為陽盛上僭若曰陽虛下陷而亦動內風則其理安在豈不與氣血上菀之原理大相刺謬批伯龍此節別開一局與血沖腦經本旨大相刺謬本不可解似此層層辨難說理俱極圓到以子之矛陷子之盾而其說必不可通此壽頤之再四推敲而終不能悟到類中之病何以而有需於東垣補中益氣之法並不能悟到補中益氣之方何故而能治類中之病者也且即以伯龍之言繹之既曰以補中益氣為主則必是清陽下陷之證所以宜於參耆升柴之升清而又曰以順氣開痰佐之則又明是氣升痰升之候所以氣宜順而痰宜開既欲其升又欲其降一主一佐南其轅而北其轍更是可駭上下二千年何得有如此之病理醫理況乎內風暴動多有氣急上奔痰涎壅塞者順氣開痰四字固是治類中者必不可少之要義乃伯龍於上文陰虛類中之證治反復辨論推闡極詳而獨無降氣化痰一著頤已視為缺典再三糾正不憚辭煩至此條而補出此法洵是要訣何乃反與升提之藥並轡而馳古人之混沌湯當不若是而乃謂古人治法頗詳則不知其所指者果是何法若謂是漢唐續命之法則古人為外風而設伯龍早知其非內風類中之治若謂是東垣所論氣虛之法則伯龍又知參耆術之不可誤用若謂是王清任黃耆四兩之法則本從氣虛兩字附會杜撰豈足為法而又引昌邑黃氏以水寒土濕木鬱生風立說則黃氏一生絕大學問無病不用溫燥水寒土濕四字在黃氏書中不啻千百烏附薑辛之藥固坤載所俯拾即是者所謂扶陽抑陰雲云直是獨一無二之奇癖不復可以醫理相詰責者此公之言何可為據且伯龍於上節能知古人論偏枯一症分右氣左血之非而於此又用坤載左右分治之說出爾反爾更是可疑乃謂曾治北方數人初病即進此方而以補中益氣收功今閱雪雅堂醫案兩卷又未見有此方案真是空談欺人愚不敢信或謂脾腎極虛而動內風之證固亦有之則土敗水竭臟氣欲絕肝失所生之母木無附麗之土亦必淬然暴動震掉牽掣不旋踵而痙厥隨之此為絕證之肝風一蹶而多不可救者如小兒久瀉之有慢脾風及久病易簧時每有抽搐震掉之變則決非一派溫燥及補中益氣一方所能希冀於百一者其非伯龍意中之所謂陽虛類中又可知此外又有真陰告匱而龍雷之浮焰飛越上升亦令神志昏迷手痙頭搖筋掣目反而即有面青脈伏汗冷肢清痰聲曳鋸之脫證者此如電光石火一閃即滅亦可謂之陽虛類中法宜戀陰固脫合之潛降大隊甚者又必參附大劑庶可挽救百中一二此如上文頤之所謂戀陰回陽潛鎮降逆之治確是陽虛類中之一法而亦非伯龍所謂補中益氣之證總之見證治證為陰為陽宜升宜降必當隨病論治自有一定不易之權衡必不能以其北人南人而先設成見伯龍必以南多陰虛北多陽虛立論已覺膠柱鼓瑟似非通人之議批膠執南北以論病情終是刻舟術劍之故智要知西學之所謂血沖腦者本是全球皆有之病非專為吾南人而言而又謂陽虛之治必用真人參若高麗參黨參則皆無濟頤謂高麗參稟東方陽氣其性微溫遼參稟北方陰氣其性微寒本草經與名醫別錄人參氣味有微寒微溫之不同者即是遼參高麗參之別人參氣味或寒或溫古今說解殆如聚訟頤如此分說雖是創論然實有至理並非強作解事姑為騎牆之說以代兩造解紛說詳拙編本草正義若治陰虛有火固以遼參為宜若治陽虛有寒當以麗參為合何以伯龍於陽虛之病反謂麗參無濟此皆頤之所不敢附和同聲者不容不辨蓋此節理論與上文發明血沖腦經之病全不可通且大是枘鑿不入既知是病之由於氣血上菀則此節必無印合之理由不知伯龍氏何見而發此反常之論真不可解第十二節論今人竟以昏瞀猝僕為腦病之不妥邇來西醫學說日以洋溢內風昏瞀之病屬於腦經已無疑義即素習中醫而兼有新智慧者亦莫不以西學家腦病之說為是然須知此病發現之時腦是受病之部位而非釀病之本源病源惟何則肝陽不靖木盛生風激其氣血上衝犯腦而震攏腦之神經耳故謂是病為血沖腦經則可而直以是病為腦病則不可近人醉心歐化喜用新學名詞徑稱此病為腦病者實繁有徒批分出受病之部釀病之源二層則可知此是腦受激刺之病尚非腦之自病所以猶可治愈則譯書之名為血沖腦經頗能說出病之來源而近人徑稱之為腦失血腦溢血及腦血管破裂者已失病理之真矣壬子年商務書館之東方雜誌第九卷第八冊有袁桂生君醫學正名議一篇袁君名焯江都人謂醫學名詞當合訓詁之理又謂中醫書之病名其不合於今日之學理者亦當改易意在統一醫界之知識所見甚大頤極佩之惟袁謂中風當易作腦病又謂葉天士書中有肝陽肝風等名皆由當時不知有腦經之理誤認腦病為肝病云云其說極新治西學家見之當無不引為知已然試思是病所以發生之緣由殊覺僅知其為腦病者仍是知其然而不能知其所以然非果能貫徹此病之真情者也蓋當昏瞀猝僕之時其病在腦固是確而有據然其所以致此昏瞀而猝僕者非其腦經之本有是病也伯龍氏所謂木火內動肝風上揚以致氣血並走於上沖激其前後腦經者最是至理名言不可復易所以潛陽鎮攝平肝熄風之法專治其氣火之上升而具有捷效則此病之來源去委信而有徵固不得厭故喜新竟謂前人認作肝病之誤批此病惟治肝始能有效而猶有以舊說肝病為誤認者得毋顛倒黑白蓋腦病是標肝病是本西國學者止知腦病所以治此亦鮮捷效且諸風掉眩皆屬於肝及厥陰風木發為掉眩巔疾目瞑耳聾諸說皆出素問則肝陽肝風之為病雖素問尚未直書是名而自古以來有此病情病理固久為通國醫家所公認前人書中亦甚多此等名稱又何得一概抹煞強誣葉氏之誤批引據經文更是確證則袁氏此說一似全未知中醫理法者終是醉心歐化之誤壽頤前謂近人譯書直稱此病為腦失血腦溢血及腦血管破裂者皆僅據解剖家發現之腦中死血而言不若舊譯血沖腦經四字尚能說出發病之淵源若更以泛泛不切之腦病二字認為真臟已得而不復顧及肝火生風上衝激腦之理則尤令後學昧於病情是欲正其名而適使名之不正甚非袁君正名之本旨抑且人之腦髓最為貴重不容有病病則必無易治之理此血沖腦經之病幸是氣血上升激動為患尚是波及之病而非腦之自病所以速治尚能有效以其乍受震動猶未大損苟得氣火一平即可恢復舊狀而遷延失治則神經功用必難如常所以日久之癱瘓偏枯神志迷惘者皆無復起之望豈非腦經既傷必不可治之明證今乃欲定其名曰腦病而竟廢棄舊時肝火肝風之說將使後之學者不復知有氣火之上升勢必並此一線可治之生機而置之不問則必致患此病者百無一愈寧不可痛頤謂但能以新學說之血沖腦經四字參合觀之而病機更明瞭若果離乎中醫舊學則血何因而上衝腦何因而致病治彼之學者既未聞其有切實之發明又未聞其有簡捷之治驗則何如守吾故步尚有實效之為愈乎蓋處此新舊競爭時代固當採取新學說之實在發明藉以輔吾舊學之不逮必不能徒騖名詞之新穎而竟以鄙夷舊學之精神批一再申明此非腦之本有是病所以可治則新學家僅知為腦病二字者寧非大誤更說到不用中醫肝陽肝風之說則血之何以而上衝腦之何以而致病治新學者且不能明其理由則今日之有此發明賴有古人之肝陽肝風四字奈何是非倒置清濁混淆至於斯極近來歐風東漸少年氣盛者往往粗得新學皮毛而即鄙棄國粹視為無用者讀此當知自反雖中醫之中風類中等名以訓詁之學理言之誠有未盡穩愜者然內風之動病本於肝則懸之國門必不能增損一字肝陽肝風確鑿不移何嘗有誤不意袁君竟欲以腦病易之亦徒見其新奇可喜而不暇為此病細心揣摩求其原理則未免舍其田而芸人之田不過為新學說樹一標幟究竟於病情治療非徒無益抑且弊不可言壽頤不敏竊願為吾黨正告之第十三節論時病雜病亦最多氣血沖腦之證氣血上衝激動腦神經而為譫妄昏迷瘛瘲抽搐不僅猝然暴病之類中為然也時病之陽明熱盛或為昏憒譫言痙厥屍寢或為踰垣上屋罵詈笑啼在葉氏謂之逆傳心包止有涼潤甘寒大鑄六州之錯至近賢陸九芝封翁乃推闡仲師舊論注重陽明而歸功於白虎承氣生死肉骨厥功甚偉批觸類旁通此等見症隨在多有古今人皆未知是腦神經病一朝揭破益人智慧不少當為普天下病家距躍三百陸謂胃熱神昏治驗彰彰誠無疑義但世補齋文說明胃熱而致神昏之理似尚猶未盡透徹頤竊謂痰熱窒塞地道不通有升無降是亦經文之所謂氣上不下為厥巔疾實即氣血沖腦之證苟得大便暢行痰熱開泄氣火即隨之而下降所以神識即能恢復瘛瘲亦能安定又是氣返則生之明證此以中下實熱蘊結致令氣血上升雖與陰不涵陽上實下虛之猝為昏瞀者證情不同而同為氣火之上衝則彼此若合符節又有熱甚傷陰津液告匱以致虛陽上浮激動神經者亦有痙厥昏憒之變則脈必無神色亦不澤舌必光紅殷紫此則宜於甘寒涼潤以救津液者與承氣證相去天淵而淺者不知一見昏迷不問脈症不辨舌苔止知增液清宮苟是陽明實證適以助其窒塞敗不旋踵此皆葉氏吳氏三焦分條以心熱居先之貽禍也若夫雜病變遷俱有昏迷譫妄瘛瘲痙厥等症則亦無非痰壅火升及實熱窒塞或津液耗傷之三層見症同而淵源絕不相同斯辨證處方大有涇渭之判由此可知氣血上菀其證甚多而二千年來談醫之士皆所未知今者伯龍倡之於前頤為之引申於後雖臨證之時用藥各有攸當必不可執一不通而其病理莫不同符合轍竊願好學深思之士於此類似之證一一細研究之第十四節論陰寒之氣上衝亦能激動腦神經而失知覺運動發為昏厥暴僕痙直瘛瘲等症血菀於上使人薄厥胥有陽焰之上升以古證今一以貫之毫無疑義即在陰虛液耗之時亦是孤陽無依陡然飛越此皆西學家之所謂血沖腦也然又有一種昏厥之證面色唇舌猝然淡白如紙病者止知眼光昏黯或覺唇舌微麻肢體無力而即傾僕無知其脈或細或伏四末亦必清冷輕者少時自醒甚者亦為痙直瘛瘲此其脈症純是陽虛見象斷不能與陽焰上升迫血入腦者一例論治惟其陡然昏憒知覺運動頃刻皆泯苟非腦經為病何以迅速至此西醫之學謂是腦中無血之故名之曰腦貧血其治法則用興奮提神之劑如勃蘭地酒之類所以振動其血液提挈其氣機厥可回而脈可復且謂是證與血沖腦者一升一降兩相對峙必不可誤作一例論治然其昏憒譫迷痙厥抽搐之腦神經症則固彼此一轍頤初不解其既無陽升何故而亦能沖激及腦之理尋繹西醫命名之義蓋謂血液循行不達於腦所以陡然無覺苟其人而脈伏不出則血之不行未為不確然亦是全體之不行豈僅僅腦之一部且亦有脈不伏而痙厥者又將何說以處之豈果有脈行不停而獨不上於頭腦之理以此知腦貧血之名稱恐於病情未必確當頤竊以兒科慢脾風證反復尋思而知其陰寒之氣上衝入腦激動神經有以致此也蓋慢脾風之由於脾腎虛寒脈症病情皆無疑義顧其所以痙直戴眼抽掣瘛瘲者古今說解多謂寒在太陽所以發痙肝風猝動所以抽掣不知因寒而竟能動風已無此病理可說而比附於太陽寒水之經仍是想像得之無可佐證其實此腦經為病無非陰寒之氣上溢使然所以溫養一投有如旭日當空群陰退舍腦不受激頃刻復常此固病理之確有可憑而治驗之鑿鑿可據者批此證現狀頗與血沖腦經不異惟脈理病由適得其反必不可仍謂之氣血上攻乃以慢脾風之虛寒證互為印證則寒氣上衝確乎不易此又二千年來之醫家所不能知而不能言者如此發明豈獨前無古人直恐後有來者亦未易尋蹤學步彼西醫之治腦貧血者亦無非溫劑以勝陰霾之氣耳伯龍氏之所謂陽虛類中蓋亦指此種證情言之然溫補則可升提則不可西醫之所謂興奮劑提神劑不過溫通流動性質決不可與中藥之升麻柴胡等量齊觀但似此之神經為病誠非上文潛鎮抑肝之法可以幸中王孟英謂凡勘一證有正面必有反面壽頤廿年治驗臨證漸多始悟王氏此說最是閱歷有得醫家能以所見之症一一與古人舊說細心對勘則同中之異大可尋思頗覺此中自有真趣即此肝陽上激之腦神經病而竟有一種冰炭相反之陰寒者同見一症如其心粗氣浮奚能悟徹此中至理然試靜心思之則仍是應有之實在病理亦不得謂之怪不可識惟其見症同而理由不同則臨床療治之時又豈可膠執成方牢守板法後之學者果能於此大同小異之中推敲其異苔同嶺之旨則庶乎四千餘年之國粹必有從此而愈闡愈明者中醫二字又何患乎恆為新學家垢病耶中風斠詮卷之一終卷第二內風暴動之脈因證治第一節脈因證治總論自前賢有脈因證治之四綱而後之談醫者皆當備此四者以為治療之準則脈者所以考見其氣血之盛衰虛實也因者所以推溯其病情之根本淵源也證者所以昭著其發現之情狀治者所以昭示其入手之南針凡讀古書以治今病果能守此理法具此目光斷不患見地不明識力無定而惟此內風暴動一證則古人所論病因皆是隔膜今既能發明素問所謂氣血上菀之原理則於因之一字言之已詳可不復贅而其症又變態多端病者各異如或病喎斜或病癱瘓或病麻木或病刺痛或失知覺或失運動或為瘛瘲抽搐或為痙厥反張以及舌短言糊神昏迷惘諸症無一非神經之病昔賢論治猶欲各就見症分別條目以求一效未嘗不絞竭腦力費盡心思究竟神經之真理未明則根本既差凡百枝葉都無是處後之學者但能於發源之地犀然牛渚照見本真則挈領提綱自得其要又何必枝枝節節遊騎無歸壽頤於此獨無分證論治之條者雖似立法未詳竟是談醫之創格然已覆杯見效屢經試驗之功夫敢以閱歷所得公之同好則證之一字固事實之所不必細辨而亦處方之所不能兼顧者矣惟是脈之見形逆順有別治之條目宜忌須分爰舉所知試陳其略批本書獨無分證辨治之法不可不補出作者本意第二節脈法總論內風之動氣升火升以致血逆上湧沖激腦經其脈未有不弦勁滑大浮數渾濁者甚者且上溢促擊虛大散亂蓋病本於肝火浮氣越自有蓬蓬勃勃不可遏抑之態弦而勁者肝木之橫逆也滑而大者氣焰之囂張也浮數者陽越不藏其勢自不能沉著安靜渾濁者痰阻氣機其形自不能清晰分明且也氣血奔騰逆行犯上脈象應之而上溢入魚促數搏指亦固其所尤其甚者則腦之神經既為震動而脈絡周流失其常度或為豁大而無神或且散亂而無定固已几几於一蹶不振大氣不返之危矣批論脈精當深入顯出絕無模糊隱約之弊是臨證功深而識得此中神髓者最是醫書中不可多得之筆墨壽頤按諸書之言促脈皆以為數中一止其說始見於傷寒論之辨脈篇而王叔和脈經宗之後之論者無不以數脈一止為促遲脈一止為結兩兩對舉已成鐵案獨高陽生之脈訣謂促者陽也指下尋之極數並居寸口為促楊仁齋亦謂貫珠而上促於寸口出於魚際清乾隆時日本人丹波廉夫著脈學輯要引素問平人氣象論寸口脈中手促上擊者肩背痛甲乙經作促上數謂是並居於寸口殊無歇止之義壽頤謂促字之正義本以短促為主其病在上而脈乃上溢既溢於上必不足於下因而以短促之義形容是脈其旨甚顯素問明謂促上而搏擊應指讀法當於上字作一逗則其義甚為明白實無歇止之義可以意會且因其脈之短促在於上部而知其病在於上為肩背之痛則促脈之獨盛於寸口更覺明瞭此節所謂寸口皆專指寸脈言之非合寸關尺三部統稱之寸口素問本旨固以部位言之以形勢言之不以止與不止言也傷寒論嘗重編於王氏之手是以辨脈篇與脈經同作一解疑亦是叔和手筆考仲師本論促脈四條曰太陽病下之後脈促胸滿者曰太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之曰太陽病下之其脈促不結胸者此為欲解也蓋胸滿結胸喘而汗出皆為邪盛於上故其脈急促獨見於寸批仲景本論傷寒脈結代炙甘草湯主之一條以結與代相對而不言促可見仲景意中不以促脈為歇止惟傷寒脈促手足厥逆者可灸之一條既有厥逆而其脈為促頗以含有歇上之意然丹波氏謂虛陽上奔故脈促於寸部則仍是陽邪壅於上而氣不下達手足為之厥逆所以脈促於寸丹波之說甚有精義蓋高陽生之脈訣固多陋劣不及脈經之精獨此脈促一條不用歇止之說證以素問及仲景本淪其理甚長批脈訣之不理於眾口久矣然苟有可取則取之是亦不以人廢言之意且促字之義含有迫近急速諸解皆與上溢之脈為近叔和因其迫急短促有似於歇止遂以數中一止立說尚是差以毫釐而後人只知有歇止之促不知有促上之促則謬以千里矣丹波氏引證極詳且與上魚之脈同為一條謂溢上魚際之脈即促脈之尤甚者皆是精當不刊之論後之學者必當宗之而不可為叔和舊說所拘者也壽頤於此以促擊與上溢連舉是用丹波新義讀者弗以數中歇止之促脈觀可也素問脈要精微論謂浮而散者為眴僕固明謂眩暈昏僕即肝風之上楊故脈為之浮甚者則氣將不返故脈為之散又謂來疾去塗上實下虛為厥巔疾又明謂氣血奔湧於上故脈亦踴躍奮迅而出其來甚疾且上既實則下必虛故几几於有出無入其去若徐謂之為厥固即血菀於上之薄厥氣血並走於上之大厥謂為巔疾蓋亦几几於說明氣血之上衝入腦矣可見古人之於是病論證辨脈何等精當合此數條而融會其意即知西人腦失血之名義殊非創見西醫血沖腦經之說近之談西學者或謂之腦失血且有謂為腦溢血腦出血者又有譯為腦血管破裂者蓋但就解剖家所見之腦中死血而定其病名更不復知其病從何來壽頤謂其立名太覺呆板不若血沖腦經四字尚能說明病源蓋譯書者不能得其真意遠不如舊譯血沖腦經之確當矣獨惜習中醫之學讀中醫之書者曾不能知素問有此數條即是內風暴動猝然昏僕之確據遂致漢唐以下議論紛紜競效盲人之捫燭囂囂然自以為得之而後生小子乍窺新學之皮毛反覺振振有辭吒為心得藉以揶揄吾舊學而鄙夷之不屑復道其亦知中古二千年之前固已言之綦詳說盡原委以視彼之言其然而不能言其所以然者何如批新學家僅就耳目所能及者以立論是以知其然而不知其所以然此新學之實在情形也尚復黨同伐異斥舊學為無用試令讀此或能知所自反乎特苦於無人焉為之闡明則雖有精義而沉埋者亦二千年吾知古人有靈當亦深恨於不能白晝現形有以提撕而警覺之電頤謂素問論內風之脈惟此脈要精微篇兩節最為精當且來疾去徐上實下虛正是氣血逆行上衝入腦之真相亦即並居寸口之促脈惟肝陽暴動者有之若平人氣象論謂脈滑曰風又謂風熱而脈靜者難治金匱謂脈微而數中風使然脈經謂頭痛脈滑者中風風脈虛弱也病源小風篇謂診其脈虛弱者亦風也緩大者亦風也浮虛者亦風也滑數者亦風電則皆以外風言之不可與內動之風混合為一而後人之論中風脈象者則多以內風外風錯雜相合疑是疑非皆不足據總之肝風內動之脈無不浮大促上其有力而弦勁者氣火之實閉證居多是宜開泄其無力而虛大者元氣之衰脫證居多所當固攝若愈大愈促而愈勁則氣血之上衝愈甚而氣將不返愈大愈虛而愈散則氣血之渙散而亦將不返必鎮攝潛陽之後上促漸平搏擊漸緩弦勁者日以柔和浮散者日以收斂庶乎大氣自返可冀安瀾而指下模糊濁大不清者則氣血痰涎互為凝結之見症也潛鎮化痰頻頻清泄而奔湧之勢漸以和緩即渾濁之形漸以分明此則臨證治驗之歷歷可指者若夫澀小微弱等脈在肝陽暴動之初氣盛火升之候固是理之所必無而亦為事之所或有則閉者氣塞已極腦神經之知覺運動幾將全失其功用而周身脈道胥將凝結不通於是弦滑洪大之脈漸以澀小漸以沉伏此則大氣不返之危機勢已鄰於一瞑不視而脫證之先見虛大脈者其次亦必漸以虛微漸以散亂而至於指下全無則皆絕證之不可救而亦不及救者此其大小滑澀之殊途即可據以辨證之順逆夷險惟虛寒之證寒氣上衝亦能激動腦神經陡令神志昏瞀或且痙厥瘛瘲則面色唇舌淡白如紙其脈無不微細欲絕者此非溫補脾腎不能回陽脈症與虛脫相似而其實亦微有不同是在臨證功深見微知著庶乎有此得心應手之神化也第三節治法總論內風治法上卷引證諸家學說而申言其是否相宜擷往哲之精英以折衷於至情至理似已足為此證申明原委闡發精微即治療大旨頤亦不能更於已言之外別有見解惟思是病之源雖同是木旺水衰肝陽陡動氣升痰壅激犯神經而真陰之虛有微有甚即木火之焰有重有輕論理止此一端見症已多歧異大率陰虛之未甚者則木火之勢必盛痰升氣升一發難遏多為閉證如目定口呆牙關緊急痰聲曳鋸氣粗息高面赤唇紅脈息洪大皆是乍閉之確據而陰虛之已甚者則木火之焰必微痰氣內結猝然痙厥多為脫證如目合口開氣息微續疲倦無神面色㿠白痰聲隱約脈息細微皆是欲脫之顯象其尤甚者則脈伏不見自汗如油肢冷麵青撒手遺溺更是至危極險之候多不及救閉者宜開脫者宜固入手方針已截然處於極端之相反設或認證未清而用藥龐雜生死關頭即已大錯鑄成不可復挽且閉者是氣焰之窒塞皆屬肝陽肆虐無不以清泄為先而脫者是元氣之式微苟其已見亡陽尤必以回陽為主此又一陰一陽之各據一偏者少有遲疑亦同鴆毒即曰降氣化痰潛鎮攝納諸法閉證脫證皆不可少然而細微曲折分寸之間各有緩急各有主賓必也爐火純青而五雀六燕銖兩悉稱誠非易易正不僅疏表辛散走竄溫燥補養滋膩許多古法之未可輕試也爰就識力所及參以頻年治驗而已得實效者判別證情分析層次釋其功用條其宜忌並列於篇雖曰一人之見掛漏必多抑且閉門造車或難出而合轍第就所見言之似乎此中微義大略如斯舉爾所知是即孔氏各言爾志之義誠能引而申之觸類而長之以治肝陽痰厥諸證其用甚宏其效甚捷正不獨昏僕偏枯者之盧循續命湯也世有高明匡吾不逮而有以糾正之附益之尤所願焉第四節論閉證宜開猝暴昏僕皆是肝陽上升氣血奔湧沖激入腦擾亂神經所致然必挾其胸中痰濁氾濫上陵壅塞清竅每多目瞪口呆牙關緊閉喉中曳鋸鼻鼾氣粗是為氣火升浮痰塞隧道之閉證多兼有實熱確據如面色唇色多紅赤或雖不甚紅而亦必神采奕奕勝於無病必個㿠白青黯脈象必洪數弦勁搏指不撓或雖不甚勁而亦必粗濁滑大必不細軟無力神志雖模糊不醒而必不僵厥無聲則脈必不伏肢必不冷二便多不通而必不遺溲自利此皆有升無降氣閉於內之實證必無一二脫證錯雜其間則治此證者自必以開其閉塞為急務而潛陽降氣鎮逆化痰猶在其次如氣窒聲不能出者必先通其氣則通關散之搐鼻以取噴嚏方即細辛牙皂炒炭為末水溝合谷等穴之針刺以回知覺水溝督脈穴在上唇正中亦名人中刺入三分合谷手陽明穴在手大指次指兩歧骨間俗名虎口側手張兩指取之刺入寸余必透過手心正中之勞宮穴左右旋針猛力補瀉之回覆知覺甚驗皆是開關之捷訣批此針刺家之實驗今西國亦有搐鼻開關之藥但嗅其氣不用其質氣味猛烈開竅迅速而無流弊其次則牙關不開者用烏梅肉擦牙酸能抑木攝納肝陽化剛為柔而緊閉自啟俟其暈厥既蘇聲出牙開而急進潛陽鎮逆化痰之藥乃能有濟否則雖有神丹而重門不開亦何能透此一層關隘以建掃穴犁庭之績惟此等閉證止是痰氣之郁窒與夏令之暑疫穢濁及南方之山嵐毒瘴不同凡芳香逐穢斬關奪門之要藥如諸葛行軍散痧氣蟾酥丸等皆是穢毒急痧必不可少之良劑而於此證之氣火升浮上衝入腦者則奔竄奮迅適以張其氣焰必至氣不復返直如砒鴆喻嘉言醫門法律中風篇謂卒中灌藥宜用辛香是誤以痰氣上塞認作穢惡矇蔽其禍甚大批此證之誤於此藥者甚多然通國之醫家皆不知其害遑論病家鄭重申明凡在醫林亟宜猛省蓋同是閉證而所以閉者不同不明此理用藥必誤近人治此氣血上升之閉證多用芳香走竄之品反以助其激動為害更烈必速其斃不獨脫證之恐其耗散正氣而不可用也此中條理尤為精微不可不察且牛黃腦麝皆開心氣通經絡之品而此證必有濁痰蒙冒得其走竄開泄之力即病之輕者不致氣厥不返而亦恐引痰深入無可泄化徒以釀成癲癇昏迷之痼疾而不可復療此皆治熱痰矇蔽者素所未知之玄奧然欲開泄痰濁亦非少參以芳香正氣恐不能振動清陽盪滌濁垢則惟石菖蒲根之清芬可以化痰而不致竄散太甚用以引作嚮導庶幾恰合分寸此又同是芳香而性情微異即其效力不同此中幾微疑似之別非好學深思心知其意者恐亦不易領悟必也臨床辨證量度其虛實輕重而斟酌損益以消息之殊非紙上談兵之所能曲曲摹繪者矣壽頤按內風暴動之病有閉有脫其昏迷痙厥顛仆痰湧形狀則同而究其證情閉者是痰氣之窒塞脫者是正氣之散亡原因不同見症亦自有區別而治法則判如霄壤考漢唐以及金元諸家尚未有顯為揭出以醒眉目者至李士材而有閉脫分治之論始能識破此中虛實所見已勝人一籌惟其所用開閉方藥則清心牛黃丸蘇合香丸至寶丹等皆是腦麝芳香走竄耗氣之品蓋亦止見其痰熱窒塞以為非此香竄峻利不足以直破重圍開此關隘然在今日既知是氣火上升激動腦經之病則其所以閉者正其氣血上菀為害而香竄之藥適以助其升浮正如教猱升木為虎傅翼痙厥愈甚必速其危要知此證與暑天痧閉之濕熱痰濁矇蔽中州者皎然不同所以芳香丸散可以開濕痰闢穢惡利於彼而必害於此士材固不知此證之由於氣血上升猶認是熱痰之錮結膻小窒塞心竅乃有此誤而世俗亦未明此理仍用此等九散尤堪浩嘆尤在烴金匱翼治中風八法亦以開關與固脫兩兩對舉其論開關一條謂猝然口噤目張兩手握固痰壅氣塞無門下藥此為閉證閉則宜開不開則死搐鼻揩齒探吐皆開法也方用白礬散稀涎散勝金丸而不及牛黃至寶但開其痰使其可以飲藥而止最是有利無弊可法可師桐鄉陸定圃冷廬醫話論中風亦辨閉脫二證謂閉證口噤目張二手握拳痰氣壅塞語言謇澀脫證口張目合手撒遺尿身僵神昏又謂閉證亦有目合遺尿身僵神昏者惟當察其口噤手拳面赤氣粗脈大以為辨別脫證亦有痰鳴不語者惟當辨其脈虛大以為辨別又謂閉證氣塞亦有六脈俱絕者不得以其無脈而遂誤認為脫此則論證辨脈尤為精細者也壽頤又按陳修園之醫學三字經論中風亦謂閉與脫大不同豈非開門見山金針度世教人辨證之第一要決而其所以治此閉證者則曰開邪閉續命雄是欲以古人續命諸方治此痰塞氣閉之病此證此方文不對題直是相去萬里初不知其何以有此奇悟迨以其開邪閉三字尋繹之而始知其所謂閉者非指痰氣之窒塞而言仍是以外來之邪風立論所以用藥尚與漢唐諸家一鼻孔出氣壽頤竊謂金元以降類中之說久已發明其非外因寒風固已彰明昭著今更有西醫血沖腦經之說剖驗得腦中實有死血積水則病屬內因更與外感風邪有何關係續命湯散麻桂防風等藥復何能治此腦中死血積水之病以理言之古人許多成方非獨不可以起病而亦必助桀為虐速其危亡批說到腦中死血積水一層則古人溫藥升散之誤極易領悟可知古人制方皆為中風二字引入迷途真是黑暗地獄獨不解於古今醫書又無一而非續命之是尚則似此千篇一律又必古方之確有效驗可言而後可以傳之千年博得萬人信用然以所見之證言之又萬萬無此對藥之病此中疑竇實是無從索解或謂子是南人所見皆南方之病足跡且未遍歷西北須知燕趙秦晉甘新伊涼地氣剛燥風景肅殺固自有此外風外寒猝暴中人之病非續命等方桂附麻辛不可治者是說也頤未嘗久居北方一見此證亦萬不敢妄斷其必無然創為將息失宜水不制火之說者固河間之北人而今之發明氣血沖及前後腦之張伯龍又蓬萊之北人也且西人謂為血沖腦經者又是東西各國同有之病更非專為吾南人立法批設此一問而世俗之拘泥南北不同者亦當恍然大悟且說明此是全球同有之病則俗子所謂北人真中南人類中雲云終是所見太小既是沖腦則必非外風之病既非外風則必無風藥可治之理何以古人今人皆齦齦然於續命一法而以為必不可廢其理何由其效又安在豈血沖腦經之昏僕自為一種病情而外風襲人之昏僕又自有此病耶恐必無模稜之法可為兩造溝通而作騎牆之見解者也爰書拙見以告同志所望並世諸賢果有用續命古方以起病者尚其不吝金玉詳以示我俾得藉助他山以開茅塞此則壽頤之所馨香禱祝者矣批此解虛心好學之誠固當如是但此病此藥恐無能證明其效果者則又將奈何第五節論脫證宜固猝暴痙厥多由肝陽上升木火恣肆是為熱痰壅塞矇蔽性靈多屬閉證而亦有真陰虛竭於下致無根之火倉猝飛騰氣湧痰奔上蒙清竅忽然痙厥而目合口開手不握固聲嘶氣促舌短面青甚則冷汗淋漓手足逆冷脈伏不見二便自遺氣息俱微殆將不繼是為真元式微龍雷暴動之脫證多兼有虛寒氣象如面色唇色多淡白無華甚且青黯而必不紅潤亦有四肢清冷而面顴獨紅是為虛火上浮之戴陽證又非溫補下元不可脈多微弱無神或且不能應指而必不滑數弦勁搏指有力聲音鼻息必輕微斷續或兼有痰聲而必不息高而長氣粗如鼾此皆元陰告匱真氣不續已幾於一厥不回大命遂傾之險與閉證之挾痰上壅火升氣塞者在在不同則治法尤必以攝納真陰固護元氣為當務之急而戀陰益液之劑即當與潛鎮虛陽之法雙方並進急起直追方可希冀有一二之挽救少緩須臾即已無及則如人參阿膠雞子黃等之滋養必與龍蠣玳瑁龜板鱉甲等大隊潛鎮之品濃煎頻灌庶有效力而開泄痰涎諸藥亦且不可羼雜其間以減其滋填之力若肢冷脈伏或自汗頭汗如油如珠者則陰亡而陽亦隨亡非用參附不可批亡陽者以其真陰已竭而孤陽飛越也故回陽必用人參以維真陰而自明以來遂謂參是陽藥尤其可鄙其痰塞喉間欲咯無力藥不能下者以真猴棗研末煎石菖蒲根先服暫平其逆湧之勢如局方黑錫丹之鎮納浮陽溫養下元而能墜痰定逆又是必不可少之要藥若通關散稀涎散等之燥液克痰辛猛開竅則惟熱痰之閉證宜之在脫證不可妄試苟能痰壅一開神蘇氣續則滋液育陰潛鎮攝納之藥亦必急急續進不可間斷必能元氣漸回形神漸振且在數日之內神志清明亦多倦怠嗜臥尤必以此等大劑繼續投入以固根基以扶正氣方不至藥方甫過中流無砥柱之權虛焰有復騰之慮則中氣更衰痙厥再作益難圖治批補此一著萬不可少此雖亦有痰湧喉關一症似與人參阿膠等之滋膩不合須知此乃真陰既竭於下是為腎虛上泛之痰與實火之熱痰不同批申此一解更是瞭然苟非養液戀陰必不能救垂絕之真元而蕺龍雷之浮火此與肝火之上擾者見症若或相似而原因皎乎不侔但以脈至之有力無力及氣色之有神無神聲息之粗悍微弱舌苔之黃膩白潤厚薄辨之其兼證大有可據辨別亦是易易批似此辨證真是如飲上池隔垣畢見矣非欲以此法概治熱痰上湧之閉證也張伯龍論中用龜板阿膠生熟二地蓋亦為此種脫證立法而語焉不詳未為細辨恐有流弊頤於上文固已極力言之究之自有如此應用膠地之病亦治醫者之所不可不知但此證本不多有苟非確已到此地位亦不可輕率援用近賢所論固脫之法除參附一湯外未見更有申明此中神髓者爰以鄙見所及補此一義若昧昧焉而以施之於熱痰窒塞之候則大謬矣劉河間之地黃飲子亦治脫證之一法說詳前卷及後卷中第六節論肝陽宜於潛鎮猝暴昏僕之症首在審定其為閉為脫而分別論治則入手之初固已握定南針燭照數計而無誤入歧途之慮矣然無論其或閉或脫而所以致此猝然之變者豈痰熱之自能壅塞及元氣之傾刻渙亡耶其閉者則木火猖狂煽風上激而擾亂清空之竅其脫者則龍雷奔迅僭越飛揚而離其安宅之鄉蓋木焰之鴟張固肝膽之肆虐而龍雷之暴動亦肝腎之浮陽也故閉與脫之分歧雖自有一實一虛其來源固截然不侔且形態亦顯分畛域而閉與脫之合轍則無論為肝為腎皆相火之不安於窟宅斯潛藏為急要之良圖潛陽之法莫如介類為第一良藥池有龜鱉而魚不飛騰否則大霧迷漫之時躍於淵者無不起於陸此固造化自然之妙用其吸引之力有莫知其所以然者當夫浮陽上越矇蔽靈府之時正如雲霧漫空天地為之晦塞非得沉潛之力收攝陰霾將何以掃蕩浮埃廓清宇宙此真珠母石決明玳瑁牡蠣貝齒龜板鱉甲數者所以為潛陽之無上妙劑而石類中之磁石龍骨具有吸力者其用亦同雖藥品亦甚尋常而呈效最為敏捷斷推此病之無等等咒若金石類之黑鉛鐵落赭石辰砂等惟以鎮墜見長而不能吸引者次之然惟痰火上壅體質猶實者為宜而虛脫者又當知所顧忌其餘如石英浮石玄精石寒水石等力量較薄可為輔佐非專閫材矣批物理自然之性以入藥劑無不如鼓應桴古今本草皆無此體察物理之真切發明也近人治痰熱多用猴棗是西藏及印度產品藏產者顆粒甚小而色青黑印產者大如雞卵而色純青考此物不見於古書按其形狀物質蓋亦牛黃之屬是氣血有情精神所聚所以安神降逆清熱開痰頗有捷驗而藏產者質地尤其堅實其力差勝頤謂其色青而黑正與肝腎二臟相合故能攝納龍雷之火而產於西睡獨稟庚辛金氣是以力能平木以治肝膽橫逆正合其用故閉證之痰熱壅塞得之足以泄降而脫證之虛痰上壅亦可藉以攝納並不慮其鎮墜之猛批說明物理之學是真能格物致知者豈附會五行氣運者所可夢見壽頤按近人之治痰塞每以珍珠為無上要藥其實亦止是介類潛陽之品雖曰陰精所聚未嘗無清熱攝納之功然按之實在效力不過與牡蠣決明貝齒相似而俗人寶之者徒見其價貴兼金耳食者固不辨真味也壽頤竊謂數分珠粉之效用遠不如龍牡盈兩之煎劑且研之不細留滯腸胃尚足貽害在富貴有力之家消耗金錢視之殊不足惜固亦無害而在中人之產又何能用財如糞土醫者筆下可以造福而亦極易造孽尚望行道者隨時留意萬勿蹈此惡習費而不惠批珍珠本是貴重之物而以藥理言之性情功效不過如斯若在賽珍會上得毋大殺風景然作者寓意乃是愛惜物力又非憤世嫉俗焚琴煮鶴者所可引為同調惟閉證猶近於實則開關之初即用大隊潛降鎮定其逆上之勢而重墜劫痰亦所不忌以其泛溢之氣焰尚是有餘而本根雖虛猶未先撥則青鉛鐵落之重亦勘酌用而脫證純屬於虛則入手之始即須固液戀陰參合此潛陽之品而金石重墜不容妄試以其垂絕之真元所存無幾而千鉤一發暴絕堪虞則五味首烏等之可以收攝真元者又必並行不悖矣此則同是潛藏龍相攝納腎肝之大法第證情有虛實之不同即輔佐之品隨之而變然其為柔和肝木之恣肆斂藏上泛之浮陽固無以異也若其肝火之熾盛者則氣火囂張聲色俱厲脈必弦勁實大症必氣粗息高或則揚手擲足或則暴怒躁煩耳脹頭鳴頂巔俱痛則非羚羊角之柔肝抑木神化通靈者不能駕馭其方張之勢焰抑遏其奮迅之波瀾而古方如龍膽瀉肝湯當歸龍薈丸抑青丸等皆是伐木之利器亦可因時制宜隨證擇用此則與潛降之意微有不同惟在臨證時相度機宜知所審擇固非片言之所能盡者要知凡百病變肝陽最多而潛鎮柔肝之治收效亦最奇捷果能善馴其肝使不橫逆以治百病胥有事半功倍之效近賢王氏孟英治案每以極平淡之藥味治人不能治之危疑大病其生平所最得力者大約多在此柔肝泄化四字之中神而明之會而通之用處極多固不僅治此眩暈昏瞀者之第一捷訣也批觸類旁通益人智慧不少昔昔喻嘉言之論中風嘗謂表裡之邪大禁金石蓋猶以肝木內動之風誤認為外來之邪襲於表裡惟恐金石鎮墜引之深入豈知風自內生苟非鎮攝而安定之萬不能靖狂飆而熄浮焰試讀千金外臺中風各方金石之品久已習見即如金匱所附之風引湯一方既用龍牡而又復用石藥六種清熱鎮重蓋已有見於風自內動須用潛降之意獨惜古人不能明言其為肝風自動而設則讀者亦莫知其用藥之精義此中條理尚非喻嘉言之所能知更何論乎自檜以下若時下醫家之治此病亦頗尚清熱之法然僅知清熱終覺藥力薄弱不能勝任遠不如潛降之速效此惟洄溪老人嘗一露其端倪今得伯龍氏而始大暢其旨可謂二千年來醫學中乍闢鴻濛之大覺悟矣批推崇之極真不愧前無古人第七節論痰涎宜於開泄卒中之證肝陽上擾氣升火升無不挾其胸中痰濁陡然泛溢壅塞氣道以致性靈矇蔽昏瞀無知蓋氣火之上陵尚屬無形而痰涎之盤踞是其實證焉故窒塞喉關聲如曳鋸者有之盤旋滿口兩吻流連者有之不治其痰則無形之氣火亦且末由熄降此晚近人之論內風者固無不以開痰降濁為惟一之要務也治痰之法首在量其虛實而為攻克消導之等級其形壯氣實者蕩之滌之雖猛烈之劑亦無所畏如稀涎散滾痰丸控涎丹青州白丸子之類皆可掃穴犁庭以為權宜之計其形餒氣衰者泄之化之惟和平之劑乃可無虞如二陳杏貝枳實竹茹之屬亦能開泄降逆以助廓清之功惟膽南星天竺黃竹瀝荊瀝桑瀝數者則性最和平而力量尤堪重任無論為虛為實皆宜用為正將庶幾職有專司克奏蕩平之績惟痰本濁膩之質且性又黏韌非得芳香之物不足以助正氣而化濁陰則石菖蒲根氣本芳烈味亦雄厚力能滌除垢膩而不致竄散太過無耗傷正氣之虞必也任為嚮導直抵巢穴恰如地位不比腦麝之芳香猛厲泄散無度反以助氣火之上越耗丞盡之元陰也若世俗每以牛黃為清心化痰之要藥不知此物專走心家以清心熱則有餘以滌濁痰則不足且凡熱痰之昏冒即其沖激腦經以致性靈矇蔽非真能竄入血管閉遏心房也古書痰入心包發為昏厥之言本是理想要知牛黃形質極似心臟外光潔而中空松故為專走心家之藥若痰留隧絡而用此以引入心宮恐入之易而出之難日久留戀乃真窒塞心竅而沉迷不省人事其輕者則不時頻發而為癲癇批說盡牛黃利弊又是古今未言之秘試觀人之久患癇者大率幼時多有痰熱風驚之病轉展而成未始非頻服牛黃腦麝香開直竄有以釀成之也批癇證根源盡在此數言之中又有遠志一物俗書每以為能開心竅不可多用實則味微苦氣微溫最是化痰良劑今東國醫家且以為消痰主藥重任不疑頤每喜用之甚有捷驗則亦此證治痰之要藥而世俗必不敢用正與牛黃之不當用而習用者相反此皆為近人俗說所誤而古之本草絕無此等臆說蓋晚近醫家所見本草無非從汪氏備要吳氏從新涉獵一二而於古人名著多未寓目遂至人云亦云極少真實之學識壽頤於此牛黃腦麝遠志數者俱從閱歷得之而深知其利害所在敢筆之於此以告同好或亦竊附於舉爾所知之義耳批勘透藥性極盡精微始覺古今本草尚多模糊浮泛之語第八節論氣逆宜於順降卒中之病火升痰升喘促不止皆氣逆之為患也西醫但謂之血沖腦而不及於氣之一字者以血為有形剖驗可見氣乃無質剖驗不可見其亦知解剖家所得腦中之積水何自而來則其有生之時氣血交井上衝入腦迨生氣既絕而血為死血氣化為水尤其確據可知調經論之所謂氣血並走於上則為大厥一條尤為至理名言初非如西學家之僅就耳目所能及者以立論也批氣本無形而證以氣化為水四字則無形者亦已有形可見素問氣血上菀之說尤為精當而剖驗家止見死者腦中積水而不能說明其即從氣化而來試令讀此一節吾知其亦必恍然大悟所以治此證者不順其氣則血亦無下降之理而痰即無平定之時肝陽無潛藏之法且也其氣能降即調經論之所謂氣返則生氣不能降即調經論之所謂不返則死然則定其橫逆調其升降可不以順氣為當務之急乎惟是順氣之藥亦正無多而順氣之理亦非一法如上條所述潛陽鎮逆攝納肝腎以及化痰開泄數者固無一非順氣之要訣而古方至如二陳溫膽之屬亦是消痰降逆輔佐之品又有所謂勻氣散者烏藥順氣散者用藥雖未盡純粹而能知氣逆之不可不順是亦此證當務之急若世俗之止知有蘇子降氣湯者則其方名為降氣而藥用當歸蘇子之辛溫沉香厚朴之苦燥以治寒飲之氣喘奔促則可以療肝陽之痰熱上湧則不可而或者更誤讀東垣氣衰之論欲引補中益氣之成法以施之於氣升痰升之證則為害有不可勝言者矣第九節論心液肝陰宜於培養卒中之患其病標皆是肝陽之暴動其病本即為血液之不充蓋肝之秉性剛而易擾必賴陰血以涵濡之則剛木柔馴而無暴戾之變凡肝陽之恣肆者無非血耗液虛不能涵養而後踴躍奮迅一發難收所以治肝之法急則定其標固以鎮攝潛陽為先務而緩則培其本必以育陰養血為良圖惟真陰之盛衰繫於腎而血液之枯菀繫於心試觀肝陽易動之人必有驚悸怔忡健忘恍惚諸症謂非血少心虛之明驗則為肝病培本之計雖宜滋腎之水補母以及其子亦必生心之血助陰以涵其陽此養心一層亦治療肝陽者所必不可忽也雖養心正藥亦是無多不過棗仁淮麥茯神之類而已其餘則清熱化痰去其侵擾之病魔即以安其固有之正氣以此寧神益智奠定心君亦已綽有餘裕功效固自可觀且當肝陽恣擾之時多挾痰濁以肆虐必不能早投補腎厚膩之藥反多流弊而此養心寧神之法清而不滯淡而不濁無助痰之患有養正之功可與潛鎮抑降法門並轡揚鏢分途奏績又近賢治肝有培養肝陰一法如高鼓峰之滋水清肝飲魏玉璜之一貫煎等皆主養陰而能疏達肝氣苟其痰濁已化亦可參用以圖善後此則治血虛肝動之良法固不專為暴僕昏迷者著想而治暴僕者波浪初平亦必有此一層步驟彼夫立齋景岳諸賢止知厚膩養陰滋填重濁未免窒而不化滯而不靈者蓋尚未達此中之一間也第十節論腎陰漸宜滋填肝陽之病肝為標而腎為本苟非腎水不充則肝木亦必不橫逆河間所謂腎水虛衰不能制火者本是確論此養水滋腎一法原是治肝陽者所必不可少惟腎陰之虛積之有素馴至木失水養而為暴動然後推本窮源以歸罪於腎虛是為研究病本之遠因必非治療見症之急務何況痰塞喉咽氣填中州而謂滋腎黏膩之藥可以透此幾重關隘直達下焦以補腎為治肝之本寧有是理此則不獨立齋景岳之用四物六味於入手之初者必有大害即張伯龍之鎮肝養水並作一談頤終嫌其不分緩急次序也惟在潛降攝納之後氣火既平痰濁不塞乃可徐圖滋養以固護根基庶幾木本水源滋填培植而肝陽可無再動之慮是亦此證中善後之要著批滋填腎陰非厚膩不為功然是善後之良圖心不可恃為入手之秘訣則六味四物等補陰諸方古人言之已詳苟粗知醫學者固亦優為之矣第十一節論通經宣絡猝暴昏僕多兼手足不仁半身不遂或刺痛癱瘓諸症其平居無病而忽然不用者皆是氣血上菀腦神經被其擾亂而失功用誠如張伯龍所言但能潛降肝陽則氣火俱平神經之功用頃刻自復必不能誤與風藥燥藥行經走竄反以擾亂大氣不得安靜非徒無益而又害之然在庸耳俗目之見豈不謂此是肢體大症苟不通經宣絡何可以起廢疾不知病形雖在肢節病源實在神經不潛其陽不降其氣則上衝之勢焰不熄即神經之擾攘必無已時凡屬宣絡通經之物動而不靜行而不守適以助其奔迅萬萬不可誤用此則通國之古今名賢本未有悟徹此中原理者一經揭破當共恍然惟在數日之後其勢少息其氣少和而肢體之癱廢如故則當知經絡隧道之中已為痰濁壅塞氣機已滯血脈不靈腦神經之運用至此乃失其固有之性而真為肢節絡脈之痼疾從此治療殊非易言然使尚在旬月之間則隧道窒塞猶未太甚或尚有疏通之望譬如器械不用關節不靈而為日無多猶未缺蝕急為刮磨亦堪利用此則通經宣絡之法亦不可少緩須臾而古人治痹成方始可採用然此是用以治肢體之痹著必須與猝病之初火升痰升者劃清界線乃不自亂其例究竟活血通絡以療癱瘓亦僅可施之於旬月之間或有效力若其不遂已久則機械固已鏽蝕雖有神丹亦難強起矣批此病延之已久而癱廢不遂皆無痊愈之望通絡一層聊盡人事而已壽頤按上列內風暴動猝僕痰塞治法八條界限截然次序步驟不可紊亂果能施治如法除非真氣暴絕頃刻告危不及用藥者必不可救苟其神志瞀亂肢體不遂氣血上菀而未至於一蹶不振者皆有可起之望頻年經驗已愈多人此雖生面別開一似脫盡古人矩矱要皆洞見癥結有理可尋伯龍氏倡之於前而頤為申之於後似於此證之曲折細微約略已盡若夫肝陽浮越氣焰橫肆之時禁風藥升散以助其氣火之猖狂禁表藥疏泄以速其亡陽之汗脫禁芳香走竄以耗散正氣禁溫補剛燥以消鑠真陰禁滋膩養陰以窒塞痰濁禁呆笨補中以壅遏氣化則上文皆已詳言之世有好學深思之士神而明之此證雖危或可十全七八乎中風斠詮第二卷終
