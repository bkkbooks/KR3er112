body:
  text: 卷第三古方平議第一節古方總論中風方藥古人書中千金外臺為獨多大率皆溫中解表之劑固為外感之寒風立法者也今者血沖腦經之理既昭然若揭則古方雖多必不能復適於用據新發明之學説以正古人之誤既不能為古人曲為諱飾亦不必能為古方曲為説解者矣惟是就新治驗而言用藥之理法則閉者宜開脫者宜固氣火之升宜於潛降肝陽之擾宜於清泄痰涎之塞宜於滌化陰液之耗宜於滋填凡此種種固無一非古人已有之成法即謂漢唐諸方多屬溫中散表而細讀千金外臺兩書已覺清熱開痰涼潤潛鎮各法亦無一不具於各方之中但所用諸藥多以清涼潛鎮之法並列於溫燥辛熱隊中幾令人莫明其用意之所在此則風氣為之相沿成例一若欲治此病非雜以溫辛升散必不可以立方者不得不謂古人之奇癖然如千金之竹瀝飲子生地黃煎等方純是清涼世界已是內熱生風之專劑又如千金之紫石散方即金匱附方之風引湯五石湯等重用石藥鎮攝氣火又明明為浮陽上越者立法又豈得謂古人竟不知有肝火肝風內因之病特以古書中似此清涼鎮攝之方本不若溫燥升散之衆而千金外臺二書又以雜廁於溫散大隊之中則讀者亦多忽略閲過不復注意且古人又不肯明言此為鎮定內風之法而淺者讀之亦不能識其精義或又雜以溫藥表藥同列於一方之中尤令人意亂神迷瞪目咋舌莫名其妙此則披沙鍊金非大有學力大有見識者不易猝辦苟不為之揭出而申明之恐學者亦未必能自得師善於運用則古人精蘊仍在若明若昧之天國學不昌其弊亦正坐此壽頤讀近賢著作恆病其每有一書無不自制方藥以為標榜然清徹者少龐雜者多甚者多以古人成方少少增損而即別標一湯飲之名目試為考其實際仍是寄人籬下不足以自成一方而徒令閲者目眩心迷難於記憶蓋亦醫界著述家之通病所以醫書日多而醫學未必大有進步似此多而無用徒覆醬瓿殊覺可曬批説盡醫書弊竇詅癡家讀之能無自赧竊謂伊古成方本已諸法咸備更何必疊床架屋重纍不已爰為選擇舊方分類編次而申言其制方之旨名曰平議不欲別立新方等於自炫以見學理雖能新有發明而治法仍不外乎古人所固有庶乎古之精義不致泯沒無傳而後之學者亦不敢師心自用蔑視往哲是則壽頤闡揚國粹申舊學以勵新知之微意也惟於方中之議論藥物其合意者則加圈其旁不合宜者則加勒意在辨別良窳為初學醒目之計庶乎示之南針易分涇渭自知僭妄所不敢辭明哲見之尚其諒此第二節開關之方閉證宜開開其關竅決其痰塞使得納藥也古書之治卒中者恆用蘇合香丸牛黃清心丸至寶丹等以腦麝為開竅必需之物不知此病是肝陽之上擾芳香疏散反以開泄之則氣火愈浮為害更烈於閉證之痰塞者尚如矛戟而脫證則更以耗散其垂盡之真元其禍可知矣故卒中痰壅而誤投大香大開之藥未有不速其斃者惟尤在涇金匱翼治卒中八法第一開關止録開痰數方而絶不雜入龍腦麝香一味最是識透此層玄奧壽頤於此不録蘇合至寶諸方者承在涇意也喻氏醫門法律中風篇謂卒中灌藥宜用辛香大謬救急稀涎散本事方治中風忽然昏若醉形體昏悶四肢不收風涎潮於上膈氣閉不通豬牙皂角四兩肥實不蛀者去黑皮晉礬光明者一兩上細末研勻輕者半錢重者三字匕溫水調灌下不大嘔吐但微微冷涎出一二升便得醒醒後緩而調治不可便大服亦恐過傷人孫兆方壽頤按所謂半錢者古方書亦謂之半錢匕蓋即以銅錢為抄藥之匙取藥末一錢之半使不落為度非唐宋以後十錢為一兩之錢也本條又有三字匕則取藥末當一錢之三字為度古方書亦多有一字三字之數其義皆同又有所謂一錢匕者則即以一錢抄滿藥末也附齊氏醫案神應散四川敘州齊有堂秉慧著嘉慶十一年自序刊行治時氣纏喉水飲不下牙關緊閉不省人事等症明雄黃飛細枯礬藜蘆生用牙皂炙黃等分為末每用豆大吹入鼻中取嚏吐痰神效壽頤按此即稀涎散加味凡實火熱痰上壅均可灌之取吐壽頤按稀涎散為開痰泄壅之聖藥凡痰塞喉關咯吐不出者得之非吐即下是治氣火挾痰上逆必需之品惟氣味俱烈實火為宜若脫證虛陽上浮亦有痰涎盤踞則不可妄試凡開痰諸方固皆為氣逆火升之閉者立法苟遇虛脫之證俱不可用勝金圓本事方治同前薄荷半兩豬牙皂角二兩槌碎水一升同薄荷搗取汁慢火熬成膏瓜蒂末藜蘆末各一兩硃砂半兩研末上將硃砂末一分與二味末研勻用搜膏子和圓如龍眼大以余硃砂為衣溫酒化服一圓甚者二圓以吐為度得吐即省不省者不可治許叔微曰必用方論中風無吐法然如猝暴誕生聲如引鋸牙關緊急氣閉不行湯藥不能入命在須臾執無吐法可乎豫用此二方每每有驗通關散治卒中口噤氣塞不省人事細辛豬牙皂角等分炒炭為末每少許吹入鼻中取嚏一方加薄荷雄黃各等分為末一方南星半夏皂角等分為末用皆如上法白礬散聖濟治急中風口閉涎上欲垂死者白礬二兩生薑一兩連皮搗水二升煎取一升二合上二味合研濾分三服旋旋灌之須臾吐出痰方可服諸湯散若氣衰力弱不宜吐之尤在涇曰此方以白礬湧泄為主佐入生薑辛以開之也又方白礬如拇指大一塊為末巴豆二粒去皮膜上二味於新瓦上煅令焦赤為度煉蜜丸芡實大每用一丸棉裹放病人口中近喉處良久吐出痰立愈一方加皂角一錢煅研取三分吹入鼻中頤按皂角即牙皂宜炒不宜煅亦當棉裹用之如前法蓋不去油之巴豆必不可作內服之藥也尤在涇曰巴豆為斬關奪門之將用佐白礬以吐痰因其性猛烈故蜜丸含化是急藥緩用之法壽頤按巴豆最是猛烈此方且不去油如曰含化則雖用蜜丸必不能少減其毒雖可開痰必至上吐下泄無論體質若何壯健皆不能任觀此方用棉裹納入口中近喉引之吐痰是僅取其氣不食其質必以線縛住此棉裹之藥不令吞咽俟得吐而引藥去之是古人用意之周密處尤氏竟認作蜜丸含化似是而非批讀古人書必須細心體驗第三節固脫之方脫證宜固古方除獨參參附外絶少他法壽頤擬戀陰益液如參麥五味阿膠雞子黃等亦是固脫必要之藥而在濁陰上泛虛陽飛越之時古有三生飲三建湯養生丹靈砂丹諸法皆所以鎮遏陰霾挽回陽氣未始非急救之良藥又如劉河間之地黃飲子喻嘉言之加減資壽解語湯亦治腎臟陰陽二氣下脫之法茲彙集於此以備脫者固之之用獨參湯治元氣暴脫忽然肢冷汗出氣怯神疲之證人參一味濃煎頻灌不拘時服壽頤按卒中之證忽然氣短神疲身冷體蜷目合口開二便不禁不問有痰無痰有汗無汗皆是陽氣暴脫非人參大力不能救危於俄頃若蜷冷之甚者非參附不可王孟英醫案第一卷第一條周光遠登廁暴脫倉猝不及得藥以三年女佩薑煎服而安亦是回陽之一法此證是陰陽兩氣自為脫離少遲片刻即不及救其病情雖近於內風暴動實則並非風陽直是陰陽離絶故謂之脫批詮解暴脫之證情病理闡發極細是古人書中不可多見之筆墨其危愈速亟遽無措不遑用藥者甚多養生者皆不可不知參附湯世醫得效方治猝暴昏僕目合口開體冷汗流等症人參附子尤在涇曰此方為救急之法藥止二味取其力專而效速用人參鬚倍於附子或等分不拘五錢或一兩酌宜用之薑水煎服有痰加竹瀝壽頤按參附為回陽救急之要劑陰脫於裡陽亡於外者獨參猶恐不及故必合之氣雄性烈之附子方能有濟如其陽未盡越肢冷未甚可用炮製之附若其陽氣暴絶冷汗淋漓則非生用不可三生飲局方治卒中痰塞昏僕不醒脈沉無熱生南星生白附子生川烏等分加木香生薑水煎服壽頤按痰塞而脈沉無熱是為寒痰上湧其胸中清陽之氣已為濁陰蔽塞不通非燥烈大溫之藥不能開泄此方三者俱用其生非僅為回陽計正欲其雄烈之性驅除濁陰耳苟能陰霾一開寒痰少減即當隨證用藥似此大燥大烈之劑非可多服頻服者也星附散本事治中風能言口不喎斜而手足嚲曳南星半夏二味薄切生薑汁浸透川烏白附子黑附子白茯苓人參白殭蠶沒藥以上各等分上為粗末每服二錢水酒各一盞同煎至八分去滓熱服二三服汗出瘥壽頤按方用南星半夏川烏黑白二附亦為真陽式微寒痰上壅而設非治外風也水酒同煎熱服得汗而瘥則寒痰開泄陰霾既化陽光復闢之徵也許叔微本事方附會手足嚲曳為中腑之症不脫宋金元人中經絡中腑中臟之陋習喻嘉言收此方入醫門法律亦謬謂治虛風寒痰以為得汗則風從外出而解不知寒痰上湧乃真陽之欲絶非外來之暴感方意止欲回陽本無散邪之藥乃謂一派溫補熱服得汗即是發散豈非癡人説夢壽頤又按方下所謂手足嚲曳是不痛不僵而但無力不能自持不能自主此症若因虛得之是氣血俱衰不能榮養筋骨治法當大劑滋補若猝然而起則氣血上菀腦神經不用之病治法當鎮定氣火皆非本方之一派辛溫可以妄治者蓋本方之實在主治止為真陽暴脫陰霾逆湧面青唇白冷涎自流或冷汗如油脈脫喘促者急救之法而方下主治全不相合豈是制方之本意若謂此方可治中風則仍是誤認此虛脫之病為外來之寒邪耳凡古人成方最多藥不對病之主治蓋皆輾轉傳抄多為淺人妄改久失本來面目必非制方之人果為此文不對題之囈語許叔微本事方尚是佳作而猶有此藥不對病之謬何怪乎俗本醫書更多牛鬼蛇神之幻此善讀古書者不可不自出手眼識透淵微又烏得人云亦云隨聲附和耶批古方下之主治確多此弊讀古書者不可不自有見識分別涇渭庶幾不為古人所誤然而已非易事矣三建二香湯治男婦中風六脈俱虛舌強不語痰涎壅盛精神如癡手足偏廢此等不可攻風只可補虛天雄附子烏頭各二錢俱去皮臍生用沉香木香各一錢俱水磨汁上作二服每服水盞半薑十片煎七分食前服批食前服藥蓋謂飢時則藥力自專非服藥而即以食進也説見後文喻嘉言曰此方天雄附子烏頭並用其生不加炮製惟恐縛孟賁之手莫能展其全力必因其人陰邪暴盛埋沒微陽故用此純陽無陰一門三將領以二香直透重圍驅逐極盛之陰拯救將絶之陽乃方下妄云治中風六脈俱虛又云不可攻風只可補虛全是夢中説夢當知此證其脈必微而欲絶不可以虛之一字漫無著落者言脈其方更猛悍毒厲不可以補虛二字和平無偏者言方此方書所為以盲引盲耶批嘉言此論精當不刊壽頤按此方全為寒痰凝結立法即從三生飲加入二香欲其行滯名曰三建以三者力猛可以建立陽氣也制方之意不為無見而方下竟謂其補虛豈以古人參附朮附耆附等法列於補虛一類而遂誤認天雄烏附為補藥耶嘉言譏之誠非苛論以此知古人雖有佳方而為方下議論龐雜反以埋沒立方本旨者多矣養正丹本事治虛風頭旋吐涎不已黑鉛水銀硫黃硃砂各一兩上用建盆一隻火上熔鉛成汁次下水銀用柳杖子打勻取下放少時下二味末打勻令冷取下研為粉用米飲圓或用棗肉圓如梧子大每服三十粒鹽湯下此藥升降陰陽補接真氣非止治頭旋吐涎而已壽頤按下元陽虛陰氣逆上而為虛風眩暈冷涎盤旋者非溫腎重墜之品不能鎮虛定逆攝納元氣黑鉛硫黃一寒一溫一陰一陽制煉成丹水火既濟能收攝浮泛之虛陽而歸之於腎家舊宅調其升降定其陰陽救顛扶危其效甚捷古方如金液丹靈砂丹之類成方不少大旨相近今録養正黑錫二方以見一斑但汞能變化煉不得法易還原質服之亦多流弊不如黑錫丹不用水銀之馴良今人於濁陰上逆之證寧用黑錫而不敢服汞者良有以也批鉛汞之弊不可不知黑錫圓本事方自注此丹陽慈濟真方壽頤按鎮江府志僧慈濟神濟居丹陽普寧寺有黑錫丹方以醫名於宣和政和建炎紹興間黑鉛硫黃各三兩二味熔化結砂子舶上茴香附子胡蘆巴破故紙川楝子肉肉豆蔻各一兩川巴戟木香沉香各半兩上將砂子研細余藥為末研勻入碾自朝至暮以黑光色為度酒糊圓如梧子大陰乾貯布袋內擦令光瑩如丈夫元臟虛冷真陽不固三焦不和上熱下冷夜夢鬼交覺來盜汗面無精光肌體燥澀耳內虛鳴腰脊疼痛心氣虛乏精神不寧飲食無味日漸惟悴膀胱久冷夜多小便婦人月事愆期血海久冷惡露不止赤白帶下及陰毒傷寒面青舌卷陰縮難言四肢厥冷不省人事急用棗湯吞下一二百圓即便回陽命無不活但是一切冷疾鹽酒或鹽湯空心吞下三四十圓婦人艾醋湯下此藥大能調治榮衛升降陰陽安和五臟灑陳六腑補損益虛回陽返陰功驗神聖局方有肉桂無巴戟一方有陽起石壽頤按此丹治腎陰上泛氣虛喘促者必備之藥喻嘉言極推重之凡老人虛人腎氣不固真陽無權濁陰上泛咳逆頻仍喘不得臥氣不得息者非此不治用之得當屢奏奇績此納氣定逆鎮陰回陽之無上神丹也地黃飲子河間宣明論治喑廢腎虛弱厥逆語聲不出足廢不用熟乾地黃巴戟肉山茉萸肉石斛肉蓯蓉酒浸焙附子炮五味子官桂白茯苓麥門冬菖蒲遠志肉各等分每服三錢生薑五片大棗一枚薄荷七葉水煎服壽頤按河間是方用意極為周密是治腎臟氣衰陰陽兩脫於下而濁陰泛溢於上以致厥逆肢廢喑不成聲其症必四肢清逆或冷汗自出其脈必沉微欲絶其舌必滑潤淡白正與肝陽上冒之面赤氣粗脈弦或大者絶端相反批為地黃飲子補出症情脈象舌苔辨證最是精密故以桂附溫腎回陽萸戟蓯地填補腎陰麥味收攝耗散而又有濁陰上泛之痰壅則以菖遠茯苓之苦溫芳香開泄而鎮墜之庶乎面面俱到果是腎虛下脫始為適用徐洄溪之治驗可徵惟引用薄荷七葉則仍是疏泄外風終屬蛇足若氣升火升之火猝然喑廢者此方萬萬不可誤投説已見前第一卷中資壽解語湯喻嘉言自注治中風脾緩舌強不語半身不遂防風附子炮天麻酸棗仁各一錢羚羊角鎊官桂各八分羌活甘草各五分水煎加竹瀝二匙生薑汁兩滴嘉言自注謂此方治風入脾臟舌強不語之症至於少陰脈縈舌本腎虛風入舌不能言者則用此方去羌防加熟地何首烏枸杞子甘菊花胡麻仁天門冬治之獲效云云壽頤按喻氏之論中風止以為外感之風深入五臟而絶不知有內動之肝風所以法律中風一篇方論雖多全是隔膜毫不可信此方連竹瀝凡九味雜亂無章本是模仿古人諸續命湯而為之溫涼並列或散或收亦升亦降本無義理可尋其方下所謂中風脾緩舌強不語半身不遂云云其意蓋謂脾主四肢風邪入脾因為舌強不遂之病亦是理想之能事究之無此病情且脾緩二字尤其向壁杜撰試問如何緩法批喻氏此方主治所謂中風脾緩確是杜撰然中風一門古今各書所述種種病情其能免於杜撰者究有幾何總之古人不知有氣血上菀腦神經之病遂欲各抒所見幻為空中樓閣皆是多事惟嘉言於此方之後謂少陰腎脈不縈舌本者以此方去羌防加熟地首烏等治之獲效則是腎氣虛脫之病故用藥與河間地黃飲子相近而功用略同然嘉言於此尚謂是腎虛風入舌強不語終誤認為外風之直入腎家不知既是外風何以方中反去羌防既去羌防則方中桂附熟地首烏枸杞諸物何能祛外入之風反覺藥不對病豈非仍在五里霧中癡人説夢頤録是方取其加味而去羌防有合於腎虛下脫之治非欲以療外風之入脾入腎也然果是腎氣下脫則方中羚角竹瀝亦所不宜不若用河間之方為佳蓋嘉言制方之時早已心煩慮亂不知所措固遠不如河間之地黃飲子見病治病一絲不紊耳第四節潛鎮之方卒中之病今既發明素問氣血並走於上之真理則治法自以潛陽降逆收攝其上升之勢為第一要務但讀古書續命諸方一例溫散豈不謂古人之病必非今人之病各趨一路未可強同然試讀千金外臺等書則潛陽降逆之方已所在而有苟非氣火上升則龍骨牡蠣石英石脂諸藥何所用之爰為選録數方而申明其真義可見古人之病固亦無以異於今人之病而今人之法仍是旁搜遠紹祖述古人之法耳惟古人不肯明言此為內熱生風而設則雖有良方讀者幾不能悟其妙用今為申明之以冀與人共喻古人有知當亦默許所望善讀占書者能自取材而神其運用則病家之福也風引湯金匱附方除熱癱癇大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩滑石石膏寒水石赤石脂白石脂紫石英各六兩上十二味杵為散取三指撮井花水三升煮三沸溫服一升千金作紫石散治大人風引小兒驚癇瘛瘲日數十發醫所不療者桂枝作桂心甘草牡蠣作各三兩余同壽頤按方以風引為名甚不可解蓋謂病由內風引動耳宜從千金作紫石散外臺祕要作崔氏療大人風引少小驚痼瘛瘲日數十發醫所不能療除熱鎮心紫石湯六石作各八兩余同千金外臺此方後云永嘉二年大人小兒頻行風癇之病得發例不能言或發熱半身掣縮或五六日或七八日死張思惟合此散所療皆愈壽頤按金匱此方本是後人附入非仲景所固有千金所録徐嗣伯風眩十方此其第二外臺又作崔氏可見古人甚重此方用之者衆方以石藥六者為主而合之龍牡明明專治內熱生風氣火上升之病清熱鎮重收攝浮陽其意極顯若引素問血之與氣並走於上而為大厥一條以此等藥物降其氣血豈不針鋒相對千金引徐嗣伯説風眩之病起於心氣不足胸上蓄實故有高風面熱之所為也痰熱相感而動風風火相亂則悶瞀故謂之風眩大人曰癲小兒則為癇其實則一此方療治萬無不愈云云固已專為內熱動風熱痰上湧立法則六朝時人已知此病之本於內因初不待河間丹溪而始有痰火之論也惟遍讀千金外臺能發明內熱生風者僅僅有徐嗣伯許仁則二家此外絶少同調而後人讀之亦復不甚注意幾令古人良法泯沒無傳醫學荒蕪於此可見批此六朝時人知有內風內熱之明證讀者其當注意且是方久已附入金匱習醫者當亦無人不知然制方之意亦皆不能領悟對此龍牡六石誰不瞪目而不知所措則以今本金匱此方之下止有除熱癱癇四字語焉不詳何能識得此中微蘊其亦知千金方中説之固極詳晰耶此古書之所以不可不考也惟此方既已專用潛鎮清熱為治則風是內動之肝風且是蘊隆之風火確然無疑而方中猶雜以薑桂二味究屬不類臨證之時必宜去此二味而加以開痰泄化之品則完善矣張文仲療諸風寒水石煮散方外臺寒水石石膏滑石白石脂龍骨各八兩桂心甘草炙牡蠣熬各三兩赤石脂乾薑大黃各四兩犀角屑一兩上十二味搗篩以水一升煮五六沸內方寸一匕藥煮七八沸澄清頓服壽頤按此方即上方去石英而加犀角更可見此類潛鎮清熱之法固亦已大行於當時再加犀角者謂非治內熱之病而何則方中仍用桂心乾薑者終覺不甚純粹以治內熱生風必不可用且犀角專清心家之熱以治肝火內風宜易羚角方下內方寸一匕藥之內字讀如納廣濟療風癇猝倒嘔沫無省覺方外臺麻黃去節大黃牡蠣黃芩各四兩寒水石白石脂石膏赤石脂紫石英滑石各八兩人參桂心各二兩蛇蛻皮炙一兩龍齒研六兩甘草炙三兩上十五味搗篩為散八兩一薄頤按一薄蓋即一服以絹袋盛散藥用水一升五合煮取一薄取七合絞去滓頓服之壽頤按此方仍是前方之加味去乾薑而更加黃芩則治內熱生風尤為明瞭而方中仍有麻黃桂心者終不脫古人續命治風之習慣耳然以治內熱生風麻桂必不可不除也廣濟療風邪狂亂失心安神定志方外臺金銀薄各一百和合石膏龍齒鐵精地骨白皮茯神黃芩生乾地黃升麻茯苓玄參人參各八分虎睛一具微炙牛黃生薑屑各四分麥門冬十分去心枳實炙甘草炙萎蕤芍藥各六分遠志去心柏子仁白鮮皮各五分上二十四味搗篩以蜜和為丸食後少時煮生枸杞根汁服如梧桐子二十丸日二服漸加至三十丸壽頤按古人以二十四銖為兩以六銖為一分此非唐宋以後十分為一錢之分或曰六銖為一分之分當讀如份壽頤按風邪而狂亂失心即氣血上衝腦神經失其知覺之病雖曰風邪亦內動之風陽也廣濟此方用金銀薄鐵精石膏龍齒諸藥正是潛陽鎮逆之妙用使氣血安定而不上衝則腦神經之功用自復其餘清熱養液化痰育陰無不近情而方中不犯一味溫燥疏散尤其切合病情惟升麻挾升騰之性微有可議擬易以天麻厚重而可以熄風更為切近其生薑亦可去之崔氏療風邪虛悸恍惚悲傷或夢寐不安鎮心湯方外臺茯神半夏洗生薑各四兩羚羊角屑當歸人參防風芎藭杏仁去皮尖桔梗各二兩龍齒石膏各三兩防己桂心各一兩半竹瀝一升上十五味以水一斗煮減半內竹瀝煮取二升八合去滓分溫三服壽頤按此亦神經之病方亦潛鎮之法而清熱化痰其旨極顯生薑與半夏同用即以解半夏之毒蓋古人尚未有製半夏之法也惟桂心終是不類必宜去之防風芎藭亦有可議千金療風癲方方見外臺注曰出第十四卷而今本千金方第十四卷中未見此方茯神白龍骨龍齒龍角龍膽蔓青子鐵精乾薑各十分人參遠志去心黃連大黃各八分芎藭白芷黃芩當歸各六分桂心去皮五分上十七味末之蜜和丸湯服十五丸如梧子大日二稍稍加之以知為度壽頤按龍角今所不用而外臺第十五卷兩見之蓋亦龍骨龍齒之類也壽頤按此方以龍齒龍骨龍角鐵精為主其鎮逆之力甚厚且合以三黃其治內風內熱尤為明瞭乃方中仍有桂心乾薑者真是古人之習慣矣崔氏療熱風驚掣心忪恐悸風邪狂叫妄走極效方外臺批所療熱風驚掣心忪恐悸無非腦經失其知覺而曰風邪古人之愚不可及茯神三兩杏仁三兩去皮尖兩仁升麻白鮮皮沙參各二兩龍齒六兩寒水石一斤碎石膏二十兩碎生麥門冬去心四兩上九味以水一斗二升煎取三升去滓分溫為三服相去如人行十里許若甚者減水二升內竹瀝三升先用水煮九沸然後內竹瀝煮取三升服如上法壽頤按此方重用龍齒寒水石石膏清熱鎮墜之力尤專以治氣血並走於上更佳且方中不雜溫藥一味又古方之不可多得者但升麻可商頤意必以天麻易之張文仲療諸風煮散方外臺茯神六兩防風牛膝枳實炙防己秦艽玄參芍藥黃耆白鮮皮澤瀉獨活人參各四兩桂心三兩五味子一升碎薏苡仁一升碎麥門冬一兩去心羚羊角二枚屑石膏一斤碎甘草三兩炙磁石二十四兩上二十一味切分作二十四帖每日取一帖著杏仁十四枚去皮尖兩仁者碎以水三升煮取一升去滓空腹頓服壽頤按此方以磁石石膏為君確是重以鎮怯攝納浮陽之意則所謂治諸風者明明內動之風而非外感之風矣羚角玄參芍藥五味麥冬涼潤斂陰又無一非為肝陽上浮者立法豈非與續命等方之專主溫辛疏表者各異其趣但本方猶有桂心防風獨活數者則仍與外風之方渾熔於一爐之中不可不謂上方之未盡精密者也五石湯千金治産後猝中風口噤倒悶吐沫瘛瘲眩冒不知人紫石英三兩鍾乳赤石脂石膏白石英牡蠣人參黃芩白朮甘草瓜蔞根芎藭桂心防己當歸乾薑各二兩獨活三兩葛根四兩上十八味末五石㕮咀諸藥以水一斗四升煮取三升半分五服日三夜二一方有滑石寒水石各二兩棗二十枚壽頤按此方以五石為君明是潛陽鎮逆之意而黃芩蔞根葛根人參甘草又皆清熱養陰之品則所謂治産後中風口噤倒悶等症者豈非血去陰傷肝陽暴動內熱生風之病是與古方之豆淋酒獨活紫湯等法專治外感風邪而痙厥瘛瘲者不同惟方中仍有桂心乾薑則不脫當時慣用溫藥之套法此自古方之成例使然善學古人者必不可不知所變化也鐵精湯千金治三陰三陽厥逆寒食胸脅支滿病不能言氣滿胸中急肩息四肢時寒熱不遂喘悸煩亂吸吸少氣言輒飛揚虛損方壽頤按支滿之支讀為搘是搘撑之意黃鐵三十斤以流水八斗揚之三千遍以炭燒鐵令赤投流水復燒七遍如此澄清取汁二斗煮藥人參三兩半夏麥門冬各一斤白薇黃芩甘草芍藥各四兩石膏五兩生薑二兩大棗四十枚上十味㕮咀內前汁中煮取六升服一升日三服兩日令盡壽頤按此方以鐵精為主重以鎮逆可見其所謂治厥逆者即是素問所謂血氣並走於上之大厥也胸脅搘滿氣滿胸中急肩息肩息者喘息抬肩氣之上奔也喘悸煩亂吸吸少氣皆氣逆壅塞有升無降之候病不能言言輒飛揚則大氣渙亡神情瞀亂無一非內風暴動火升痰升之證故以鐵落鎮墜薑夏開痰薇芍膏芩清熱攝納立方法度極合時宜假令方中止此數味則以治肝陽厥逆豈不吻合惟參麥甘棗厚膩滋填未盡純粹而方下乃謂治三陰三陽厥逆則開口已含糊不切令人莫名其妙而寒食二字尤其文不對題藥不對證此是古書之必不可泥而亦必不當信者惟在善讀書者能自化裁信其所可信而疑其所可疑然後可集古人之長而亦不為古人所誤乃為有根底有識力而其學始有實用昔賢嘗謂用古方以治今病譬如折舊料以建新屋終有大小長短之不齊不經匠氏斧斤何能處處合拍學者豈可不知此理然而難言之矣真珠母圓本事治肝經內虛內受風邪臥則魂散而不守狀若驚悸真珠母三兩研細同碾熟乾地黃當歸各一兩半人參柏子仁酸棗仁各一兩云茯神暹羅犀角龍齒海南沉香忌火各半兩上為細末煉蜜為丸如梧子大辰砂為衣每服四五十圓金銀薄荷湯送下日午夜臥服壽頤按方下云金銀薄荷湯下蓋以金銀之重鎮定肝陽取金能平木之意然引用薄荷是仍以為外風矣詳此方主義本以鎮定其內動之風陽與薄荷之疏散外風者殊屬矛盾或曰當作金銀薄蓋傳寫者衍一荷字金銀薄者即今之金箔銀箔古書本有作薄字者其説甚為合理然頤謂叔微既以為內受風邪則其意尚認是外風恐叔微未必不用薄荷然以此方專治內風則薄荷不必加也許叔微曰紹興癸丑豫待次四明有董生者患神氣不寧每臥則魂飛揚覺身在床而神魂離體驚悸多魘通夕無寐豫為診視曰肝經受邪非心病也批內虛之病不當謂之受邪許氏之言本有未妥肝經因虛邪氣襲之肝藏魂者也遊魂為變是以臥則魂飛揚若離其體肝主怒故少怒則劇豫處此方以贈服一月而病除此方以真珠母為君龍齒佐之真珠母入肝經為第一龍齒與肝同類故能安魂節録壽頤按此方治肝風是專治肝陽自動之風珠母龍齒沉重潛揚其色青故專於平肝降逆許氏以此方列為中風門之第一方蓋亦知是病之為內因非潛鎮清熱不可棗柏茯神清養攝納輔佐亦最得力參歸熟地則為滋養陰虛者設法苟無熱痰上壅是為培本上策惟犀角專清心火凡治肝熱動風宜易羚角此方大旨本以鎮攝內動之風陽然古人雖用清熱之法而立論總以為外邪入臟殊失真相方下所謂肝經因虛內受風邪雖曰內受而既以為受邪則其邪仍是外來之風邪是有語病擬為僭易之曰治肝陰內虛風陽自動則內風為病庶幾明瞭而方中所用各藥乃皆親切有味矣近世平肝熄風之法知有珍珠母者實自叔微此方開其端是不可以不録薯蕷圓本事方薯蕷人參沙參遠志防風真珠母紫石英研水飛茯神虎骨各一兩虎睛一對二味須真者龍齒華陰細辛石菖蒲五味子丹參各一兩上細末煉蜜為圓梧子大每服三十圓至五十圓金銀薄荷湯下食後臨臥服批食後服藥蓋謂俟其食漸消化而後服藥庶乎藥力專一非謂乍食之後即以藥進也方書有所謂食遠服者即是此意若乍藥即食乍食即藥皆非良法説見後文許叔微曰元符中一宗人得疾逾年不差謁醫於王思和繹思和具脈狀云病因驚恐肝臟為邪其病時頭眩瘛瘲搐掣心包伏涎久之則害脾氣要當平肝氣使歸經則脾不受克以熱藥治之則風愈甚以冷藥治之則氣已虛今用中和溫藥抑肝補脾漸可安愈服此方及續斷圓獨活散一月而愈節録續斷圓獨活散二方俱見本事第一卷今不録壽頤按此亦治內動之風珠母龍齒石英皆潛陽熄風之主人參山藥所以扶脾防肝氣之來侮菖遠茯神開痰滌涎皆是古法虎骨虎睛則古人之意謂虎嘯而風生用其睛骨蓋亦鎮定風陽之理然溫而能動恐未必有驗今亦未聞有用之者若細辛防風則仍是古人之學理也辰砂遠志圓本事方安神鎮心治驚悸消風痰止眩暈石菖蒲遠志人參茯神川芎山芋鐵粉麥門冬天麻半夏曲天南星銼如骰子大麩炒黃白附子生各一兩細辛辰砂各半兩上為細末生薑五兩搗取汁和水煮糊圓如緑豆大別以硃砂為衣陰乾每服二十粒夜臥生薑湯送下小兒減半服許叔微曰鐵粉非但化涎鎮心至如摧抑肝邪其效特異若多恚怒肝邪太盛鐵粉能制服之素問云陽厥狂怒治以鐵落飲金制木也壽頤按此方鎮逆化痰無甚妙蘊惟用鐵粉其物甚新但不知如何粉法似不如千金鐵精湯之純粹無弊姑録之以備一説第五節化痰之方內風上擾多挾胸中固有之濁痰隨氣而湧所以古今之治此證者無不參用化痰之藥惟古方之治痰者甚多大部復疊加減無甚深意茲選録數法以備擇用皆各有一義者也枕中方千金常服令人大聰千金翼名為孔子枕中散鱉甲作龜甲鱉甲龍骨菖蒲遠志四味等分酒服方寸匕日三壽頤按此方以龍骨鱉甲潛陽熄風菖蒲遠志開痰泄降古人雖以為養陰清心聰耳明目之方實則潛藏其泛濫之虛陽泄化其逆上之痰濁則心神自安而智慧自益頤竊謂借治肝風內動挾痰上升之證必以此方首屈一指考本草經菖蒲辛溫主治濕痹遠志苦溫主治咳逆一以辛散而開其濕痰之痹著一以苦降而定其逆上之痰涎則氣自順而壅自開氣血不復上菀庶乎風波大定神志清明此菖蒲遠志之大功用也批千金此方本非治內熱痰壅之中風然一經説明則借治此病正是絲絲入扣可悟活用古方之法豈可與刻舟求劍者同日而語千金又有治多忘令人不忘方用菖蒲遠志茯苓茯神人參五味而遠志獨用七分參苓神各五分菖蒲二分蓋人之多忘恍惚無非停痰積濕矇蔽性靈千金方以遠志為君其意可見批闡明遠志之功用不獨時醫所未知而亦古今本草未言之奧義也今東瀛人以此物為化痰健將本是吾邦古學而近人止以為能開心竅不知其開竅之力即在化痰是知其然而不知其所以然遂有不敢重任之意藥理真詮久在迷惘之中可為長嘆又千金及翼方皆有定志小丸其藥即菖遠參苓四味而翼方又有鎮心省睡益智一方則遠志益智子菖蒲三味也後人又有轉舌膏一方謂治中風瘛瘲舌謇不語方即涼膈散加菖蒲遠志仍是清熱開痰之法又有二丹丸謂治風邪健忘養神定志和血內安心神外華腠理得睡方即千金之定志小丸如丹參熟地二冬硃砂甘草雖以養陰清熱為主而以菖遠化痰不失千金舊法然方下竟謂其治風邪健忘則又以為外邪恐非制方之本旨喻嘉言乃謂中風證心神一虛百骸無主風邪擾亂莫由驅之使出嘉言之意豈欲以清熱化痰之藥驅出外感之風邪耶是亦誤認內風為外邪耳蓋外風內風之辨嘉言固終身在夢夢中也星香湯易簡治中風痰涎潮塞不省人事服熱不得者南星三錢木香半錢生薑十片水煎服無時壽頤按此方以南星生薑化痰木香行氣是專治其痰氣之壅逆也方下謂服熱不得固明言其為內熱所生之風矣省風湯局方治卒中口噤不能言口眼喎斜筋脈抽掣風痰壅盛陳膽星一錢五分防風一錢生半夏黃芩生甘草各七分半壽頤按此方膽星為君而合半夏黃芩以治痰為主清熱為輔則所謂風痰壅盛亦是內動之風痰涎上湧清熱化痰其法甚善然方中仍用防風則又誤認為外風矣大省風湯局方治卒中痰逆嘔泄脈沉厥冷陳膽星二錢防風獨活生附子各一錢全蠍生甘草各五分張石頑曰此即省風湯去半夏黃芩加獨活附子全蠍二方雖分寒熱主治然必用生薑十片以開發風痰不可減也壽頤按此方用生附子是為濁陰上湧真陽欲脫者立法方下所謂痰逆嘔泄脈沉厥冷其症可見然此是陽氣之暴亡於法宜用參附甚者則三生飲加人參此方力量尚嫌不及且此證之風明是虛風內動防風獨活辛溫泄散適以速其暴脫而古人用之皆誤認外風之故也蠍是毒蟲走竄甚迅古人用以作搜風之藥亦惟感受山嵐瘴毒如大麻風之類尚有意義可尋然毒入胃腸終非良法此等方劑甚不足持惟古人既有此法學者亦當明知其功用何若姑録之而明辨之俾知瑕瑜互見欲用成法者必不可不知裁酌之道石頑所謂必用生薑十片以開發風痰則仍是治療外風之意耳正舌散治驚痰堵塞竅隧肝熱生風舌強不正蠍尾去毒滾醋泡炒三錢茯苓一兩妄汁拌曬為散每服二錢溫酒調服並擦牙齦日三度面赤倍蠍尾加薄荷半兩每服四錢水煎熱服取汗效壽頤按痰壅舌謇皆肝陽上激腦神經之病鎮肝潛陽其效立見蠍尾走竄迅速古人所謂主搜索經絡之邪風頤謂恐與氣火升浮激動腦經之旨不合乃此方明謂其肝熱生風而痰塞竅隧舌強不正確是古人已有成效之方劑其理何在蓋此方止用其尾專於下達則開痰降逆正賴其迅利之力觀其方後云面赤者倍加蠍尾豈非陽氣上浮之證而以其尾之下行者利導之亦與鎮逆潛陽之意暗合且已去其毒而用醋製又隱隱有收攝浮陽之法所以自有效力並用以擦牙者則走竄能開而又酸以抑木且可為痰壅喉關之奪門上將此則古人制方之妙用而未經道破者也批推敲古人制方之意能如此曲曲傳神而真有至情至理不致穿鑿附會走入魔道者即在古人書中亦自不可多得惟溫酒調服及加薄荷水煎熱服取汗則又未免誤認外風矣二陳湯局方治脾胃痰濕半夏薑製二錢半茯苓二錢陳皮去白一錢甘草炙一錢生薑三片上五味水煎空心溫服原方有烏梅肉今多不用去之壽頤按此治痰通用之方雖曰半夏燥津專治濕痰然痰之生也皆本於脾胃濕滯凡所謂燥痰者皆病久之化非痰生於燥也固此為痰飲家通用之主方凡治一切痰病無不本此溫膽湯治心膽虛怯觸事易驚多汗不寐短氣乏力皆由寒涎沃膽所致即二陳湯加枳實竹茹導痰湯治濕痰內外壅盛即二陳湯加南星枳實滌痰湯治類中風痰迷心竅舌強不能言即導痰湯加菖蒲人參竹茹壽頤按膽怯易驚是痰涎內盛古人謂之寒涎沃膽者以痰涎為濁陰所凝結因謂之寒非真寒也是以方名溫膽而並無一味溫藥導痰滌痰大旨相近皆最適用之成方也青州白丸子治風痰壅盛嘔吐涎沫手足癱瘓及小兒驚風白附子二兩生用半夏七兩水浸去衣生用南星二兩生用川烏去皮臍五錢生用上為末絹袋盛於井花水內澄出粉未出者揉令出渣再磨再澄用磁盆日中曝夜露每日一換新水攪而澄之春五夏三秋七冬十日去水曝乾如玉片以糯米粉作稀糊丸如緑豆大每服二十丸生薑湯下無時如癱瘓酒下小兒驚風薄荷湯下三五丸喻嘉言曰此方治風痰之上藥然雖經制煉溫性猶存熱痰迷竅非所宜施壽頤按此方本用青州范公泉之水澄粉故方以地名如阿膠之類取水性之沉重者以開痰降濁烏附星夏皆用其生而澄浸去毒又是制煉之一法然本性猶存誠如嘉言之論要知制方之意必為陰霾猝乘真陽欲亡者立法猶之三生飲而其毒稍減其性較和雖曰專治風痰須知風非外風而痰是寒痰本非通治熱痰之劑用生薑湯下者仍是為星夏烏附解毒之計初非欲以疏泄外感風寒若曰癱瘓酒下則苟是肝陽溫以濟溫殊非良法而小兒驚風尤多肝火上壅更非所宜乃用薄荷湯下是又以為外感之風而欲其疏泄甚非立方之旨惟中氣虛寒之慢脾風其痰上塞或可用此然證已瀕危恐亦無濟而更取薄荷泄散以為導引尤為悖亂此欲用古方者所宜細心探討而必不可人云亦云者也指迷茯苓丸治中脘留伏痰飲臂痛難舉手足不能轉移背上凜凜惡寒半夏曲二兩茯苓一兩枳殼風化硝各半兩薑汁打神麯糊丸梧子大每服三五十丸淡薑湯下壽頤按此方為中都留飲而經隧不利者立法蕩滌其垢膩則機軸自靈本非治肢節痹著之病又為治痰飲者別出一副機軸控涎丹治脅下痰積作痛甘遂大戟白芥子等分為末曲糊丸薑湯下十五丸至二十丸壽頤按此攻逐痰涎之峻劑古書主治謂忽患胸背腰胯手腳痛不可忍牽連筋骨坐臥不寧走移無定是痰涎伏在胸膈上下變為此病或頭重不可舉或神志昏倦多睡或飲食無味痰唾稠黏口角流涎臥則喉中有聲手腳腫痹疑是癱瘓但服此藥數服其病如失云云是即痰塞中州氣逆上壅神經不用之證故有以上諸恙忽然而起批忽然而起四字最宜著眼是腦神經病也古人立法不治其肢節之痹痛而專逐其痰涎剿破巢穴去其憑依則機關自利正是手眼之獨高處與指迷茯苓丸用意同而用藥更猛當隨其緩急輕重而擇用之張石頑謂形盛色蒼氣壯脈實之人有以上諸症者宜之後以六君調補若氣虛皎白大便不實小便清利者誤服之則不旋踵而告變矣礞石滾痰丸王隱君養生主論治頑痰積滯青礞石一兩沉香五錢大黃酒蒸熟切曬黃芩各八兩上礞石打碎用焰硝一兩同入瓦罐泥固火煅石色如金為度研末和諸藥水丸梧子大白湯食後服人壯氣實者可至百丸當下痰積惡物壽頤按頑痰痼積非攻不可王隱君專以此方見長讀其治案未免恃之太偏言之過甚然果有實滯亦不能不用此法惟痰之與飲病情不同飲是清稀之涎屬於寒化攻飲者宜茯苓丸控涎丹之類痰是凝厚之質屬於火化攻痰者宜此方亦不可混同論治者也貝母瓜蔞散治肥人中風口眼喎斜手足麻木左右俱作痰治貝母瓜蔞南星泡荊芥防風羌活黃柏黃芩黃連白朮陳皮半夏湯泡七次薄荷甘草炙威靈仙天花粉各等分加生薑煎喻嘉言曰中風證多挾熱痰而肥人復素有痰不論左右俱作痰治是矣但肥人多虛風瘦人多實火虛風宜用甘寒一派如竹瀝人參麥冬生地生葛汁生梨汁石膏瓜蔞玉竹胡麻仁等藥批瘦人多火是矣然肥人亦多有痰熱不可概以為虛而投滋膩是當以脈症辨之此方三黃並用可治瘦人實火而不宜於肥人虛風存之以備實火生風生熱之選壽頤按中風而手足麻木甚至癱瘓不用皆痰熱上乘神經為病丹溪左氣右血本是空言此方以清熱泄痰為主謂不論左右皆作痰治是能獨抒己見不為古書束縛識力固自有真究之此證之風純由痰熱生風初非外感必不當參用外風之藥模稜兩可而方中猶有荊薄羌防則亦未能免俗乃喻氏且謂中風證多挾痰熱則其意固謂以外風而兼痰熱者也是不可以不辨第六節順氣之方烏藥順氣散局方治暴中風氣攻注遍身麻痹語言謇澀口眼喎斜喉中氣塞有痰聲者麻黃去根節泡橘皮烏藥各二兩殭蠶炒川芎枳殼甘草炙白芷桔梗各一兩乾薑炮五錢上十味為散每服半兩加薑棗煎壽頤按內風暴動皆痰與氣之上逆治此者必以降其逆氣為要務此方以順氣為名其義甚善烏藥陳皮枳殼桔梗皆行氣散結之用而陳皮化痰殭蠶定風尤有深意惟芎芷上行麻黃散表不合內風之用而古人必雜以此類藥物者其意終謂風自外來也八味順氣散嚴用和凡患中風者先服此順養真氣次進治風藥人參白朮茯苓陳皮青皮台州烏藥香白芷各一兩甘草半兩上㕮咀每服三錢水煎溫服壽頤按此方為正虛而痰氣上逆者立法故用四君加以行氣之藥嚴氏謂內因七情而得者法當調氣不當治風其意以為七情氣逆皆屬正虛故必以參朮甘苓先扶其正方下所謂先服此以順養正氣者其意未嘗不善而豈知痰壅氣升之時已是實證參甘白朮反增滿悶且白芷芳香上升頗猛既謂不當治風則此物已是矛盾總之漢唐以下對於此病皆在五里霧中所立方法本無一完善可用之劑是當為古人曲諒者嚴又謂外出六淫而得者亦當先調氣後以所感六氣治之方下亦謂次進治氣藥皆是隔膜不必求全責備勻氣散良方治中風半身不遂口眼喎斜白朮烏藥人參天麻各一錢沉香青皮白芷木瓜紫蘇甘草各五分加薑煎壽頤按此方與前方大旨無甚區別雖參朮甘草尚嫌補塞痰壅者必非所宜惟烏沉青皮皆能宣泄氣滯而天麻木瓜有攝納之力最是切合要知此證純是內因之氣火上逆與外感風邪絶無關係是以方中不雜羌獨荊防一味較之局方之用麻黃者尤為純粹無疵惟白芷紫蘇微嫌升散差有可議若易以枳實蘇梗則於順降之旨更無間然不謂喻嘉言録入醫門法律乃謂身內之氣有通無壅則外風自不能久居而易於解散則制方之人本不為外風而設何以作注解者必欲勉強牽合外風一途真是援儒入墨伎倆然而立方之旨已是點金成鐵可為一嘆學者於此等界限必不可不體會清楚否則作繭自縛永無辨別淄澠之日矣批古人有用之佳方為注解者點金成鐵亦復何限惜不易得如此之手筆一一而糾正之第七節清熱之方中風證治但讀古書續命諸方每謂古人皆為外感寒風設法寧不與肝風自煽氣血上菀之旨背道而馳然細繹千金外臺二書則涼潤之劑亦所恆有已可見內熱生風之證本是古今所同而如許仁則之論內風尤其剴切詳明大開覺悟固不待河間丹溪而始知其為內因也惜乎末學淺近自安不求博覽遂令古人良法幾若無聞以此談醫能無弇陋茲録涼潤清熱之劑列為一類可知續命一派本是一偏之見必不可以療治內因之風而學者欲為切實有用之學又安可擯絶古書束之高閣耶批古書固不可不讀然醫界中能讀古書之人已恐不可多得若能於古書之中擇善而從自具隻眼苟非真學識真閲歷亦復談何容易奈何不學無術之流偏喜藉此一門以為謀生捷徑此洄溪老人所以有行醫之嘆也生菖根三味湯外臺引許仁則療諸風病方原文曰此病多途有失音不得語精神如醉人手足俱不得運用者有能言語手足不廢精神恍惚不能對人者有不能言語手足廢精神昏亂者有言語手足精神俱不異平常而發作有時每發即狂浪言語高聲大叫得定之後都不自省者有發則狂走叫喚者有發則作牛羊禽獸聲醒後不自覺者有發即頭旋目眩頭痛眼花心悶輒吐經久方定者有每發頭痛流汗不能自勝舉者此等諸風形候雖別尋其源也俱失於養生本氣既羸偏有所損或以男女或以飲食或以思慮或以勞役既極於事能無敗乎當量已所傷而舍割之靜養息事兼助以藥物亦有可復之理風有因飲酒過節不能言語手足不遂精神昏恍得病經一兩日宜服此方生葛根一挺長一尺徑三寸生薑汁一合竹瀝二大升壽頤按權量之制皆古小而今大隋以前之一兩一升大率當唐以後三分之一唐世通用之權量固已皆大惟藥劑猶用古法所以唐世藥方其分量大約與古方相近此唐人所以有大稱小稱之名也然藥劑中或有用當時之權量者則加大字以別之如此方所謂二大升是其例矣上藥取生葛根洗刷搗極碎榨取汁令盡又搗即以竹瀝灑再榨取汁汁盡又搗不限遍數以葛根粉汁盡為度和生薑汁棉濾之細細溫服附千金竹瀝湯治四肢不收心神恍惚不知人不能言方竹瀝二升生葛汁一升生薑汁三合上三味相和溫暖分三服平旦日晡夜各一服壽頤按竹瀝生葛皆涼潤以清內熱薑汁以化痰壅且以監製竹瀝葛汁之過於寒涼讀許氏之論謂失於養生是即河間水不制火之旨所述失音不語精神如醉手足不用諸症豈非金匱之所謂不遂不仁不識人舌難言而許氏能知其病由內因藥主涼潤豈得謂古人之治中風者止有續命湯一法許氏此論豈不較之金匱切近病情惟近人多見金匱少見外臺遂不知有此議論耳批外臺千金是漢魏六朝醫方之淵藪習醫者皆不可不一問津但終是類書體例瑕瑜互見不可盡信耳此方雖未及潛降一層以治氣血上菀沖激腦經或未必遽有捷效然柔潤清勢亦未嘗不可少殺其沖激之勢千金亦用此方以治肢體不收神情恍惚及不識不言之症更可見內熱生風之病本是古人所恆有而似此清熱涼潤之方又是六朝隋唐通用之治法後之學者慎弗徒執金匱寒虛相搏邪在皮膚一節而止知有外邪之中風也壽頤又按葛根氣味俱薄能鼓舞胃氣升舉清陽發泄肌表故為傷寒陽明經主藥仲景桂枝加葛根湯治太陽病項背強汗出惡風是風寒入絡經隧不利之病則葛根有通絡散邪之功也葛根湯治項背強無汗惡風則葛根為升陽泄表之用也葛根湯又治太陽陽明合病自下利葛根黃芩黃連湯治太陽病誤下而利遂不止是葛根能升舉脾胃下陷之清陽也批證之於古葛根功用觀此數方之主治已可得其神髓下逮六朝則有用鮮葛根搗汁以治胃熱者是以名醫別録有生根汁大寒之説而本草經亦有主嘔吐一條似又為清胃定嘔之用然使果能定嘔止逆則必與升舉脾胃清陽一層自相矛盾亦即與治二陽合病下利一條枘鑿不合今治麻疹不透面部不發者恆用乾葛根三五分和入泄表開肺隊中一劑即能透出是其上升胃氣極為迅速之明證批驗之於今而用之過當則為頭痛巔頂痛夜不成寐若其人本有痰涎而胸滿泛惡者誤服乾葛必嘔吐不已則升陽而引動胃家逆氣為害不小蓋葛根上升至捷殊覺古人以治嘔逆必不穩愜雖曰鮮者搗汁涼潤可以下行當與乾者有間須知利於清氣之下陷者必不利於濁氣之上逆外臺千金以此方治諸風為內熱而設其時未知是氣血上升為病用之以清胃熱固是古人常法然今既悟徹氣血上菀之理則葛根挾上升之性必非此病針對之藥不可盡信古書率爾效顰反以貽害蓋凡用一藥皆不可不細心體會而深知其實在之利弊也近賢王孟英輩論溫熱之病忌表忌升於柴葛二藥恨於切齒畏如砒鴆雖有時未免言之太甚然輕率用之貽禍甚巨升散發表之僨事固非陶節庵輩所能知也批每用一藥而能如是體會研求醫學哪有不昌明之理然心粗氣浮之流必不可以語此生地黃煎千金治熱風心煩悶及脾胃間熱食不下方生地黃汁枸杞根汁各二升生薑汁酥各三升荊瀝竹瀝各五升天冬人參各八兩茯苓六兩大黃梔子仁各四兩上十一味搗篩五物為散先煮地黃等汁成煎次內散藥攪和服一匕日再漸加至三匕覺利減之醫門法律引此方生地汁杞汁作各五升薑汁酥作各一升薑汁較少似為合法俟更考之壽頤按熱風而心煩悶明是內熱所生之風脾胃內熱而致不能食則壅塞甚矣故於涼潤隊中加大黃以泄其積熱又是一法方中冬地人參養陰潤燥於燥熱之證為宜若有痰壅不可混用生薑汁殊嫌太多宜減去十之九千金治積熱風方地骨皮萎蕤丹參黃耆麥冬澤瀉各三兩清蜜薑汁各一合生地汁二升上九味以水六升煮六味取二升去滓內生地汁更緩火煮減一升內蜜及薑汁又煮一沸藥成溫服三合日再壽頤按風病而曰積熱則熱自內積風自內動豈不了然選藥全用甘寒無非為陰虛於下陽浮於上內熱生風者設法此亦古方而病情藥理如是豈得謂古之中風皆外來之寒風耶排風湯千金治諸毒風邪氣所中口噤悶絶不識人及身體疼痛面目手足暴腫者犀角貝子羚羊角升麻各一兩上四味為散以水二升半內四方寸匕煮取一升去滓服五合壽頤按方下所謂口噤悶絶不識人身體疼痛等症固是肝風暴動上衝入腦神經不用之病藥用犀羚貝子平肝潛陽清熱熄風而兼鎮逆以治內風皆是吻合必有捷效可知制方之意固亦見到內熱生風是以投此三物然方下乃謂諸毒風邪氣所中則仍誤認為外來之風邪夫豈有犀羚貝子可治外中風邪之理反覺藥不對病自盾自矛如此説法大不可解耳且使良方妙用晦而不顯蓋方下主治已非此藥真旨吾恐古人立方本意必不若是惟方中雜以升麻一味上升泄散則古人終謂此證之必挾外邪也頤謂宜以天麻易之石膏湯千金治腳氣風毒熱氣上衝頭面面赤痙急令人昏憒心胸恍惚或苦驚悸身體戰掉手足緩縱或酸痹頭目眩重眼反鼻辛熱氣出口中或患味甜諸惡不可名狀者石膏龍膽升麻芍藥貝齒甘草鱉甲黃芩羚羊角各一兩橘皮當歸各二兩上十一味以水八升煮取三升分三服壽頤按此方下所謂風毒熱氣上攻頭面面熱痙急令人昏憒恍惚驚悸身體戰掉手足緩縱頭目眩重眼反鼻辛熱氣出口味甜等症病狀多端無一非內熱生風腦經瞀亂為病而藥用涼潤潛降泄熱收攝更覺無一不是對證之良藥古人雖尚未發明神經之病而立方如此實能一一暗合潛陽熄風之旨此是古方中之最不可多得者然病已熱氣上衝地加於天而方中猶有升麻助其上越終是古人誤會即當歸氣味亦是辛溫上升在古人雖以為活血通絡之用然今日既知是氣血上升為病則凡屬升散皆當禁絶芎藭酒千金治腦風頭重頸項強䀮䀮淚出善欠欲眠睡憎風劇者耳鳴眉眼疼滿悶吐逆眩倒不自禁諸風乘虛經五臟六腑皆為狂癲諸邪病悉主之芎藭辛夷天雄人參天門冬柏子仁磁石石膏茵芋山茱萸白頭翁桂心秦艽各三兩松蘿羚羊角細辛薯蕷菖蒲甘草各二兩雲母一兩燒令赤末為粉防風四兩上二十一味㕮咀以酒二斗七日初服二合漸加至五合日三壽頤按方下所謂頭重淚出耳鳴眉眼疼諸症無一非肝風自動之病若滿悶吐逆眩倒不禁或為癲狂則氣血上衝腦經瞀亂矣此方主治名以腦風可見古人亦未嘗不知病之在腦而藥用羚角清肝磁石石膏重墜攝納天冬柏仁白頭翁涼潤清熱以定內動之風火證治非不符合然古人習慣凡是風病無不以為外來之邪所以有諸風乘虛經五臟六腑之説且隱隱然有外風非溫燥不可之意即使確有內熱見症重任涼藥而亦必雜以桂附細辛之屬自盾自矛恬不為怪制方龐雜亦必不能為古人諱此則本方諸味不特天雄茵芋桂心細辛必為內風上擾之鴆毒即山萸雲母皆溫養腎肝亦非所宜而芎藭辛夷防風溫升疏散均是禁藥且酒之上升尤為抱薪救火是皆古人誤認外風之治法欲用古方必不可食古不化五補丸千金凡風服湯藥多患虛熱翕翕然宜除熱方壽頤按方中黃芩重出必有偽誤防風人參蓯蓉乾地黃羚羊角麥門冬天門冬各一兩半芍藥獨活乾薑白朮丹參食茱萸一雲山茱萸甘草茯神升麻黃芩甘菊地骨皮石斛牛膝五加皮薯蕷各二十銖秦艽芎藭桂心防己生薑屑黃芩各一兩附子十八銖石膏三兩寒水石二兩上三十二味為末蜜和丸如梧子大生薑蜜湯服二十丸日三稍加至三十丸壽頤按方下謂凡風服湯藥多患虛熱可見古人治風恆用溫藥自有流弊甚至特立此方以除內熱更可見古時已多內熱生風之證然此方本以除熱而仍有桂附十薑則古人之癖真不可及且防風芎藭獨活升麻亦必非內熱生風之所宜也批得此一方以證古人常用溫燥之弊方下所謂服湯藥者多患虛熱正是古人所自言然非讀書得間亦何能於無字之中尋得確據延年急療偏風膈上風熱經心臟恍惚神情天陰心中惛惛如醉不醉方外臺祕要淡竹瀝三升若熱多用竹瀝冷多用荊瀝羚羊角二分屑石膏十分碎茯苓六分上四味以水一斗合竹瀝煮取一升五合去滓食後分為三服常能服之永不畏風發壽頤按方止四味平肝清熱熄風化痰面面皆到此古人療治內熱生風之最良方劑方後所謂常能服之永不畏風發固明謂風自內生所以有不時發動之慮若果是外感之邪風則何所謂發與不發耶頤又按古人服藥恆有食前食後之法説者謂病在上部者宜先食而後服藥欲使藥浮於上易於上行病在下部者宜先服藥而以食壓之欲使藥沉於下速於下達觀此方服於食後蓋以為風熱上壅病在上焦故須先食後藥亦是欲其上行之意可知此等服法由來已古然以藥治病不過是藉其氣味之運行可以疏通疾苦必非所服之藥物即能直達病所則所賴胃中清靜然後飲藥入胃而運化之力既專藥性亦純而不雜其效始捷若胃中之食物未化而藥與食和氣味俱雜藥力無不鋭減為利為害可想而知尚何望其上行下行可以速效耶此亦醫家舊説之一大弊竇也批駁正食前食後服藥之弊則古人上行下行之説真是大謬凡是中醫理想之壞處而前人皆未之悟也薏苡仁等十二味飲外臺引許仁則療風熱未退方薏苡仁一升萎蕤五兩生麥門冬二兩去心石膏八兩碎生薑八兩杏仁六兩去皮尖兩仁者碎烏梅四十枚擘生犀角屑地骨白皮各三兩人參二兩竹瀝一升白蜜二合上藥切以水一斗煮十味取三升去滓內竹瀝白蜜攪調細細飲之壽頤按外臺所録許氏數方皆為陰虛陽越內風上冒者立法此方涼潤之力尤專而玉竹麥冬濕潤養陰烏梅柔肝收攝更為滋養肝陰招納浮陽而設以治陰虛於下陽升於上最為切近則無痰者最為合宜而氣升痰升者亦當知所裁改也苦參十二味丸外臺引許仁則療風熱未退方苦參乾薑芎藭各六兩玄參丹參人參沙參白朮各五兩地骨白皮獨活各四兩薏苡仁蜀升麻各二升上藥搗篩蜜和為丸如梧子大用薏苡仁飲下之頤按薏苡仁飲即上方初服十五丸日再服稍稍加至三十丸壽頤按此方即前方之意惟川芎乾薑獨活升麻則仍當時通治外風之法耳黃連八味散外臺引許仁則療諸風熱氣少退熱未能頓除者方黃連黃芩乾薑蜀升麻知母乾地黃各一斤梔子仁大青各半斤上藥搗篩為散每食後飲服一方寸匕日再服稍加至二匕若能食飲適寒溫男女節勞逸候體氣服前方乃至終身無熱病急黃暴風之慮壽頤按此方除乾薑升麻外苦寒甘寒惟以清泄內熱為事方下所謂終身無熱病暴風者是寒涼泄熱而內風不作之明效也廣濟療熱風旋心悶沖風起即欲倒方外臺祕要麥門冬去心山茱萸茯神苦參各八分地骨皮薯蕷人參蔓荊子沙參防風芍藥枳實大黃各六分甘菊花龍膽各四分上十五味搗篩蜜丸每食訖少時以蜜水服如梧子大二十丸日二漸加至三十丸壽頤按熱風頭旋即肝陽風動而頭目為之眩暈也風起欲倒則氣血上升腦神經瞀亂之候方用苦寒甘寒清熱下奪亦是降泄之意惟蔓荊防風仍是疏泄外風之藥耳天麻丸潔古保命集治腎臟虛熱生風天麻牛膝二味酒浸二日焙川萆薢黑玄參羌活各四兩當歸十兩杜仲酒炒七兩附子炮去皮一枚生地黃酒浸焙一斤為末煉蜜丸梧子大侵晨沸湯臨臥溫酒下五七十丸壽頤按方下明言腎臟虛熱生風是制方之旨明為肝腎相火不藏化風上擾者設法藥用天麻牛膝沉重下達使龍相之火安其窟宅而內動之風陽自熄玄參生地寒涼滋潤養水之源則虛陽不致復動更以萆薢杜仲泄導濕熱則濁邪疏滌而正氣自安用意非不周到其以天麻為方名者本取定風之義昔人謂天麻為定風草有風不動其能鎮靜熄風已可概見而入藥又用其根質大而重明淨多脂故能攝納虛風滋養陰液乃俗學不察誤以為祛除外來風邪之藥則大謬矣惟此方明以鎮熄內風為主而方中反用羌活之辛溫升散以振動之終是古人外風內風不甚分別之過其用附子一枚者蓋謂腎陽亦虛欲其引之歸宅然既因虛生熱則附之溫補下元亦必不合又當歸雖曰補陰補血究之氣味芳烈辛溫善動此方乃重任以為主宰豈不助其虛熱動其虛風是皆制方之未盡純粹者不可不知所去取喻氏法律收此方謂治腎熱生風熱盛則動宜以靜勝其躁説理未嘗不是要之本方中有附子羌活當歸必不可概以為靜藥又張石頑之論此方謂方中雖以歸地補養陰血為君其妙用全在天麻與牛膝同浸同焙使風痰濁濕咸從下趨而不上逆又以萆薢杜仲以祛在裡之濕熱云云是真能識得制方之精義者乃又謂其得力處在以附子之雄烈引領歸地直入下焦填補其空使風邪無復入之慮抑知此是內熱而動風本非外來之風方內附子且惡其擾動腎熱大背喻氏靜以勝躁之義而顧可謂其得力在此填補空虛以杜風邪之復入則誤信嘉言侯氏黑散之謬論勉強盲從而不自知其走入魔道者且酒性升發走而不守方下既曰虛熱生風則真陰既虛浮陽上越靜以攝之猶虞不逮又何可酒浸酒焙助其發越此又藥與病反者亦與嘉言以靜勝躁之義大相矛盾況在今時氣血上衝之理亦既昭然大白於天下則後之學者即欲採用成方亦當知所裁改矣涼膈散局方治溫熱時行表裡實熱及心火亢盛目赤便祕胃熱發斑大黃酒浸二兩芒硝一兩甘草炙六錢連翹黃芩山梔各一兩薄荷七錢為散每服四五錢加竹葉十五片蜂蜜少許水煎溫服日三夜二服得下熱退為度一本無竹葉有薑一片棗一枚蔥白一莖壽頤按此方本為熱聚膈上而設芩梔連翹竹葉專清上焦之熱硝黃特以導熱下行本非欲其直瀉故黃用酒製而更以蜂蜜炙草甘以緩之皆欲其留戀遲行不遽下泄則上焦之熱與藥俱行一鼓而奏廓清之績方後所謂得下熱退是其徵也局方本以治時行熱病之表裡俱熱者故用薄荷兼以疏表又以通治感冒風熱故或加生薑蔥白張路玉謂硝黃得枳朴之重著則下熱承之而順降得梔芩翹薄之輕揚則上熱抑之而下清此承氣涼膈之所由分頤謂和劑此方雖非為中風而設然內風暴動之病亦無不膈熱如焚以致化風上擾昏眩無知苟能泄導其熱則氣血之上菀者自然投匕而安古有防風通聖散一方謂治西北卒中內外熱極其方即涼膈散加麻黃石膏滑石白朮防風荊芥桔梗川芎當歸芍藥生薑其用麻黃荊芥芎歸雖仍是認有外風不脫溫升疏散舊習然硝黃石膏梔芩翹芍大隊清火亦可見其證內熱如焚所以用藥若是則所謂西北卒中之病亦猶是內熱所生之風麻防歸芎終是可議喻嘉言録涼膈散於中風篇稱其治心火上盛膈熱有餘目赤頭眩口瘡唇裂吐衄涎嗽稠黏二便淋悶胃熱發斑小兒驚急潮搐瘡疹黑陷大人諸風瘛瘲手足掣搦筋攣疼痛且謂中風證之大勢風木合君相二火主病多顯膈熱之證批嘉言之論中風常以為外受之風而於此獨能知其為風木合君相二火主病蓋其所見之病必多內因之風故能有此見到語喻氏本極靈敏所以能隨機變化也古方用涼膈散最多如清心散即涼膈加黃連轉舌膏即涼膈加菖蒲遠志活命金丹即涼膈散加青黛藍根蓋風火之勢上炎胸膈正燎原之地所以清心寧神轉舌活命涼膈之功居多不可以宣通腸胃之法輕訾之云云推重此方甚至更可見內風內熱自古為然矣瀉青圓錢仲陽小兒藥證真訣治肝熱搐搦脈洪實者當歸去蘆頭切焙龍腦川芎山梔子仁川大黃濕紙裹煨羌活防風去蘆頭切焙上等分為末煉蜜和圓雞頭大壽頤按雞頭今稱芡實以芡實帶殼時有毛刺其開花處尖鋭形如雞之頭今吳人土語尚有此名考本草經止稱雞頭實説文云芡雞頭也周禮籩人加籩之實芡鄭注芡雞頭也方言廣雅亦稱雞頭淮南子説山訓雞頭已瘻高誘注曰水上芡知雞頭之名由來最古而吾吳土語固二千餘年相承之舊非俗諺也每服半圓至一圓煎竹葉湯同砂糖溫酒化下壽頤按此方諸書多有龍腦皆作龍膽草惟建德周氏刻錢氏小兒藥證直訣則作龍腦考龍腦大寒清肝之力勝於龍膽藥雖異而理可通但錢氏此書世無單行舊本乾隆時武英殿有聚珍版本三卷已從永樂大典中掇拾排纂而成則當時開四庫館廣搜海內尚未得此至光緒中葉周學海刊入叢書乃謂得宋刻舊本今姑從周本録入惟錢氏諸方凡用龍腦分量皆輕而此方與諸藥等分似亦不合錢氏體例但此是丸子而每服僅芡實大之半丸至一丸藥共七味則龍腦雖與各藥等分所服亦不為太多若是龍膽草則七味均是草藥止服一丸頗覺病重藥輕恐不中病則周本之作龍腦者似非誤字批因本獨用龍腦即因其每服止芡實大之一丸或半丸而知其不誤是讀書於無字處得之凡讀古書皆當具此眼力今未見聚珍版本俟更考之又坊本薛氏醫案中亦有此書則已為立齋重編恐不足據又各書中多引是方皆作彈子大每服一丸雖同是一丸而丸之大小懸殊則各本固在用龍膽草者也壽頤按錢氏此方以治肝熱搐搦脈洪實者固是治內熱生風以清肝泄熱為主本非治外感之風則方中羌防川芎辛升溫散大非所宜惟龍腦梔軍為合用耳而各醫書中之引此方者其主治皆作治中風自汗昏冒發熱不惡寒不能安臥此是風熱煩躁云云則以為治外受之熱風與錢氏主治肝熱之意全然不合一內一外差以毫釐謬以千里且川芎羌防亦非外感風熱之所宜也龍膽瀉肝湯局方治肝膽實火脅痛口苦耳聾或耳痛頰腫耳前後腫及陰濕熱癢瘡瘍溲濁溲血脈弦徑不撓者龍膽草酒洗黃芩酒炒山梔子澤瀉木通車前子當歸酒洗柴胡甘草生地黃水煎服當歸龍薈丸河間宣明論治肝經實火頭痛暈眩巔頂熱痛耳脹耳聾驚悸搐搦躁擾狂越大便祕結小溲澀滯或胸脅搘撑䐜脹結痛脈弦大有力數實者當歸龍膽草黃芩黃連黃檗梔子各酒炒一兩蘆薈大黃青黛各五錢廣木香二錢半麝香半錢為末神麯和丸壽頤按瀉肝湯龍薈丸二方皆為肝木鬱熱而設但一則濕與熱蒸病在經絡尚未窒塞臟腑故龍膽芩歸皆用酒洗欲其上行經隧而以木通車前導之從小便而出且惟恐苦降滲泄抑遏太甚而肝膽之氣更窒則以柴胡春升之氣疏達木鬱此苦寒泄降隊中獨用柴胡升陽之本旨也一則實結不能經絡大府俱塞二便不快故以蘆薈大黃大苦大寒蕩其蘊熱泄其瀦穢雖一為滲泄一為攻逐立法不同而其為清滌濕熱疏通滯氣則大旨相近凡肝膽積熱變生諸病脈來弦徑滑實者非釜底抽薪導通鬱熱不易速效此二方者雖非為內風病設法然木火既旺即自生風凡由實熱而動風者氣粗息高狂躁多怒此二方亦多適用之處第八節滋養之方內風乍定痰壅既開自當滋養以培其本庶幾陰液漸充可以持久而無變幻否則風波初過彼岸未登惟恐駭浪復興狂飆益肆而欲以破壞之舟楫常與怒濤相激戰終慮有滅頂之災此中風家恆有頻發頻愈而忽爾一蹶不可復振者皆元氣未復真陰未充善後之術未盡完善也惟是滋養之法不一而足相體裁衣或養陰或補中斷非空言所能詳盡而如四君四物養榮歸脾等方又是盡人能知更何必徒學抄胥借充篇幅但此證之火升氣升生風上激擾亂神經終屬肝腎陰虛浮陽陡動必以滋養肝腎真陰為調理必需之品爰採數則以見一斑批刪盡尋常各方是作者之手眼獨高處而歸之於滋養肝腎真陰又是探本窮源一定不易之理集靈膏從王秉衡重慶堂隨筆人年五十陰氣先衰老人陰虧者多此方滋養真陰柔和筋骨西洋參取結實壯大者刮去皮飯上蒸九次日中曬九次甘杞子懷牛膝酒蒸天冬麥冬懷生地懷熟地仙靈脾上八味等分熬成膏白湯或溫酒調服壽頤按此方始見於繆仲醇先醒齋廣筆記云出內府補心腎益氣血方止七味無仙靈脾而用人參又張錫三治法匯亦載之則更無牛膝云治一切氣血兩虛身弱咳嗽者罔不獲效凡少年但覺氣弱倦怠津液少虛火上炎急宜服之免成勞損王秉衡謂參價甚昂非大力者不能致易以西洋參可與貧富共之方名集靈當以有仙靈脾者為是王國祥謂惟魏玉璜善用此方續名醫類案極言其功效又謂此即人參固本加味也峻補肝腎之陰無出此方之右者頤按柔潤滋填而擇仙靈脾之溫煦陽和不嫌燥烈者以調濟之使陰陽平祕而不偏於滋膩陰柔是制方之妙義若嫌其助陽而刪去之則純是滋填無一毫陽和之氣誠屬非是且方名集靈果無仙靈脾亦有集而不靈矣牛膝所以導引諸藥歸於下焦肝腎亦不可少之品惟下元不禁者忌之若用以為類中善後斂陽填陰則牛膝下達尤不可少王易人參以洋參欲其價值廉而功效近似也然洋參苦寒滋養之力甚薄僅能潤肺胃燥火尚有微效若欲滋補真陰必不足以語此且今日之西洋參價貴兼金有名無實甚不足取不如倍用沙參尤為相近且遼參之普通者亦不甚貴固不必效王公巨家必以六百換八百換為良品也滋水清肝飲高鼓峰治陰虛肝氣鬱窒胃脘痛脅痛脈虛弦或細軟舌苔光滑鮮紅者方即六味地黃湯加歸身白芍柴胡山梔大棗壽頤按自薛立齋張景嶽趙養葵輩濫用六味地黃而世之醫者無不視六味為滋陰補腎必須之品抑知六味之方本從八味腎氣丸而來原為腎氣不充不能鼓舞真陽而水道不利者設法故以桂附溫養腎氣地黃滋養陰血而即以丹皮泄導濕熱茯苓澤瀉滲利小水其用山藥者實脾以堤水也立方大旨全從利水著想方名腎氣所重者在乎氣之一字明非填補腎陰腎陽之意至錢仲陽而專用六味以治小兒腎虛究竟丹皮苓瀉偏於滲泄豈能識得腎氣丸之本意批六味一方自錢氏以來無不視為補陰要藥今得如此一解誰不恍然大悟豈獨薛趙景嶽終身夢夢即明達如仲陽亦未免智者之一失是亦可謂之新發明矣而今之俗醫且皆以為滋填補腎之藥則中薛趙景嶽之毒葫蘆依樣而未嘗以方中藥性一思之耳即有為六味作説解者輒曰補中有瀉所以靈動要之皆皮相之論模糊敷衍實未能洞見癥結高氏是方雖亦從六味而來而加以歸芍柴胡能行血中之氣疏肝絡之滯斂肝家之陰滋補中乃真有流動之機且以丹皮山梔茯苓澤瀉清泄肝經鬱熱治䐜脹搘滿等症恰到好處所以可取以視單用六味者大有區別讀者不可與立齋景嶽養葵之書作一例觀也批高氏此方貌視之不過六味加味耳抑知六味中之丹皮苓瀉必如此用法而恰合身分經此説明始覺是方之不同流俗作者真高氏之知已也一貫煎魏玉璜治肝腎陰虛氣滯不運脅肋攻痛胸腹䐜脹脈反細弱或虛弦舌無津液喉嗌乾燥者沙參麥冬生地歸身枸杞子川楝口苦燥者加酒炒川連壽頤按脅肋脹痛脘腹搘撑多肝氣不疏剛木恣肆為病治標之法每用香燥破氣輕病得之往往有效然燥必傷陰液愈虛而氣愈滯勢必漸發漸劇而香藥氣藥不足恃矣若脈虛舌燥津液已傷者則行氣之藥尤為鴆毒柳洲此方雖是從固本丸集靈膏二方脫化而來獨加一味川楝以調肝氣之橫逆順其條達之性是為涵養肝陰第一良藥凡血液不充絡脈窒滯肝膽不馴而變生諸病者皆可用之苟無停痰積飲此方最有奇功陸定圃冷廬醫話肝病一節論之極其透徹治肝胃病者必知有此一層理法而始能覺悟專用青陳烏朴沉香木香等藥之不妥且此法固不僅專治胸脅脘腹搘撑脹痛已也有肝腎陰虛而腿膝痠痛足軟無力或環跳髀樞足跟掣痛者授以是方皆有捷效故亦治痢後風及鶴膝附骨環跳諸症讀續名醫類案一書知柳洲生平得力者在此一著雖有時未免用之太濫然其功力必不可沒乃養陰方中之別出機杼者必不可與六味地黃同日而語若果陰液虛甚者則方中沙參尚嫌力薄非遼參不可而脾腎陽衰者則高麗參亦其宜也口苦而燥是上焦之鬱火故以川連泄火連本苦燥而入於大劑養陰隊中反為潤燥之用非神而明之何能辨此滋營養液膏薛一瓢方女貞子旱蓮草霜桑葉黑芝麻黃甘菊枸杞子當歸身白芍藥熟地黃黑大豆南燭葉白茯神萎蕤橘紅沙苑蒺藜炙甘草天泉水熬濃汁入黑驢皮膠白蜜煉收壽頤按此方彙集峻養肝腎二陰諸物意在厚味滋填而參用輕清靈動尚不至於呆笨重濁所以可法服之者亦必無滯膈礙胃之虞又按凡服食之藥古人制方本是立之大法示以儀型須於臨用之時相體裁衣隨其人之體質而斟酌量度審擇增損即方中諸物尚可隨宜去取換羽移宮與時進退並非教人死於字句之間呆抄呆用所以近賢定方膏丹丸散多有不載分量者其誘掖後進欲其能自變化庶幾活潑潑地運用無窮其意深矣近賢商務書館編有所謂醫學辭典者所録此方注明前十四味各四兩末二味則各二兩無論其是否合宜而以熟地黃極重之質與橘紅桑菊等之輕清者同一分量試觀古近成方曾有如是之毫無軒輊者否可見編輯者原是門外人致有如此之無法而乃託名醫林則吾國醫學真掃地盡矣壬戌二月山雷識心脾雙補丸薛一瓢方西洋參蒸透白朮蒸熟茯神甘草生地黃丹參棗仁炒遠志肉北五味麥門冬玄參柏子仁黃連香附制川貝母桔梗龍眼肉壽頤按是方從歸脾湯加減亦與集靈膏異曲同工其用黃連者即魏柳洲一貫煎加味法也左歸飲張景嶽方治腎水不足熟地山藥枸杞子炙甘草茯苓山茱萸壽頤按是方即六味之變以杞子炙草易丹皮澤瀉滋養肝腎之陰誠在六味之上而無滲泄傷津之慮此景嶽之見到處然尚嫌呆板而欠靈動以少氣分之藥故也其左歸丸方則即此六物去甘草茯苓而加牛膝菟絲龜鹿二膠尤其滯矣第九節通絡之方內風暴僕而忽然肢體不遂經絡掣痛皆氣血上菀腦神經忽然不用之病此非通經宣絡活血疏風之藥所可妄治者古人不知此理每於暴病之初治其肢節則走竄行經反以擾動其氣火更以激之上升必有大害而無小效然在旬月之後大勢已平而肢節之不用如故則神經之功用已失肢體之偏廢已成痼疾難瘳調復豈易古來治痹之方大率皆為此設法則通絡行經亦治醫者不可不知姑録數方以備一解獨活寄生湯千金腰背痛者皆由腎氣虛弱臥冰濕地當風得之不時速治流入腳膝為偏枯冷痹緩弱疼痛或腰痛攣腳重痹宜急服此方獨活三兩寄生杜仲牛膝細辛秦艽茯苓桂心防風芎藭乾地黃人參甘草當歸芍藥各二兩上十五味以水一斗煮取三升分三服溫身勿冷古今録驗無寄生有續斷肘後有附子一枚無寄生人參當歸甘草壽頤按此方治風寒濕邪痹著之主方以獨活為君通行經絡祛風解寒勝濕其輔佐諸藥除參甘地芍之養陰數味外無一非風寒濕三氣之正將方雖出於千金而肘後及古今録驗俱有之可知古人甚重此方尚非孫氏所自制此通絡祛邪活血養血之祖方也凡古今治肢節病之方無不從此化出惟桂心細辛等物古人終為寒邪立法而內熱生風之病縱然調治數日大勢已平通絡可也如此溫藥必不可試批此為內熱生風肢節痹痛者補出仍忌溫燥一層蓋古人治痹諸方無一非為寒濕立法也白蘞薏苡湯千金治風濕拘攣不可屈伸白蘞薏苡仁芍藥桂心酸棗仁牛膝乾薑甘草各一升附子三枚破炮上九味以醇酒二斗漬一宿微火煎三沸每服一升日三扶杖起行不耐酒者服五合壽頤按白蘞除風熱散結氣薏苡牛膝皆主拘攣無非宣通濕邪之痹著桂附乾薑則治寒濕也翼方更加車前亦導濕之意菊花酒千金治男女風虛寒冷腰背痛食少羸瘦無顏色噓吸少氣去風冷補不足方菊花杜仲各一斤防風附子黃耆乾薑桂心當歸石斛各四兩紫石英蓯蓉各五兩萆薢獨活鍾乳各八兩茯苓三兩上十五味以酒七斗漬五日日服二合稍加至五合千金翼無干薑壽頤按是方為虛寒風冷者立法故以附桂乾薑鍾乳溫養為主萆薢杜仲獨活當歸皆宣通經絡之意漬酒者欲其行之迅利也古今通絡之藥漬酒之法最多千金翼風門甚至別為一類録此以見一斑桑枝煎外臺引張文仲方療偏風及一切風桑枝銼一大升不用全新嫩枝一味以水一大斗煎取二大升每日服一盞壽頤按桑之為用最多枝葉根莖都無棄物能通血氣利經絡治肢節之病桑枝尤有奇功不用新嫩枝者欲其力之厚也濃煎醇厚因謂之煎與湯飲微有分別亦可熬作膏用批此又古人煎藥之一法宋張季明嘗患兩臂痛服諸藥無效一醫以桑枝一小升切細炒香水煎服數劑而愈可見此方之實效矣張文仲療一切風乃至十年二十年不瘥者方外臺牛蒡根一升生地黃牛膝枸杞子碎各三升上四味取無灰酒三斗漬藥以絹袋盛之春夏一七日秋冬二七日每空腹服之壽頤按此方以生地杞子滋養陰液牛蒡根牛膝宣通經絡藥止四味而朴茂無華力量濃厚後人通絡諸方藥雖不同然其理不過如斯惟牛蒡根今皆不用要之亦是通經活絡隊中一味要藥古方用之者不少亦治醫者不可不知史國公酒方聖惠治中風語言謇澀手足拘攣半身不遂痿痹不仁當歸酒洗虎脛骨酒浸一日焙乾醋炙羌活鱉甲炙川萆薢防風牛膝一作川牛膝秦艽松節晚蠶砂各二兩枸杞子五兩干茄根八兩飯上蒸熟一方有杜仲蒼耳子上為粗末絹袋盛浸無灰酒一斗十日取飲壽頤按此類通絡舒經養陰活血兼祛風濕之方古書已多而近世愈甚此方中正和平不偏溫燥可為良法然立方本義終是為血分不充風寒濕邪痹著者設法實是痹證必不可與猝暴昏僕之中風連類而言若肝風暴動氣血上菀則不獨宣通之藥害同矛戟而酒亦無異砒鴆方下所謂中風語言謇澀等症若其病起猝暴則皆是內風似此諸方皆不可用批鄭重言之俗醫切弗誤用三痹湯治血氣凝滯手足拘攣風寒濕三痹人參黃耆當歸川芎白芍生地杜仲川續斷防風桂心細辛茯苓秦艽牛膝獨活甘草各等分加薑棗煎服壽頤按此方亦為血虛寒濕襲絡之法以其確有風寒濕邪在絡故用藥如此天麻酒治癱緩風不計深淺久在床枕天麻龍骨虎骨骨碎補烏蛇白花蛇二物酒浸去皮骨羌活獨活牛蒡根牛膝各半兩松節銼當歸川芎龜板炙干熟地黃茄根大麻仁原蠶沙各一兩附子一枚炮上十九味銼如麻豆大以酒二斗浸密封春夏三日秋冬七日每服一盞不拘時溫服壽頤按癱緩今通作癱瘓古書有所謂風緩者聖濟謂風緩即癱緩其候四肢不舉筋脈關節無力不可收攝者謂之癱其四肢雖能舉動而肢節緩弱不能運用者謂之緩皆由氣血虛耗陰陽偏廢而得之或有始因他病服吐下藥過度亦使真氣內傷營衛失守無所稟養而然楊仁齋謂風緩者風邪深入而手足為之弛緩蓋脾胃既虛肢體失其所養又肝腎氣虛風邪襲之亦有肢體緩弱之症批古人總認有外風其實只為中風二字所誤壽頤謂此是癱瘓之由漸而成者或以病後元虛經脈失養或由外瘍大證膿泄太多其來也緩古人因有風緩之名其實全是內傷並未嘗有風邪之深入與忽然肢廢之腦神經病截然不同凡古方之養陰壯骨通經宣絡諸法皆為此病而設者也虎骨四斤丸局方治風寒濕氣痹著筋骨肢體緩弱痠疼宣木瓜天麻牛膝蓯蓉洗四味各焙乾一斤用無灰酒浸春秋五日夏三日冬十日焙為末外用熟附子虎骨酥炙各二兩為末即以浸藥之酒打麵糊丸桐子大每服三四十丸食前溫酒下一方加當歸三兩乳香沒藥五靈脂各半兩麝香一錢名大四斤丸三因方加減四斤丸無天麻加鹿茸熟地五味子菟絲子各等分煉蜜丸壽頤按此方溫經壯骨通絡和血本為氣血兩虛肢體痿軟者立法雖曰治風寒濕三氣之痹然是本體之虛寒而非外侵之風寒濕故方中並無祛風理濕之藥凡治因虛而無外邪者準此大四斤丸加味仍是行氣行血之意但麝香走竄尚嫌其泄散真氣既用乳沒亦可去之三因方加鹿茸則溫升太甚等分為丸更嫌太笨用者宜斟酌之批論麝香鹿茸之弊言簡而賅世有以其價貴而濫用者須知此意續骨丹本事治兩腳軟弱虛羸無力及幼兒不能行天麻酒浸白附子牛膝木鱉子羌活各半兩烏頭一錢炮地龍去土乳香沒藥各二錢硃砂一錢上以生南星末一兩無灰酒打麵糊丸雞頭大硃砂為衣壽頤按此方溫燥走竄其力甚峻果是寒濕痹著日久不愈則濕痰死血窒塞經隧非此迅利之藥亦不能直達病所但此為逐邪而設與四斤丸之專治正虛無邪者不同一虛一實一補一攻正是雙方對峙後人有活絡丹一方用炮川烏草烏膽星各六兩地龍去土焙乾乳香沒藥去油各二兩二錢蜜丸酒下即從本事此方脫化而來用藥亦大同小異且南星加以膽制而不用木鱉之攻破似較本事此方更為和平適用然徐洄溪則謂此方為舒筋最宜而以活絡丹為不堪用殆亦未之思耳批洄溪此論誠不可解得此駁正可為活絡丹一方吐氣大活絡丹聖濟總録治一切中風癱瘓痿痹痰厥拘攣疼痛癰疽流注跌僕損傷小兒驚癇婦人停經白花蛇烏梢蛇威靈仙兩頭尖俱酒浸草烏天麻全蠍去毒麻黃首烏黑豆水浸龜板炙貫衆炙草羌活官桂藿香烏藥黃連熟地大黃蒸木香沉香以上各二兩細辛赤芍丁香白殭蠶沒藥乳香二味去油另研天南香薑製青皮骨碎補安息香酒熬膏白蔻仁黑附子制黃芩茯苓香附酒浸焙玄參白朮以上各一兩人參三兩防風二兩半葛根虎脛骨炙當歸各一兩半地龍炙犀角屑另研麝香另研松脂各五錢血竭另研七錢牛黃另研片腦另研各一錢五分上共五十味為末蜜丸如桂圓核大金箔為衣陳酒送下頤按各藥分量諸書所載互有不同今未見聖濟姑從徐洄溪蘭臺軌範壽頤按此方養正祛邪化痰理濕宣絡和血大率治氣血兩虛風寒濕痰痹著之證方下雖曰治一切中風然非能治氣血上菀神經不用之猝暴昏僕不遂癱廢也惟肢節痛痹及虛人痿躄流痰流注諸大症服此頗驗而足部痠痛痿軟不仁及縮腳流注附骨疽環跳疽初起時尤為神應徐洄溪謂頑痰瘀血入於經絡非此不能透達為治肢體大證必備之藥洵是閲歷有得之論第十節風家服食之方古人治風有居恆服食之方皆和平中正養血和絡故為常服之法亦非以祛除外風也考千金外臺如諸酒諸散蓋亦為久服設法但溫燥有毒者多未盡純粹茲選録最醇正者數方以備一格枸杞菖蒲酒千金治緩急風四肢不遂行步不正口急及四體不得屈伸方菖蒲五十斤枸杞子一百斤上二味細銼以水四石煎取一石六斗去滓釀二斛米酒熟稍稍飲之壽頤按菖蒲芳香宣絡除濕開痹枸杞子溫潤養血益陰生津止取二味力欲其專味欲其厚釀為大料是為尋常服食悠久可用之良藥固非治病於一時者也烏麻酒千金烏麻五升微熬搗碎以酒一斗漬一宿隨所能飲之盡更作甚良壽頤按是方千金在風毒腳氣酒醴一類雖無主治而滋潤養陰之意自可於言外得之漬酒雖止一斗然曰盡則更作可見亦是久服之藥虎骨酒千金治骨髓疼痛風經五臟方虎骨一具炭火炙令黃色捶碎清酒漬五宿隨性多少稍飲之壽頤按此治筋骨痿弱之方方下雖曰風經五臟然虎骨之用止是堅強筋骨必非祛散外風之藥古人所謂虎嘯風生用以治風亦是附會之説果爾則虎能引風而以治風病豈不更益其勢助桀肆虐耶當有以知其必不然矣批闢去虎骨治風之説語新而理正葈耳散千金治諸風方五月五日刈取葈耳葉洗曝燥搗篩酒若漿服一方寸匕日三作散若吐逆可蜜為丸服十丸準前計一方匕數也風輕易治者日再服壽頤按葈耳今通作蒼耳其葉其子皆有祛風逐濕通行經絡之功此方為風濕痹著者設法以祛邪為主與前數方之專為養正者不同然性亦和平不易速效是亦久服之法方下所謂十丸準一方寸匕雖丸之大小不詳大約以梧子大為度又可見古方之所謂方寸匕者其藥物固無多也豨蘞圓本事方五月間採豨蘞草摘其葉及嫩枝頭曝乾鋪甑中層層灑酒與蜜九蒸九曝細末之煉蜜和圓如梧子大空心服溫酒或米飲送下二十圓至三十圓壽頤按本事方載江陵府節度使進稀蘞圓方云臣有弟訴年三十一中風伏枕五年百醫不效有道人云可餌豨蘞圓必愈又知益州張詠進表謂吃至百服眼目清明服至千服髭鬚烏黑筋力強健云云推重甚至李瀕湖本草綱目引唐慎微説亦同可見此藥之自有真效瀕湖謂韻書楚人呼豬為豨呼草之氣味辛毒為蘞此草氣臭如豬而味蘞故有此名廣韻上聲七尾虛豈切豨字解日楚人呼豬頤謂豕為水畜其氣腥羶通乎人之腎氣腎家蘊濕生熱則相火不藏諸病蜂起中風癱痿無非濕熱擾攘蘊釀為變豨蘞稟腎臟之氣直入至陰導其濕濁使積邪泄化而諸羌自安此亦理導濕熱之功亦以祛邪為主也批以豨蘞為泄導腎家濕熱之用是從物理上得之古今許多本草不易得此精當確切之藥性也第十一節通治中風方之辨正古治中風大率以續命一類為惟一板法千金外臺中復疊重纍以續命者殆數十百萬其藥溫涼並進甚至以桂附與犀羚同列果是外中之寒風則何以重用寒涼若為內蘊之風火則溫燥升散豈非鴆毒逮宋金以後則又有所謂羌活愈風湯大秦艽湯者凡是醫書無不以此數方為中風必用之藥初學治醫先入為主每至終其身不知所措道之不明皆古書誤之可為痛哭今者氣血上衝腦經為變其理既明則凡是習俗相沿之陋自當一掃而空但俗書俱在童而習之必有不能忘情者不揭其謬則恐正義未必大昌批篤信好古之士尚其三復斯言姑舉古今通行熟在口頭者稍加辨難庶幾千年沿誤矯正一二爰以辨正一節殿在諸方之後小續命湯千金治猝中風欲死身體緩急口目不正舌強不能語奄奄忽忽神情瞀亂麻黃去節防已附子炮去皮芎藭桂心黃芩芍藥甘草炙人參各一兩杏仁四十枚去皮尖兩仁生薑四兩防風一兩半壽頤按方下所述諸症皆是內風暴動為病外臺引延年亦有此方則稱其主偏風半身不遂口眼喎不能言語拘急不得轉側其為內風猝變氣血上菀神經不用情狀顯然而古人乃以麻桂芎防擾動其風升泄其氣必有百害而無一利此證此方是木已搖而更拔之未有不速其蹶者而古今諸書無不以此為治中風第一神方總是誤內因為外因之故耳頤於第一卷第二節及第六節中言之已詳茲不復贅若千金外臺中諸續命湯散無慮數十皆大同小異其弊亦等辨之徒滋辭費始皆從略侯氏黑散菊花四十分白朮防風各十分桔梗八分黃芩五分細辛乾薑人參茯苓當歸芎藭牡蠣礬石桂枝各三分上杵為散酒服方寸匕日三服壽頤按此方見外臺祕要風癲方中云出古今録驗止曰療風癲更有鍾乳礬石各三分無桔梗余與此同考是方用桂枝薑辛歸芎防風仍是溫散風寒之法本無深意以治風癲亦必不獲效其用牡蠣礬石者雜澀斂於疏散隊中亦是古方恆有之例哪有奇功妙用可言故以此方列於千金外臺風門各方之中本極平常初無以使閲者特加青眼然自後人附入金匱之中云治大風四肢煩重心中惡寒不足者同此一方而主治乃與外臺絶異然繹其語意亦甚浮泛必無效力可言而方後則加入常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷食即能助藥力數句此説尚非外臺之所有是更為後人妄加其謬最為易知恐自燧人氏教民火食以來必無冷食六十日之理如謂冷食而藥即可積久不下豈其人積六十日之食而二便不通清夜自思得毋失笑如謂二便自通而獨有藥積不下則必其人腸胃之間別有一處獨能存積此藥尤其理之不可通者且服藥治病止是借其氣味運化精微以達病所亦非謂即此藥湯藥渣竟能庖代氣血之不足而古人竟能造此怪誕不經之説鄙俚無恥之尤然古今名賢從未有直揭其謬者蓋亦誤認為仲師手筆不敢糾繆繩愆終是識理未到不意喻嘉言自命絶世聰明偏能信此臆説隨聲附和竭力讚揚竟謂礬石能固澀諸藥使之留積不散以漸填其空竅則舊風既去新風不入云云是誤認病人服藥竟能以藥填空如縫者之補綴如圬者之畫墁豈非笑話毋亦過於好奇務求立異而不自知大言不慚竟如夢囈耶批此方所用之藥所治之病究竟對證者何在然為金匱作注者無不隨意敷衍真是一盲群盲景象似此辨駁何等清楚雖似此穿鑿附會之言醫學書中本所時有亦不足怪惟如此方之亂雜無章而竟為嘉言説得幻想紛紛天花亂墜一若玄之又玄臭腐中自有神奇者則亦不可多見而庸人無識更奉嘉言之説為至寶陳修園三字經中亦復引之論者新奇病者無命魔高千丈寧不駭然敢書所見以質通儒其庶有撥重霧而見青天之一日乎批侃侃而談不畏俗師咋舌嘉言俞東扶古今醫案按亦謂喻氏之論黑散以為用礬石填空竅堵截來風好奇之談最足誤人又謂藥之入胃不過以氣味傳布經絡腑臟豈能以礬石填塞之又謂冷食六十日藥積腹中不下則腸胃果能填塞不幾令谷不納而糞不出云云其説亦極明白可見怪誕不經之説苟以靜心讀之未有不覺其謬者前賢固已有先我而言之者矣批明理者所見略同羌活愈風湯通真子機要方初覺風動服此不致倒僕此乃治未病之聖藥也又治中風證內邪已除外邪已盡當服此藥以行導諸經久服大風悉去縱有微邪只從此方加減治之然治病之法不可失於通塞或一氣之微汗或一旬之通利批一氣微汗一旬通利二句尤其不通之極如此乃常服之藥也久則清濁自分榮衛自和矣批此方主治最是荒謬從張潔古保命集節録羌活獨活柴胡前胡麻黃細辛防風川芎白芷秦艽薄荷人參黃耆甘草枸杞子枳殼厚朴當歸知母甘菊半夏防己杜仲地骨皮蔓荊子熟地黃各二兩茯苓黃芩芍藥蒼朮各三兩生地黃石膏各四兩桂枝一兩三十三味共七十三兩每一兩水煎服假令一氣之微汗用本方三兩加麻黃一兩作四服加薑煎空心服以粥投之得微汗則住如一旬之通利用本方三兩加大黃一兩亦作四服如前臨臥服得利為度此藥常服之不可失四時之輔春將至大寒後本方加半夏人參柴胡謂迎而奪少陽之氣也夏將至穀雨後本方加黃芩石膏知母謂迎而奪陽明之氣也季夏之月本方加防己白朮茯苓謂勝脾之濕也秋將至大暑後本方加厚朴藿香肉桂謂迎而奪太陰之氣也冬將至霜降後本方加附子當歸官桂謂勝少陰之氣也此藥四時加減臨病酌宜誠治風證之聖藥批不通不通又不通當以蒲留仙之羯鼓三撾為之解穢壽頤按隋唐以前治中風者不問外風內風恆以續命湯為主貌似神非復疊重纍已覺魔障萬重莫能排脫逮至宋金以降則更有所謂羌活愈風湯大秦艽湯者無論何種醫書説到中風一門必以此二方作為必需之品考其所用各藥麻防羌獨芎芷薄荊大隊疏風發散而合以辛桂之溫芩地之清參耆之補渾沌雜糅蓋亦與古人許多續命湯散同出一派似此毫無紀律之師擾亂有餘何能治病而古今名賢無不引為同調者終是見理未明論及中風昏僕無不心搖意亂既不知病從何起又安能按部就班定方選藥則姑且一盲群盲謬引一二成方聊為敷衍於是吠影吠聲互相傳述而似此亂雜無章之藥劑遂為人人心目中共有之方法醫學黑暗至於此極殊可駭詫而此方之議論尤其一竅不通全如夢囈且果如所説幾於無一句不可以殺人是誠不可以不辨批此方雜亂喻嘉言已説盡其弊茲更推究其源謂即從續命一派而來尤能窺見其隱目光最為遠到蓋自有愈風湯大秦艽三化湯諸方以來久為俗書引得心迷意亂學者安得不墮其術中今得此論恍如金鎞刮目始覺大放光明其曰初覺風動服此不致倒僕此方乃治未病之聖藥夫使中風之病果是外來之風則猝然而感本不能預先覺其動與不動也惟內風暴動當有先機或為氣火之上升或為頭目之眩暈此時急宜清其肝熱而風或可熄乃此方中許多辛散發汗升提內風得之無不令其必致倒僕是可謂之治未病之毒藥即曰可治外來之風然重門洞開藩籬盡撤招風有餘豈能愈病又謂內邪已除外邪已盡當服此藥以行導諸經久服大風悉去則內外既已無邪而再用此大隊耗散其意何居又謂一氣微汗試問此四字當如何解説豈非不通之顯而易見者且本方中已有麻黃而另加一兩分作四服如此重劑胡可妄試乃制方者既欲其汗又欲其下人非鐵石奚能堪此而乃謂此是常服之藥寧獨癡人説夢直欲殺盡蒼生似此大謬而著述家偏樂於援引最是大惑不解惟喻嘉言醫門法律辨之極是謂其似是而非後人無識奉此為第一靈寶申申之署亦不為過然本方所用之藥亦與小續命湯侯氏黑散大同小異本是一脈相傳如法仿造論其蕪雜無紀初無上下床之別然喻氏於此方則以通真子所撰無名下士而痛罵之於彼二方則以附入金匱托於仲聖宇下而崇拜之論門第不論功過亦不思之甚矣頤謂此方及大秦艽三化湯等方主治中風方下所言無一句不是胡鬧止以保命集收之且有種種加減一似具有法度而淺者讀之遂謂金元大家治病之祕鑰盡在此中不問其效力如何而依樣葫蘆借充篇幅總之皆不識此病之究屬何因實是醫學之最不堪告人者喻氏法律中風篇此方評論頗能窺見其隱試一讀之方知此方之萬不堪用且可知古今方書之人云亦云者其真相不過如此是亦大可慨矣批説盡醫書之陋真是禹鑄九鼎魑魅現形大秦艽湯通真子機要方治中風外無六經之形症內無便溺之阻隔知血弱不能養筋故手足不能運動舌強不能言語宜養血而筋自柔秦艽石膏各一錢甘草川芎當歸芍藥羌活獨活防風黃芩白芷生地黃熟地黃白朮茯苓各七分細辛五分春夏加知母一錢水煎服如遇天陰加薑七片心下痞加枳實五分壽頤按金元以後之論中風者每以中經絡中腑中臟分為三大綱謂中經絡者外有六經形症則通以小續命湯羌活愈風湯加減治之中腑者內有便溺之阻隔則以三化湯通利之三化湯方即厚朴大黃枳實羌活等分每服一兩水煎服亦出機要方中而中臟者則云性命危遂望而卻步不出一方若外無六經形症內無便溺阻隔則通用大秦艽湯似此三綱鼎立要言不繁而所用方藥止此四方又復簡便易記此説自張氏收入保命集中而後之諸家無不照例録入幾於無書不載無人不知於是治醫之士喜其卑而易行誰不印入腦經恃為祕寶究之猝然昏僕皆由內動之肝陽本非外感風邪則六經形症何自而來然如大秦艽湯之主治所謂外無六經形症內無便溺阻隔則所見之症惟是手足不能運動舌強不能言語而所謂普通之中經絡中腑中臟三綱無例可援既不能適用續命愈風三化之套藥又不敢謂其中臟斷為必死不出一方於是三綱之成例既窮而醫者用藥遂不得不與之俱窮不幾搜索枯腸無以敷衍了事何幸有通真子者異想天開聰明大啓復能製造一外無形症內無阻隔之通用套方亦可謂無聊之極思然方下主治雖若自成一局而所用之藥依舊防風羌獨細辛芎歸仍不離乎續命愈風之大旨又幸其靈機一動想出血弱不能養筋六字乃更悟到生熟二地可以養血遂不倫不類雜湊成方而後之言醫者復可於中經絡中腑中臟三綱之外得此不中經絡不中腑不中臟之應酬妙法然以此開庸醫之簡便法門則誠善矣若欲為真實之學問則豈不長墮十八層底黑暗獄中耶喻嘉言僅謂其既欲養血而復多用風燥之藥尚是皮毛之論不足以誅其心也批金元以來治中風者分此三綱而教人辨證用藥本是夢話六百餘年無有敢斥其謬者終是未有真發明則姑且人云亦云敷衍了事耳今既有伯龍之論實地經驗而古人之誤始得徹底覺悟凡是理想家杜撰方論胥當淘汰淨盡無庸再談此段筆意誠摯而作詼諧語出之竟是牛渚燃犀怪物畢露矣肘後紫湯治中風無問男子婦人中風脊急身痙如弓雞屎二升大豆一升防風三兩切水三升先煎防風取三合汁豆雞屎二味熬令黃赤色用酒二升淋之去滓然後用防風汁和分為再服相去如人行六七里衣覆取汁忌風外臺祕要收入中風角弓反張條肘後又一方清酒五升雞屎白一升熬外臺又引備急方同壽頤按此治外風直入經絡而為角弓反張之正方風自外入故主防風以專御外風雞為巽畜其動應風用其屎者以重濁之氣同類相求合之豆淋酒疏風活血通絡溫經衣覆取汗則外邪解而絡脈自和古人治産後冒風發痙及破傷風之發痙皆以此方為主出入用之外臺引小品有大豆紫湯千金又有大豆紫湯獨活紫湯豆淋酒等皆是疏泄外風之妙劑惟風痙強直之症有因於外風入絡者亦有因於血燥筋急者更有氣火上奔激動腦經而頃刻強直者古人治法止為外風一門示以準則如仲景之痙篇以桂枝葛根等方治剛痙柔痙及千金外臺諸方無一非解表通絡之法而今人病此則多內熱鑠津血虛血燥之證非麻桂羌防及豆淋酒等所可妄試是當於近賢治案中求之斷不可徒讀古書反以僨事也批古人論痙皆是外風而今人病痙皆是血燥學者必須識此方不為傷寒金匱諸書所誤華他愈風散治産後中風口噤手足瘛瘲如角弓或産後血暈不省人事四肢強直或口眼倒築吐瀉欲死者荊芥一味微炒為末每服二錢豆淋酒調服或童子小便服之如神王貺指迷方加當歸等分水煎服壽頤按此以荊芥為散豆淋酒調服即肘後紫湯用防風千金獨活紫湯用獨活之意皆治外風之法則此方之主治産後中風仍是為外感風邪而設惟産後陰虛最多氣火上升內風暴動豆淋酒必不可妄試至謂産後血暈不省人事則多是血脫於下陽浮於上氣升火升擾亂神明法宜降逆破瘀鎮定浮陽雖曰風動而證是內風自動與外受風邪者絶然不侔豆淋酒斷不可用惟童便定逆下行降氣降火最速以調荊芥炭亦能去瘀定風奏效甚捷然與肘後紫湯千金獨活紫湯之意在祛除外風者大相懸絶矣學者於此必須明辨外風內風對證用之方能呈效否則兩者正是相反北轍而南其轅適以速之蹶耳不可不慎此方稱每服二錢明是唐以後人所定唐以前之權衡不以錢計而方名華他愈風散者言其效力之神如華元化治病耳非華氏所制之方也宋人更有荊芥散一方治中風口噤四肢搐搦或角弓反張用荊芥一味炒為末酒服二錢極稱有效尤在涇謂其專治血中之風亦治外風之藥也批此卷所録各方注解精當深入顯出皆能表明其真實功效絶無模糊隱約之弊而分別部居不相雜廁尤為學子指南之針猝讀一過欽佩作者目光透徹識力精微求之古人殆難其匹遑論儕輩而所録無多諸法咸備不自制一方而其實何去何從一一抉摘隱微闡發淨盡已無一非自出手眼別有錘爐金針度人用之不竭以視俗書好立新方而不適於用者真有天淵之別文彥附識中風斠詮第三卷終附中藥計量新舊對照換算表十六進位舊制單位與法定計量單位克換算釐釐錢分錢分錢錢錢錢錢錢錢錢錢錢兩東漢容量單位與法定計量單位換算升東漢升法定計量單位東漢重量單位與法定計量單位換算斤克兩克
