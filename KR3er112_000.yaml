  text: 序吾華醫學防於上古盛於漢唐論雜病者自素問以降莫不以仲景金匱皇甫士安甲乙巢氏病源孫氏千金王氏外臺諸家為軌範誠以漢唐家法辨證論治具有精義可為萬世不易之法守不比宋金元明諸書時以泛濫空言充篇幅作皮相語也獨至中風一證昏厥暴僕無非肝陽不靖生風上揚而證以古書則此是內動之風素問本不在中風之例至金匱甲乙而始謂之中風方且皆以為外感之寒風則與肝氣自旺火盛風生之義枘鑿不合而後之作者無不祖述金匱皆以外風論治疏風散寒習為常例千金外臺方藥最夥辛散溫升如出一手直至河間丹溪之論出而始知為火為痰病屬內因本未嘗感觸外來之邪風然議論雖互有發明而所述治法猶戀戀於古人續命諸湯終不能為內風昭示正軌蓋識病之誤已在漢唐諸大家則後之學者縱有覺悟亦不敢大放厥辭直抉古人之謬而是病之誤為古書束縛固已二千年矣近數十載歐風東漸新學大昌其論此病謂是血沖腦經所致但就其病名言之豈不與中醫之所謂中風者分道而馳不可強合然蓬萊張氏伯龍雪雅堂醫案則據素問血之與氣並走於上則為大厥一節謂即肝火自熾生風上揚迫令氣血逆湧沖激入腦震動神經而失其知覺運動之病融會中西學說以闡明此病之淵源信而有徵同條共貫可為中外醫學溝通之初步豈非科學中一大發明其治法惟以潛陽鎮逆為主使氣血不升腦不受激則洶湧波瀾頓然平定但從大處落墨披大郤導大䕀而一切兼證無不迎刃而解日月出矣爝火俱熄乃令讀者陡然覺悟心目為之軒爽惟是內風上擾必挾胸中痰濁隨氣而升故當昏瞀眩僕之時痰湧涎流十恆八九臨時急救必以泄降濁痰為第一要義而滋膩藥物皆非所宜伯龍知參朮壅氣之不可誤投而反欲以二地阿膠與鎮逆潛陽並進尚是未達一間此則誤讀立齊景嶽諸書未免賢者之過同學張子山雷早棄儒冠殫精醫術讀書萬卷寢饋草年閲歷既多具有心得能以古書供其運動而不受古人之愚每謂中風一病古今議論都無真解獨於伯龍之類中祕旨一篇服膺最摯第微嫌其鎮肝滋腎不分次序則當氣升痰塞之時黏膩適以助壅難收潛降攝納之功乃為之分別緩急條舉治法而先引證古籍辨明內因外因羅羅清疏如指諸掌然後是病之來源去委昭然若發蒙書成三卷名曰斠詮斠不平者而使之平洵為治是病者絶無僅有之正鵠伯龍開其源得山雷氏導其流於是臨證處方銖兩悉稱而今而後內風暴動之變始得盧循續命之湯裨益於醫界病家必非淺鮮惟其辨正古人之誤雖以金匱甲乙舉世所共知為醫學大宗者皆在糾繩之列翻盡古人成案猶恐篤信好古之儒或有疑其持論太奇未敢輕信者要之內風外風在素問中顯有區別至金匱而始以內風諸證皆作外風殊非素問所謂中風之真旨即據素問以正漢唐之誤而金匱甲乙諸書不得不謂其自有誤會況乎今之實驗既有明徵則古之成方信多貽禍民命至重詎可不辨此事實之不能模稜兩可者初非眩異矜奇好與古人作無端之饒舌也若以介類潛陽之品專治氣火上浮肝陽內動之病則宋人白沙許學士真珠母丸已開其例而近賢孟英王氏頗擅其長文彥業師吳門黃醴泉先生亦喜用之龍牡龜鱉貝齒珠母玳瑁之屬連類而書不嫌復疊鎮攝之力視伯龍所言殆十倍之而其力始專其效尤著狂瀾砥柱乃可搘撐山雷此編固以伯龍之論觸類旁通闡幽燭隱而得此絶大之覺悟然專倚介類以建殊勳蓋即從孟英醴泉諸家之治案悟出非拘拘於伯龍一家之言者且專用潛鎮以定內風亦非伯龍之本旨伯龍意中固欲以潛降與滋填並進也此山雷之縝密固有較勝於伯龍者青出於藍洵非虛語而孟英諸家之治驗殆其旁證之得力處耶山雷又有古今醫案平議之作亦將就緒其內風腦神經病一編採集近賢治案可見一斑敢書所見以質山雷其以為知言否僭加評騭併為點句以歸之尚其速付手民喚醒俗學俾呻吟床第者早得針膏肓而起廢疾則書生之有用於世功德亦不為小矣爰敘涯略以告世之治此學者要亦醫林之一大關鍵非彼抄胥家所可同日語也吾道中不乏讀書明理之才必不以鄙言為阿私所好時民國六年辰在丁巳冬十月同學弟同邑張文彥洛鈞氏序於滬城寓居之半廬洛鈞少壽頤八歲幼習舉子業於本邑之南翔鎮李眸云先生門下與頤有同門誼後頤從同邑黃牆村朱閬仙先生習醫洛鈞亦棄儒而在滬從黃醴泉專治此學醴泉筆下輕靈為滬城寓公前輩洛鈞從之遊者五年盡得其前後三十年治案十餘巨冊入手既正所造自醇光緒之季頤寄寓滬濱舊雨重逢所學者同過從益密蓋十年來無三五日不見見則非此道不談相與縱論古今各家得失而證之以彼此經驗實地磋磨獲益不淺洛鈞又嘗從西學家習治瘍術嫌彼所用藥止能防毒防腐而於退毒圍毒止痛拔毒去腐生肌諸法中醫舊學未嘗不詳盡縝密獨惜市肆中通行瘍科各書大都模糊浮泛無一精切適用之本常從頤討論黃牆朱氏外科法頤樂得同嗜吾道不孤為之指示䕀要苟遇大症互約同勘恆能識得奧義心與神歸好學殷拳而臨證詳慎不苟儕輩中胡可多得丁巳秋仲頤輯是編初稿就緒持以相質蒙題是序而詳加眉評為之點句譽吾太過不免阿私所好之嫌止以締交有年深識此中甘苦頗能道著壽頤欲言未言之隱同心蘭契肺腑銘之孰意天不假年遽於戊午夏五偶遘時疾一病浹旬竟爾長逝年甫三十有八所學未竟能無痛絶頤挽以聯云草年前槎上論交南翔鎮古稱槎溪少談文壯談醫此道難得真傳何幸聲氣相求闡舊說以啓迪新知吾亦自豪也算恫瘝在抱十稔來滬濱同客奇共賞疑共晰拙著且蒙心許那料人琴永訣染微疴而竟辭濁世天胡太酷忍教學術長埋蓋指實也今將拙稿訂正一過思以問世痛神交之難再哀舊雨之無聞重讀是序曷禁泫然附識數行冀存梗概良足傷已壬戌初夏壽頤識於浙之蘭溪中醫學校中風斠詮自序中風之病猝然傾僕痰壅涎流而癱瘓不仁舌強語謇痙厥瘛瘲抽搐昏憒諸危症接踵而來甚則不動不言如癡如醉世之醫者無不知是險候而殊少捷應之治驗即遍考古今醫籍亦莫不各有議論各有方藥然尋繹其詞旨大都模糊隱約疑是疑非所以如法治療亦復無效批古人未知有氣血上菀腦神經病之理所以議論無不隔膜則所定諸方又安得有效近之西國醫家則謂此是血沖腦經之病又有稱為腦失血腦溢血及腦血管破裂者觀其命名之義固是離乎中醫舊說別有發明且據其剖驗所見凡以是病死者其腦中必有死血及積水是血沖人腦信而有徵批此是確實證據則古人共認為外來之邪風者豈非大誤顧血行於絡脈之中何故而上衝傷腦竟致血管破裂則治彼之學者亦未能明言其原理是以亦未聞有切近之治效近人蓬萊張士驤伯龍氏雪雅堂醫案嘗論是病則據素問調經論血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死一節而參用西學血沖腦經之說謂腦有神經分布全體以主宰此身之知覺運動凡猝倒昏瞀痰氣上壅之中風皆由肝火自旺化風煽動激其氣血並走於上直衝犯腦震擾神經而為昏不識人喎斜傾跌肢體不遂言語不清諸症皆腦神經失其功用之病批引證古書吻合無間即參西學又是明白曉暢精切不浮似此論病真是古人所未有苟能幹乍病之時急用潛陽鎮逆之劑抑降其氣火之上浮使氣血不走於上則腦不受其激動而神經之功用可復批醐灌頂魂夢俱安既以申明素問氣血並走於上之真義復能闡發西學血沖腦經之原由則新發明之學理仍與吾邦舊學隱隱合符惟西人據剖解所見僅能言其已然之病狀而伯龍氏引證古籍更能推敲其所以然之病源言明且清效近而顯貫通中西兩家學理沆瀣一氣而後病情之原委治療之正宗胥有以大白於天下後世洞垣一方盡見癥結始悟古今諸書皆未能明見及此無惑乎凡百議論多不中肯遂令百千古方不得幸圖一效則是病之所以號稱難治者其實皆不能識病之咎也批有此發明有此實驗正不防推倒一切壽頤嘗治甬人胡氏七十老嫗體本豐碩猝然昏瞀不動不言痰鳴鼾睡脈洪浮大重投介類潛陽開痰泄熱兩劑而神識清明行動如故批此實地經驗又治南翔陳君如深年甫三旬軀幹素偉忽然四肢刺痛不可屈伸雖神志未蒙而舌音已謇其脈渾濁其舌垢膩大府三日不行則授以大劑潛降清肝泄熱滌痰通府之法僅一劑而刺痛胥蠲坐立自適乃繼以潛陽化痰調治旬余漸以康復批又一確證又嘗治熱痰昏冒神志迷濛語言無序者數人一授以介類潛鎮泄痰降逆之品無不應手得效覆杯即安乃循此旨以讀古書始知素問生氣通天論血菀於上使人薄厥一條亦即此內風自擾迫血上菀之病更與西學血沖腦經之說若合符節蓋素問此病本未嘗有中風之名凡素問之所謂中風皆外感之風邪也分別外因內因最是清晰初無一陶同冶之誤自甲乙經有偏中邪風擊僕偏枯之說乃始以內風之病誤認外風而金匱以後遂以昏厥暴僕癱瘓不仁諸症一例名以中風且比附於素問之所謂中風於是內因諸風無不以外風論治此其誤實自金匱甲乙開其端而千金外臺承其弊反將素問之內因諸風忽略讀過不復致意批讀書得間是編之敢於糾正金匱甲乙經者其所據即在於此苟能起仲景士安於九京當亦自知誤會於是金匱病源千金外臺諸書後學所恃以為漢唐醫藥之淵海者絶少內風之切實方論詎非一大缺憾批古無專治內風之方藥真是缺典且令後之賢哲如河間東垣丹溪諸大家論及昏瞀猝僕之中風雖明知其為火為氣為痰病由內發無與乎外感之風而猶必以小續命大秦艽羌活愈風諸方虛與委蛇姑備一說豈非以腦經之理古所未知則見此無端暴病之或喎口眼或廢肢體或更不識不言者終不能窺測其所以然之故猶疑為外感邪風錯雜其間此即中風之名有以誤之遂視古來相承不易之散風解表一法必不敢獨斷獨行直抉其謬而內風外風之治法仍依違於兩可之間則必使患是病者百無一愈批為古人說出依違兩可之原委真情實理全賴作者體貼入微方能有此深入顯出之語總之古人於此病皆未能識得真切也擒賤擒王不當支支節節瑣碎繁碎反無一效今者得有伯龍此論而素問之所謂氣血上菀及西學之所謂血沖腦經皆已昭如雲漢炳若日星凡是古人誤認外風之議論方藥自不得不掃盡浮言別樹一治療之正軌惟是追溯致誤之源則自素問而外即甲乙金匱已多疑竇更何論乎唐宋以降苟非證明其沿誤之淵源必有好古之士致疑於新發明之學說大異乎千載相承之舊而不敢堅其信用者則泥古之弊尚是無形而臨證之害伊于胡底因是不辭愚昧專輯一編藉以研求始末乃知素問辨別之精審以及漢唐誤會之源流未嘗不馬跡蛛絲隱隱可見批翻案太大不得不仔細推敲表明源始此編之所以議論反復近於繁冗也且尋繹千金外臺中風各方亦時有清熱潛降之劑更可知古人固恆有此肝陽上凌之病但以習俗相沿鮮有直斷為內熱生風者則雖有良方而後學亦不易悟得其妙用坐令臨病之時束手無策寧不可嘆批此亦確證何得謂古之中風必非今之氣血沖腦爰為考證古今疏其要旨並述治療次第具列於篇若其兼見之症如口眼喎斜肢體癱廢或為舌短語謇神迷言糊或為痰塞昏蒙痙厥尸寢在古人不知是神經為病恆欲分證論治各立專方求其一當未嘗不闡幽索隱大費心思豈知捫燭扣槃全非真相則不揣其本而齊其末卒無效力之可言今惟以潛降為主鎮定其氣血上衝之勢使神經不受震激而知覺運動皆可恢復凡百兼症胥如雲過天空波平浪靜正不必分條辨證遊騎無歸纂輯經旬繕成三卷准今酌古似尚能識得機宜裨益實用持論務求其平因以斠詮為名貽諸同志但期為病者得有切近之治驗是於民命不無小補或亦賢於無所用心者乎民國紀元丁巳十月嘉定張壽頤山雷甫自序於滬北寓齊序中所述陳如深之治驗其病在丙辰七月初覺髀樞不利不半日而兩足掣痛並及右手頤至診視已第三日則四體俱僵仰臥不可一動引手察脈即大痛呼號慘於刀刃其脈弦大有力雖不甚洪數而指下渾濁模糊舌苔又滿白垢膩已知是痰壅氣升之病惟肢節痛楚頗似風寒濕邪三氣雜至之痹證語言尚是清楚而有時已覺謇澀因詢其頰車是否如常則曰自今日起已漸漸牽強遂直斷為肝火不藏氣血挾痰上衝入腦震動神經之病是以病發猝暴忽然而至惟時大府三日不行有欲解不得解之意蓋升多降少地道不通而氣血上菀神經為病未有已也因以清肝潛降泄熱滌痰疏通大府為劑方用羚角尖水磨沖服五分生石決生牡蠣紫貝齒各一兩生玳瑁青龍齒生磁石各六錢皆先煎陳膽星天竺黃仙露半夏生白芍萊蔔子各三錢石菖蒲根鹽水橘紅各一錢礞石滾痰丸五錢另用淡竹瀝三兩加生薑汁三五滴分三四次溫服甫嘗一劑是夜即掣痛大定自起如廁二便暢行明日復診即安坐床頭屈伸自若此是肢體大病初亦不敢必其果有捷效而竟能應手有功者則神經為病動則俱動靜則俱靜足徵伯龍所論確是此病一定不易之真情設或誤認痛痹投以疏風宣絡行經發散之劑豈不氣火愈浮助其激動為害又當何如逮今歲八月陳君又忽患髀關牽強其時適發過瘧疾二次誤謂外感未清自服桂枝柴胡羌活川芎等各三四分一服遂致四肢大痛不可轉側牙關緊閉舌短不伸神志欲昏殆將痙厥乃悟及丙辰舊恙飛函邀頤而又自服潛鎮化痰之法比及頤至則牙關已舒手足已運神清言楚掣痛胥蠲諸危症皆已鋭減則辛溫通絡之害及潛陽攝納之功兩兩相形尤其顯著惟脈來混濁舌苔垢膩見症與前年無異仍授潛鎮化痰調治浹旬任事如故此君兩度僵臥見者無不以為勢且癱廢而幸能投劑速效者是伯龍氏發明治法之第一實驗蓋自有此病以來固鮮有此如鼓應桴者始知從前病家之誤於古方者當必不少至今日而知是病之未嘗不可治則其他病理之未經闡明者殆難悉數壽頤因之而尤為兢兢焉此病以西學家有血沖腦經之說而伯龍因以悟及素問氣血並走於上之一節頤更以悟及血菀於上之一節今得親自經驗而確信經文二節果為是病而設批不以新發明而自負轉以得實驗而自視欣然似此虛懷若谷非大有學問人安肯道隻字然欲求真實之學亦必須如此存心乃能日進使習醫者皆能學到吾師之虛心則國學昌明正未有艾願同道者共書諸紳復何患中醫之江河日下而為治新學者所垢病耶祖培附識然素問一書凡在醫家何人不讀讀之而不得其意則姑且付之闕疑不求甚解此亦讀古書者無可奈何之事頤以有此實驗而始敢謂能讀素問之二節始敢謂能治是病則素問之不能讀者何限而民病之不能治者亦復何限於此可知上古之醫理為不可及而漢唐以下之議論有未可恃者嗚呼醫豈易言哉世有好學深思之士能於臨證之際時時細心體驗使病理漸漸昌明可以與人共喻庶乎吾邦醫學始有進步可言若僅能人云亦云隨聲附和抑末矣已未九月壽頤又記點句非古也然以清眉目便讀者則句逗自不可少況乎書中關節正如畫龍點睛尤宜揭出之以求醒目邇來新書多用此法自有深意山師是編既為洛鈞先生點勘一遍更加眉評甚是爽心豁目惟序言二篇皆未之及祖培從吾師遊已逾六年久承提命於吾師心法差能領略一二謹為句讀並書拙見僭注於眉當亦為同嗜者所許可也受業曹祖培謹注中風斠詮後序醫之為學有二要焉曰理論曰治驗理論者所以探討病機之原委治驗者所以昭示用藥之準繩有治驗而理論不足以申明之則本末未詳尚是偶然之幸中有理論而治驗不足以證實之則空言無用徒貽覆瓿之譏評吾國醫書多以理論見長充其弊也甚至竟騁辭鋒而恍惚杳冥難徵實效然亙古以來病機之愈闡愈詳而得收效果者亦正不少則理論尤為治驗所自出者也西醫之心法在新發明而不在學古訓故其言曰無學問之經驗優於無經驗之學問是重於知新輕於溫古之明證為是說者蓋亦有鑑於中醫之空論太多為徒讀父書食古不化者痛下針砭未始非實事求是之一道然僅憑經驗而學問不足以濟之則經驗必有時而窮而所得之經驗又何以說明理由與人共喻且彼之所恃以為經驗者器具精良解剖細密可謂盡驗病之能事而試為研究其治療之實效則果有新發明者固是所向有功無投不利若其普通治法則孰得孰失亦正與中醫之人云亦云者未易軒輊且有時明明驗得實在之病狀而理論不足以暢發之則亦不能洞燭病機而所治亦未必遽效惟以中醫理法為之曲曲證明而始知其剖驗之不誣則彼之經驗賴有吾之學問以引申之而後相得益彰如響斯應此吾師張山雷先生中風斠詮一編實由學問中生經驗而能以理論申明其治效者也原夫昏瞀猝僕之病名中風本是漢唐以後之通稱而證之古書則素問中有是病無是名知金匱以下之皆作外鳳治療者初非上古醫學之正軌吾師據此以正漢唐諸家之誤是理論之最透闢而確然無疑者近之西國醫家驗得血沖腦經為病而知其然不能知其所以然遂覺血何由沖腦何由病皆在模糊疑似之間莫能探索其真相逮張伯龍以調經論之氣血並走於上釋之而其理始明吾師又以生氣通天論之血菀於上證之而其情更著則新學家徒恃無學問之經驗者固不如更以學問佐之而經驗乃信而有徵於此始悟內風上擾之病素問中言之最詳巔疾二字已是習見王啓玄注在巔之疾不啻明言腦受其病而氣上不下上實下虛諸條豈不與西學沖腦之說彼此符合惜乎讀者不察誤入迷途致令自漢以下訛以傳訛者垂二千年而金元名賢如河間丹溪諸公能知病由內動為火為痰而終不能直揭漢唐治法之誤者皆為金匱寒虛相搏邪在皮膚一節印定眼光竟謂仲景成法神聖不可侵犯今者是編出而始撥重霧以見青天真是二千年來未有之大徹大悟但是發明最精而翻案亦最大必啓俗學之疑吾師之所以不憚辭煩反復申論者其意亦正在此然竊恐固執之人讀此而猶舌嬌不能下也要知真理論真治驗非理想家空言塗附者所可等視是醫學中之最上乘天下之大必有知音此則祖培之所敢斷言者請申一說為讀者告曰是編理論至詳且審果能於精密處細心尋繹則舉一反三臨證時必多適用正不僅昏瞀猝僕者之惟一捷訣也爰拜手而書其後民國九年歲在庚申孟陬月受業松江曹祖培伯蘅謹識
